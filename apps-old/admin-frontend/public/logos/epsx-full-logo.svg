<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="400" height="360">
  <defs>
    <linearGradient id="epsx-admin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF512F" />
      <stop offset="100%" stop-color="#DD2476" />
    </linearGradient>
  </defs>

  <g transform="translate(0, 0)">
    <!-- Geometric Logo Centered (256x256 shape in 400 width -> translate X by 72) -->
    <g transform="translate(72, 20)">
      <!-- Hexagon border -->
      <polygon points="128,8 231.92,68 231.92,188 128,248 24.08,188 24.08,68" 
               fill="none" 
               stroke="url(#epsx-admin-grad)" 
               stroke-width="20" 
               stroke-linejoin="round" />

      <!-- Analytics Bars -->
      <rect x="76" y="140" width="24" height="40" fill="url(#epsx-admin-grad)" />
      <rect x="116" y="110" width="24" height="70" fill="url(#epsx-admin-grad)" />
      <rect x="156" y="80" width="24" height="100" fill="url(#epsx-admin-grad)" />

      <!-- Connecting Analytics Line -->
      <polyline points="88,140 128,110 168,80" 
                fill="none" 
                stroke="url(#epsx-admin-grad)" 
                stroke-width="12" 
                stroke-linejoin="round" />

      <!-- Technology Nodes -->
      <circle cx="88" cy="140" r="16" fill="url(#epsx-admin-grad)" />
      <circle cx="128" cy="110" r="16" fill="url(#epsx-admin-grad)" />
      <circle cx="168" cy="80" r="16" fill="url(#epsx-admin-grad)" />
    </g>

    <!-- Text Below -->
    <text 
        x="50%" 
        y="320" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        font-family="system-ui, -apple-system, 'Inter', 'Montserrat', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="64" 
        font-weight="900" 
        letter-spacing="6" 
        fill="url(#epsx-admin-grad)">
        EPSX
    </text>
  </g>
</svg>
