# ============================================================================
# wave49(slice-1): staging resource limits (smaller than prod).
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: epsx-pay-svc
spec:
  template:
    spec:
      containers:
        - name: epsx-pay-svc
          resources:
            limits: { memory: 256Mi, cpu: "0.5" }
            requests: { memory: 64Mi, cpu: "0.1" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epsx-pay-bff
spec:
  template:
    spec:
      containers:
        - name: epsx-pay-bff
          resources:
            limits: { memory: 256Mi, cpu: "0.5" }
            requests: { memory: 64Mi, cpu: "0.1" }