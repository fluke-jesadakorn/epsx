# ============================================================================
# wave49(slice-1): staging NodePort patches. Same allocations as prod
# (30082 + 30083) so the staging tunnel config matches prod 1:1.
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: epsx-pay-svc
spec:
  type: NodePort
  ports:
    - name: http
      port: 8103
      targetPort: 8103
      nodePort: 30082
---
apiVersion: v1
kind: Service
metadata:
  name: epsx-pay-bff
spec:
  type: NodePort
  ports:
    - name: http
      port: 3002
      targetPort: 3002
      nodePort: 30083