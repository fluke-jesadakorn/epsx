apiVersion: v1
kind: Service
metadata:
  name: epsx-backend
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30085
---
apiVersion: v1
kind: Service
metadata:
  name: epsx-frontend
spec:
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30005
---
# wave11(k8s-frontend-migration): the Rust admin BFF binds on
# 3001 (not 3000). Service + NodePort both follow.
apiVersion: v1
kind: Service
metadata:
  name: epsx-admin
spec:
  type: NodePort
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30006
---
# wave12(integration): the new epsx-analytics binary
# gets its own NodePort in staging so the canary rollout
# doesn't collide with the monolith's port 30085.
apiVersion: v1
kind: Service
metadata:
  name: epsx-analytics
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30086
