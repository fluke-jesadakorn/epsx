# Dev redis — lower maxmemory to fit within 768Mi pod limit
apiVersion: v1
kind: ConfigMap
metadata:
  name: epsx-redis-conf
data:
  redis.conf: |
    maxmemory 512mb
    maxmemory-policy allkeys-lru

    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite yes
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    save 900 1
    save 300 10
    save 60 10000

    maxclients 128
    timeout 300
    tcp-keepalive 60

    hz 10
    dynamic-hz yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
    lazyfree-lazy-user-del yes

    loglevel notice
