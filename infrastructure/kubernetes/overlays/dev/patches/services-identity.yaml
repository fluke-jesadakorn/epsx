# wave13a(track-a) + wave13b(track-a): dev overlay patches
# for the new `epsx-identity` Service.
#
# The base Service at
# `infrastructure/kubernetes/base/identity/service.yaml` is
# `type: ClusterIP` (only reachable inside the cluster). The
# dev overlay patches it to `type: NodePort` on nodePort
# 30104 (gRPC) + 30105 (SSE/HTTP-1.1) — pre-allocated in
# the wave-13(dev-k8s) overlay's NodePort plan (see
# `services-nodeport.yaml` for the NodePort table).
#
# The image tag override for `:wave13b-dev` is applied via
# the overlay's `images:` block, not via a strategic-merge
# patch.

apiVersion: v1
kind: Service
metadata:
  name: epsx-identity
spec:
  type: NodePort
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      nodePort: 30104
    # wave-13b(track-a): NodePort 30105 for the HTTP/1.1
    # (axum) side. Used by the integration gate to drive
    # the SSE round-trip smoke test; future wave-13c+ Track B
    # consumers (the analytics binary's SSE client) will
    # dial `epsx-identity:50052` over the cluster's internal
    # DNS and never see the NodePort.
    - name: sse
      port: 50052
      targetPort: 50052
      nodePort: 30105
