# Dev uses base moderate postgresql.conf — no change needed
# This file is intentionally minimal; base configmap-postgres.yaml already has dev-safe values
apiVersion: v1
kind: ConfigMap
metadata:
  name: epsx-postgres-conf
data:
  postgresql.conf: |
    # EPSX PostgreSQL Config — dev (conservative)
    listen_addresses = '*'
    max_connections = 50
    superuser_reserved_connections = 3

    shared_buffers = 256MB
    effective_cache_size = 768MB
    work_mem = 4MB
    maintenance_work_mem = 64MB

    wal_buffers = 16MB
    min_wal_size = 64MB
    max_wal_size = 256MB
    checkpoint_completion_target = 0.9

    random_page_cost = 1.1
    effective_io_concurrency = 200

    max_worker_processes = 4
    max_parallel_workers_per_gather = 2
    max_parallel_workers = 4
    max_parallel_maintenance_workers = 2

    log_min_duration_statement = 500
    log_checkpoints = on
    log_lock_waits = on

    autovacuum_max_workers = 2
    autovacuum_naptime = 60s

    idle_in_transaction_session_timeout = 30s
    statement_timeout = 60s

    shared_preload_libraries = 'pg_stat_statements'
    pg_stat_statements.track = all
    pg_stat_statements.max = 5000
