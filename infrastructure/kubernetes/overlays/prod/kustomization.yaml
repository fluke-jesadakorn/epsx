apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: epsx-prod

resources:
  - ../../base
  - pvcs.yaml
  - cloudflared/deployment.yaml
  - cloudflared/service.yaml
  - cloudflared/configmap.yaml

images:
  - name: registry.jesadakorn.com/jesadakorn/epsx/backend
    newTag: prod-latest
  - name: registry.jesadakorn.com/jesadakorn/epsx/frontend
    newTag: prod-latest
  - name: registry.jesadakorn.com/jesadakorn/epsx/admin
    newTag: prod-latest

patches:
  - path: patches/replicas.yaml
  - path: patches/resources.yaml
  - path: patches/postgres-conf.yaml
  - path: patches/redis-conf.yaml
