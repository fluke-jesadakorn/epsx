# ============================================================================
# wave49(slice-1): prod resource limits for pay.epsx.io microservice.
# Same budget as epsx-analytics (256Mi / 0.5 CPU requests,
# 512Mi / 1 CPU limits).
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: epsx-pay-svc
spec:
  template:
    spec:
      containers:
        - name: epsx-pay-svc
          resources:
            limits: { memory: 512Mi, cpu: "1" }
            requests: { memory: 128Mi, cpu: "0.25" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epsx-pay-bff
spec:
  template:
    spec:
      containers:
        - name: epsx-pay-bff
          resources:
            limits: { memory: 512Mi, cpu: "1" }
            requests: { memory: 128Mi, cpu: "0.25" }