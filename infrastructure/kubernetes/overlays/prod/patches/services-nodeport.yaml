apiVersion: v1
kind: Service
metadata:
  name: epsx-backend
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: epsx-frontend
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: epsx-admin
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
---
# wave12(integration): the new epsx-analytics binary
# (port 8080) is exposed on NodePort 30081. The Cloudflare
# Tunnel routes the 5 /api/analytics/* paths to a port-bridge
# that maps to this NodePort. The monolith (NodePort 30080)
# continues to serve the 3 admin /api/admin/analytics/* routes
# and any pre-cutover /api/analytics/* traffic during the
# migration window.
apiVersion: v1
kind: Service
metadata:
  name: epsx-analytics
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
