apiVersion: v1
kind: ConfigMap
metadata:
  name: epsx-postgres-init
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    SUFFIX="${POSTGRES_DB#epsx_}"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE DATABASE epsx_analytics_${SUFFIX};
        CREATE DATABASE epsx_notifications_${SUFFIX};
        CREATE DATABASE epsx_payments_${SUFFIX};
    EOSQL
    echo "Databases created: epsx_analytics_${SUFFIX}, epsx_notifications_${SUFFIX}, epsx_payments_${SUFFIX}"
