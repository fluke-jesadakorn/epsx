apiVersion: apps/v1
kind: Deployment
metadata:
  name: epsx-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epsx-admin
  template:
    metadata:
      labels:
        app: epsx-admin
    spec:
      containers:
        - name: epsx-admin
          # wave11(k8s-frontend-migration): the new Rust
          # dioxus admin BFF (apps/admin, binary bff-admin)
          # replaces the pre-migration Next.js admin
          # frontend in apps-old/admin-frontend. Image is
          # built locally (see apps/admin/Dockerfile) and
          # tagged with the per-overlay tag (`:dev`,
          # `:staging`, `:prod`) by the kustomization.
          image: epsx-admin:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: epsx-admin
          env:
            - name: MINIO_ENDPOINT
              value: "http://host.docker.internal:9100"
            # wave11(k8s-frontend-migration): the Rust admin
            # BFF binds on 3001 (per apps/admin/src/main.rs
            # default). The pre-migration Next.js admin was
            # on 3000; this corrects the port mismatch.
            - name: PORT
              value: "3001"
            - name: HOSTNAME
              value: "0.0.0.0"
          ports:
            - containerPort: 3001
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: 1Gi
              cpu: "2"
            requests:
              memory: 256Mi
              cpu: "0.5"
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
