apiVersion: apps/v1
kind: Deployment
metadata:
  name: epsx-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epsx-frontend
  template:
    metadata:
      labels:
        app: epsx-frontend
    spec:
      containers:
        - name: epsx-frontend
          image: registry.jesadakorn.com/jesadakorn/epsx/bff-frontend:prod-latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: epsx-frontend-bff
          env:
            - name: API_URL
              value: "https://api.epsx.io"
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: RUST_LOG
              value: "info"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: 1Gi
              cpu: "2"
            requests:
              memory: 256Mi
              cpu: "0.5"
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
