# EPSX Platform - Backend Only Docker Compose Configuration
# Usage: docker compose -f infrastructure/docker/docker-compose.backend.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: epsx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-epsx_dev}
      POSTGRES_USER: ${DB_USER:-epsx_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - epsx_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-epsx_user} -d ${DB_NAME:-epsx_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT:-5434}:5432"

  # Redis Cache and Session Store
  redis:
    image: redis:7-alpine
    container_name: epsx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    networks:
      - epsx_internal
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "${REDIS_PORT:-6380}:6379"

  # Rust Backend API
  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: epsx-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Environment
      ENV: ${ENV:-development}
      NODE_ENV: ${NODE_ENV:-development}
      RUST_ENV: ${RUST_ENV:-development}
      RUST_LOG: ${RUST_LOG:-info,epsx=debug}
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # Service URLs
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL:-http://localhost:3001}

      # Database
      DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-epsx_dev}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-20}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-2}
      DATABASE_ACQUIRE_TIMEOUT: ${DATABASE_ACQUIRE_TIMEOUT:-30}
      DATABASE_IDLE_TIMEOUT: ${DATABASE_IDLE_TIMEOUT:-300}
      
      # Additional Databases
      PAYMENTS_DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/epsx_payments_dev
      NOTIFICATIONS_DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/epsx_notifications_dev
      ANALYTICS_DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/epsx_analytics_dev

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379

      # Web3 Authentication
      WEB3_APP_SECRET: ${WEB3_APP_SECRET:-temp_web3_app_secret_for_dev_32chars}
      WALLET_SIGNATURE_SECRET: ${WALLET_SIGNATURE_SECRET:-temp_wallet_sig_secret_for_dev_32chars}
      WEB3_SESSION_SECRET: ${WEB3_SESSION_SECRET:-temp_web3_session_secret_for_dev_32chars}
      WEB3_SESSION_DURATION_HOURS: ${WEB3_SESSION_DURATION_HOURS:-24}
      WEB3_SIGNATURE_TIMEOUT_MINUTES: ${WEB3_SIGNATURE_TIMEOUT_MINUTES:-10}
      JWT_SECRET: ${JWT_SECRET:-temp_jwt_secret_for_dev_32chars}

      # Blockchain Configuration
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK:-testnet}
      BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK:-testnet}
      COMPANY_WALLET_MAINNET: ${COMPANY_WALLET_MAINNET:-0x7877e415a13532d9E43Df7Fd2CC256f93a39ced7}
      COMPANY_WALLET_TESTNET: ${COMPANY_WALLET_TESTNET:-0x7877e415a13532d9E43Df7Fd2CC256f93a39ced7}

      # Blockchain RPC Endpoints
      BSC_MAINNET_RPC_URL: ${BSC_MAINNET_RPC_URL:-https://bsc-dataseed1.binance.org}
      BSC_TESTNET_RPC_URL: ${BSC_TESTNET_RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545}

      # Blockchain Settings
      BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS: ${BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS:-120}
      BSC_REQUIRED_CONFIRMATIONS: ${BSC_REQUIRED_CONFIRMATIONS:-12}
      BSC_TESTNET_REQUIRED_CONFIRMATIONS: ${BSC_TESTNET_REQUIRED_CONFIRMATIONS:-6}
      MAX_PAYMENT_AGE_MINUTES: ${MAX_PAYMENT_AGE_MINUTES:-30}

      # Server Configuration
      HOST: 0.0.0.0
      PORT: 8080
    networks:
      - epsx_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - "8080:8080"

  # Database Migrations
  migrator:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: epsx-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Connection
      DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-epsx_dev}
      PAYMENTS_DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/epsx_payments_dev
      NOTIFICATIONS_DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/epsx_notifications_dev
      ANALYTICS_DATABASE_URL: postgresql://${DB_USER:-epsx_user}:${DB_PASSWORD:-password}@postgres:5432/epsx_analytics_dev
      RUST_LOG: info
    command: ["./migrate", "up"]
    networks:
      - epsx_internal
    restart: on-failure

networks:
  epsx_internal:
    driver: bridge
    name: epsx_network

volumes:
  postgres_data:
    name: epsx_postgres_data
  redis_data:
    name: epsx_redis_data
