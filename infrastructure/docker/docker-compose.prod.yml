# EPSX Platform - Production Docker Compose
# Server: Mac Mini (arm64, 48GB RAM, 16 cores) with Cloudflare Tunnel
# Usage: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# NOTE: Uses pre-built images (no build context on server).
# Images are built on local Mac and transferred via docker save/load.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    container_name: epsx-prod-postgres
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases-prod.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - epsx_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "4"
        reservations:
          memory: 2G
          cpus: "1"
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: epsx-prod-redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - prod_redis_data:/data
      - ./config/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - epsx_prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  backend:
    image: epsx-backend:prod
    container_name: epsx-prod-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      NODE_ENV: ${NODE_ENV}
      RUST_ENV: ${RUST_ENV}
      RUST_LOG: ${RUST_LOG}
      LOG_LEVEL: ${LOG_LEVEL}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS}
      DATABASE_ACQUIRE_TIMEOUT: ${DATABASE_ACQUIRE_TIMEOUT}
      DATABASE_IDLE_TIMEOUT: ${DATABASE_IDLE_TIMEOUT}
      ANALYTICS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_analytics_prod?sslmode=disable
      NOTIFICATIONS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_notifications_prod?sslmode=disable
      PAYMENTS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_payments_prod?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WEB3_APP_SECRET: ${WEB3_APP_SECRET}
      WALLET_SIGNATURE_SECRET: ${WALLET_SIGNATURE_SECRET}
      WEB3_SESSION_SECRET: ${WEB3_SESSION_SECRET}
      WEB3_SESSION_DURATION_HOURS: ${WEB3_SESSION_DURATION_HOURS}
      WEB3_SIGNATURE_TIMEOUT_MINUTES: ${WEB3_SIGNATURE_TIMEOUT_MINUTES}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      COMPANY_WALLET_MAINNET: ${COMPANY_WALLET_MAINNET}
      COMPANY_WALLET_TESTNET: ${COMPANY_WALLET_TESTNET}
      BSC_MAINNET_RPC_URL: ${BSC_MAINNET_RPC_URL}
      BSC_TESTNET_RPC_URL: ${BSC_TESTNET_RPC_URL}
      BSC_RPC_URL: ${BSC_MAINNET_RPC_URL}
      PAYMENT_RECEIVER_ADDRESS: ${NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET}
      PAYMENT_ESCROW_ADDRESS: ${NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET}
      BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS: ${BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS}
      BSC_REQUIRED_CONFIRMATIONS: ${BSC_REQUIRED_CONFIRMATIONS}
      BSC_TESTNET_REQUIRED_CONFIRMATIONS: ${BSC_TESTNET_REQUIRED_CONFIRMATIONS}
      MAX_PAYMENT_AGE_MINUTES: ${MAX_PAYMENT_AGE_MINUTES}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "127.0.0.1:9180:8080"
    networks:
      epsx_prod:
        aliases:
          - epsx-backend.epsx-prod.svc.cluster.local
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4"
        reservations:
          memory: 512M
          cpus: "1"
    logging: *default-logging

  frontend:
    image: epsx-frontend:prod
    container_name: epsx-prod-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      ENV: ${ENV}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
      NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET: ${NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET:-${PAYMENT_ESCROW_CONTRACT_MAINNET:-}}
      NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET: ${NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET:-${COMPANY_WALLET_MAINNET}}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      NEXT_PUBLIC_OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      NEXT_PUBLIC_CDN_URL: ${MINIO_PUBLIC_URL}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:4700:3000"
    networks:
      epsx_prod:
        aliases:
          - epsx-frontend.epsx-prod.svc.cluster.local
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  admin-frontend:
    image: epsx-admin-frontend:prod
    container_name: epsx-prod-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      ENV: ${ENV}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_APP_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
      NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET: ${NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET:-${PAYMENT_ESCROW_CONTRACT_MAINNET:-}}
      NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET: ${NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET:-${COMPANY_WALLET_MAINNET}}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      NEXT_PUBLIC_OAUTH_CLIENT_ID: epsx-admin
      NEXT_PUBLIC_CDN_URL: ${MINIO_PUBLIC_URL}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:4701:3000"
    networks:
      epsx_prod:
        aliases:
          - epsx-admin.epsx-prod.svc.cluster.local
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: epsx-prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - prod_minio_data:/data
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    networks:
      epsx_prod:
        aliases:
          - epsx-minio.epsx-prod.svc.cluster.local
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: epsx-prod-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - /Users/fluke/Desktop/Work/epsx/infrastructure/cloudflare/cloudflared-config.prod.yml:/etc/cloudflared/config.yml:ro
      - /Users/fluke/.cloudflared/6bee9b58-eede-4b4c-815c-94c0ee38fe58.json:/etc/cloudflared/6bee9b58-eede-4b4c-815c-94c0ee38fe58.json:ro
    networks:
      - epsx_prod
      - epsx_gitlab
      - epsx_review
      - epsx_dev
      - epsx_staging
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1"
        reservations:
          memory: 64M
          cpus: "0.25"
    logging: *default-logging

networks:
  epsx_prod:
    driver: bridge
    name: epsx_prod_network
  epsx_gitlab:
    external: true
    name: epsx_gitlab_network
  epsx_review:
    external: true
    name: epsx_review_network
  epsx_dev:
    external: true
    name: epsx_dev_network
  epsx_staging:
    external: true
    name: epsx_staging_network

volumes:
  prod_postgres_data:
    name: epsx_prod_postgres_data
  prod_redis_data:
    name: epsx_prod_redis_data
  prod_minio_data:
    name: epsx_prod_minio_data
