# EPSX Platform - Staging Docker Compose
# Server: Mac Mini (arm64, 48GB RAM) — coexists with prod + dev
# Usage: docker compose --env-file .env.staging -f docker-compose.staging.yml up -d
#
# Routing: prod cloudflared joins epsx_staging_network and routes
# staging.epsx.io / staging-admin.epsx.io / staging-api.epsx.io

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    container_name: epsx-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases-staging.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT:-5434}:5432"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: epsx-staging-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - staging_redis_data:/data
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "${REDIS_PORT:-6381}:6379"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: epsx-staging-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - staging_minio_data:/data
    ports:
      - "127.0.0.1:9300:9000"
      - "127.0.0.1:9301:9001"
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

  backend:
    image: epsx-backend:staging
    container_name: epsx-staging-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      NODE_ENV: ${NODE_ENV}
      RUST_ENV: ${RUST_ENV}
      RUST_LOG: ${RUST_LOG}
      LOG_LEVEL: ${LOG_LEVEL}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS}
      DATABASE_ACQUIRE_TIMEOUT: ${DATABASE_ACQUIRE_TIMEOUT}
      DATABASE_IDLE_TIMEOUT: ${DATABASE_IDLE_TIMEOUT}
      ANALYTICS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_analytics_staging?sslmode=disable
      NOTIFICATIONS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_notifications_staging?sslmode=disable
      PAYMENTS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_payments_staging?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WEB3_APP_SECRET: ${WEB3_APP_SECRET}
      WALLET_SIGNATURE_SECRET: ${WALLET_SIGNATURE_SECRET}
      WEB3_SESSION_SECRET: ${WEB3_SESSION_SECRET}
      WEB3_SESSION_DURATION_HOURS: ${WEB3_SESSION_DURATION_HOURS}
      WEB3_SIGNATURE_TIMEOUT_MINUTES: ${WEB3_SIGNATURE_TIMEOUT_MINUTES}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      COMPANY_WALLET_MAINNET: ${COMPANY_WALLET_MAINNET}
      COMPANY_WALLET_TESTNET: ${COMPANY_WALLET_TESTNET}
      BSC_MAINNET_RPC_URL: ${BSC_MAINNET_RPC_URL}
      BSC_TESTNET_RPC_URL: ${BSC_TESTNET_RPC_URL}
      BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS: ${BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS}
      BSC_REQUIRED_CONFIRMATIONS: ${BSC_REQUIRED_CONFIRMATIONS}
      BSC_TESTNET_REQUIRED_CONFIRMATIONS: ${BSC_TESTNET_REQUIRED_CONFIRMATIONS}
      MAX_PAYMENT_AGE_MINUTES: ${MAX_PAYMENT_AGE_MINUTES}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9300}
      HOST: 0.0.0.0
      PORT: 8080
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  frontend:
    image: epsx-frontend:staging
    container_name: epsx-staging-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      ENV: ${ENV}
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

  admin-frontend:
    image: epsx-admin-frontend:staging
    container_name: epsx-staging-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      ENV: ${ENV}
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_APP_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

networks:
  epsx_staging:
    external: true
    name: epsx_staging_network

volumes:
  staging_postgres_data:
    name: epsx_staging_postgres_data
  staging_redis_data:
    name: epsx_staging_redis_data
  staging_minio_data:
    name: epsx_staging_minio_data
