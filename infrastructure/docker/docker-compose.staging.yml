# EPSX Platform - Staging Docker Compose (infra + Traefik only)
# App services run as standalone revision containers via CI deploy:staging:revision
# Routing: prod cloudflared → Traefik → staging revision containers
# Usage: docker compose --env-file .env.staging -f docker-compose.staging.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    container_name: epsx-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases-staging.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT:-5434}:5432"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: epsx-staging-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - staging_redis_data:/data
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "${REDIS_PORT:-6381}:6379"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: epsx-staging-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - staging_minio_data:/data
    ports:
      - "127.0.0.1:9300:9000"
      - "127.0.0.1:9301:9001"
    networks:
      - epsx_staging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

  traefik:
    image: traefik:v3.2
    container_name: epsx-staging-traefik
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.network=epsx_staging_network
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic/
      - --providers.file.watch=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /Users/fluke/epsx-runner/traefik/staging/:/etc/traefik/dynamic/:ro
    networks:
      - epsx_staging
    ports:
      - "127.0.0.1:4810:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging

networks:
  epsx_staging:
    external: true
    name: epsx_staging_network

volumes:
  staging_postgres_data:
    name: epsx_staging_postgres_data
  staging_redis_data:
    name: epsx_staging_redis_data
  staging_minio_data:
    name: epsx_staging_minio_data
