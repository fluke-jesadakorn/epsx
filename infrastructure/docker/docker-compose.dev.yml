# EPSX Platform - Development Docker Compose (routing only)
# Server: Mac Mini (arm64, 48GB RAM) — coexists with prod + staging
# Usage: docker compose --env-file .env.dev -f docker-compose.dev.yml up -d
#
# Bare metal services (not in this compose):
#   PostgreSQL 17 — brew services start postgresql@17 (port 5432, DB: epsx_dev)
#   Redis 8       — brew services start redis (port 6379, DB 0 = dev)
#   MinIO         — launchctl load ~/Library/LaunchAgents/com.epsx.minio.plist (ports 9100/9101)
#   Cloudflared   — launchctl load ~/Library/LaunchAgents/com.epsx.cloudflared.plist
#
# App services (backend :8080, frontend :3000, admin :3001) run locally via `bun dev`.
# Cloudflare tunnel (bare metal) routes dev.epsx.io / dev-admin.epsx.io / dev-api.epsx.io
# directly to localhost so they reach the locally-running bun dev processes.

name: epsx-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik:
    image: traefik:v3.2
    container_name: epsx-dev-traefik
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.network=epsx_dev_network
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic/
      - --providers.file.watch=true
    extra_hosts:
      - "host.docker.internal:${HOST_IP:-192.168.0.33}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /Users/fluke/epsx-runner/traefik/:/etc/traefik/dynamic/:ro
    networks:
      - epsx_dev
    ports:
      - "127.0.0.1:4800:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging

  # wave49(slice-1): pay.epsx.io microservice (dev).
  pay-svc:
    image: epsx-pay-svc:wave49-dev
    container_name: epsx-dev-pay-svc
    restart: unless-stopped
    environment:
      ENV: ${ENV}
      RUST_ENV: development
      RUST_LOG: info,epsx=debug
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/epsx_pay?sslmode=disable
      CHAIN_ID: ${CHAIN_ID:-56}
      ESCROW_CONTRACT: ${PAYMENT_ESCROW_CONTRACT_MAINNET:-0}
      PORT: 8103
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:8103:8103"
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8103/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
        reservations: { memory: 64M, cpus: "0.1" }
    logging: *default-logging

  pay-bff:
    image: epsx-pay-bff:wave49-dev
    container_name: epsx-dev-pay-bff
    restart: unless-stopped
    depends_on:
      pay-svc:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      RUST_ENV: development
      RUST_LOG: info,epsx=debug
      API_URL: http://pay-svc:8103
      PORT: 3002
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
        reservations: { memory: 64M, cpus: "0.1" }
    logging: *default-logging

networks:
  epsx_dev:
    external: true
    name: epsx_dev_network
