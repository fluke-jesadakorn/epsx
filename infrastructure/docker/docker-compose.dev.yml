# EPSX Platform - Development Docker Compose (infra only)
# Server: Mac Mini (arm64, 48GB RAM) — coexists with prod + staging
# Usage: docker compose --env-file .env.dev -f docker-compose.dev.yml up -d
#
# App services (backend :8080, frontend :3000, admin :3001) run locally via `bun dev`.
# Cloudflare tunnel routes dev.epsx.io / dev-admin.epsx.io / dev-api.epsx.io
# to host.docker.internal so they reach the locally-running bun dev processes.

name: epsx-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    container_name: epsx-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases-dev.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT:-5433}:5432"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
        reservations:
          memory: 1G
          cpus: "0.5"
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: epsx-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - dev_redis_data:/data
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "${REDIS_PORT:-6380}:6379"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: epsx-dev-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:${HOST_IP:-192.168.0.33}"
    volumes:
      - /Users/fluke/Desktop/Work/epsx/infrastructure/cloudflare/cloudflared-config.dev.yml:/etc/cloudflared/config.yml:ro
    networks:
      - epsx_dev
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
          cpus: "0.1"
    logging: *default-logging

  traefik:
    image: traefik:v3.2
    container_name: epsx-dev-traefik
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.network=epsx_dev_network
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic/
      - --providers.file.watch=true
    extra_hosts:
      - "host.docker.internal:${HOST_IP:-192.168.0.33}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /Users/fluke/epsx-runner/traefik/:/etc/traefik/dynamic/:ro
    networks:
      - epsx_dev
    ports:
      - "127.0.0.1:4800:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: epsx-dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - dev_minio_data:/data
    ports:
      - "127.0.0.1:9200:9000"
      - "127.0.0.1:9201:9001"
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging

networks:
  epsx_dev:
    external: true
    name: epsx_dev_network

volumes:
  dev_postgres_data:
    name: epsx_dev_postgres_data
  dev_redis_data:
    name: epsx_dev_redis_data
  dev_minio_data:
    name: epsx_dev_minio_data
