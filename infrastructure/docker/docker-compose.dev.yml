# EPSX Platform - Development Docker Compose (routing only)
# Server: Mac Mini (arm64, 48GB RAM) — coexists with prod + staging
# Usage: docker compose --env-file .env.dev -f docker-compose.dev.yml up -d
#
# Bare metal services (not in this compose):
#   PostgreSQL 17 — brew services start postgresql@17 (port 5432, DB: epsx_dev)
#   Redis 8       — brew services start redis (port 6379, DB 0 = dev)
#   MinIO         — launchctl load ~/Library/LaunchAgents/com.epsx.minio.plist (ports 9100/9101)
#   Cloudflared   — launchctl load ~/Library/LaunchAgents/com.epsx.cloudflared.plist
#
# App services (backend :8080, frontend :3000, admin :3001) run locally via `bun dev`.
# Cloudflare tunnel (bare metal) routes dev.epsx.io / dev-admin.epsx.io / dev-api.epsx.io
# directly to localhost so they reach the locally-running bun dev processes.

name: epsx-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik:
    image: traefik:v3.2
    container_name: epsx-dev-traefik
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.network=epsx_dev_network
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic/
      - --providers.file.watch=true
    extra_hosts:
      - "host.docker.internal:${HOST_IP:-192.168.0.33}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /Users/fluke/epsx-runner/traefik/:/etc/traefik/dynamic/:ro
    networks:
      - epsx_dev
    ports:
      - "127.0.0.1:4800:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging

networks:
  epsx_dev:
    external: true
    name: epsx_dev_network
