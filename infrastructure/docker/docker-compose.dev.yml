# EPSX Platform - Development Docker Compose
# Server: Mac Mini (arm64) with Cloudflare Tunnel
# Usage: docker compose --env-file .env.dev -f docker-compose.dev.yml up -d
#
# NOTE: Uses pre-built images (no build context on server).
# Images are built on local Mac and transferred via docker save/load.
# Ports offset from prod (DB: 5433, Redis: 6380) to allow co-existence.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: epsx-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases-dev.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT:-5433}:5432"

  # Redis Cache and Session Store
  redis:
    image: redis:7-alpine
    container_name: epsx-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - dev_redis_data:/data
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "${REDIS_PORT:-6380}:6379"

  # Rust Backend API
  backend:
    image: epsx-backend:dev
    container_name: epsx-dev-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Environment
      ENV: ${ENV}
      NODE_ENV: ${NODE_ENV}
      RUST_ENV: ${RUST_ENV}
      RUST_LOG: ${RUST_LOG}
      LOG_LEVEL: ${LOG_LEVEL}

      # Service URLs
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_FRONTEND_URL: ${ADMIN_FRONTEND_URL}

      # Database (main)
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS}
      DATABASE_ACQUIRE_TIMEOUT: ${DATABASE_ACQUIRE_TIMEOUT}
      DATABASE_IDLE_TIMEOUT: ${DATABASE_IDLE_TIMEOUT}

      # Additional Databases (same host, different DBs)
      ANALYTICS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_analytics_dev
      NOTIFICATIONS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_notifications_dev
      PAYMENTS_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/epsx_payments_dev

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # Web3 Authentication
      WEB3_APP_SECRET: ${WEB3_APP_SECRET}
      WALLET_SIGNATURE_SECRET: ${WALLET_SIGNATURE_SECRET}
      WEB3_SESSION_SECRET: ${WEB3_SESSION_SECRET}
      WEB3_SESSION_DURATION_HOURS: ${WEB3_SESSION_DURATION_HOURS}
      WEB3_SIGNATURE_TIMEOUT_MINUTES: ${WEB3_SIGNATURE_TIMEOUT_MINUTES}
      JWT_SECRET: ${JWT_SECRET}

      # Blockchain Configuration
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      COMPANY_WALLET_MAINNET: ${COMPANY_WALLET_MAINNET}
      COMPANY_WALLET_TESTNET: ${COMPANY_WALLET_TESTNET}

      # Blockchain RPC Endpoints
      BSC_MAINNET_RPC_URL: ${BSC_MAINNET_RPC_URL}
      BSC_TESTNET_RPC_URL: ${BSC_TESTNET_RPC_URL}

      # Blockchain Settings
      BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS: ${BLOCKCHAIN_CONFIRMATION_TIMEOUT_SECONDS}
      BSC_REQUIRED_CONFIRMATIONS: ${BSC_REQUIRED_CONFIRMATIONS}
      BSC_TESTNET_REQUIRED_CONFIRMATIONS: ${BSC_TESTNET_REQUIRED_CONFIRMATIONS}
      MAX_PAYMENT_AGE_MINUTES: ${MAX_PAYMENT_AGE_MINUTES}

      # Server Configuration
      HOST: 0.0.0.0
      PORT: 8080
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend
  frontend:
    image: epsx-frontend:dev
    container_name: epsx-dev-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      ENV: ${ENV}
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
      NEXT_PUBLIC_PAYMENT_MAINNET_ADDRESS: ${COMPANY_WALLET_MAINNET}
      NEXT_PUBLIC_PAYMENT_TESTNET_ADDRESS: ${COMPANY_WALLET_TESTNET}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Admin Frontend
  admin-frontend:
    image: epsx-admin-frontend:dev
    container_name: epsx-dev-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      ENV: ${ENV}
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_APP_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_FRONTEND_URL}
      NEXT_PUBLIC_BLOCKCHAIN_NETWORK: ${BLOCKCHAIN_NETWORK}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
      NEXT_PUBLIC_PAYMENT_MAINNET_ADDRESS: ${COMPANY_WALLET_MAINNET}
      NEXT_PUBLIC_PAYMENT_TESTNET_ADDRESS: ${COMPANY_WALLET_TESTNET}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    networks:
      - epsx_dev
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: epsx-dev-cloudflared
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      admin-frontend:
        condition: service_healthy
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - epsx_dev

networks:
  epsx_dev:
    driver: bridge
    name: epsx_dev_network

volumes:
  dev_postgres_data:
    name: epsx_dev_postgres_data
  dev_redis_data:
    name: epsx_dev_redis_data
