# ============================================================================
# Cloudflare Tunnel Configuration - EPSX Platform
# ============================================================================
# Routes traffic from Cloudflare's edge network to internal Docker services
# All services run on internal Docker network with no exposed ports

# Tunnel connection settings
tunnel: ${TUNNEL_TOKEN}
credentials-file: /etc/cloudflared/credentials.json

# Ingress rules - route traffic to internal services
ingress:
  # Frontend - Main user application
  - hostname: dev.epsx.io
    service: http://frontend:3000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false
      http2Origin: true

  # Admin Frontend - Administrative dashboard
  - hostname: dev-admin.epsx.io
    service: http://admin-frontend:3000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false
      http2Origin: true

  # Backend API - Rust API server
  - hostname: dev-api.epsx.io
    service: http://backend:8080
    originRequest:
      connectTimeout: 30s
      noTLSVerify: false
      http2Origin: true

  # Catch-all rule (required by Cloudflare Tunnel)
  - service: http_status:404

# Logging configuration
loglevel: info

# Metrics (optional - for monitoring tunnel health)
metrics: 0.0.0.0:2000

# Protocol optimizations
protocol: quic

# No automatic updates in production
no-autoupdate: true

# ============================================================================
# DNS CONFIGURATION REQUIRED
# ============================================================================
# Before running, configure these CNAME records in Cloudflare DNS:
#
# Record Type: CNAME
# Name: dev.epsx.io
# Target: <tunnel-id>.cfargotunnel.com
# Proxy: Yes (Orange cloud)
#
# Record Type: CNAME
# Name: dev-admin.epsx.io
# Target: <tunnel-id>.cfargotunnel.com
# Proxy: Yes (Orange cloud)
#
# Record Type: CNAME
# Name: dev-api.epsx.io
# Target: <tunnel-id>.cfargotunnel.com
# Proxy: Yes (Orange cloud)
# ============================================================================
