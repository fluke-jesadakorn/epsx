# ============================================================================
# Cloudflare Tunnel Configuration - EPSX Dev
# ============================================================================
# Routes dev.epsx.io / dev-admin.epsx.io / dev-api.epsx.io
# to the host machine where `bun dev` runs (ports 3000, 3001, 8080).
# Token-based auth — no credentials JSON needed.

ingress:
  - hostname: dev.epsx.io
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s

  - hostname: dev-admin.epsx.io
    service: http://localhost:3001
    originRequest:
      connectTimeout: 30s

  - hostname: dev-api.epsx.io
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s

  # wave49(slice-1): dev-pay.epsx.io → pay BFF.
  # In dev, we route the pay BFF through the same host
  # port mapping as prod (port-bridge 4747 → NodePort
  # 30082 → epsx-pay-svc:8103). Local smoke tests can
  # also hit http://localhost:3002 directly.
  - hostname: dev-pay.epsx.io
    service: http://localhost:4747
    originRequest:
      connectTimeout: 30s

  - service: http_status:404

loglevel: info
protocol: quic
no-autoupdate: true
