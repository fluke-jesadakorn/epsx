# ============================================================================
# Cloudflare Tunnel Configuration - EPSX Dev
# ============================================================================
# Routes dev.epsx.io / dev-admin.epsx.io / dev-api.epsx.io
# to the host machine where `bun dev` runs (ports 3000, 3001, 8080).
# Token-based auth — no credentials JSON needed.

ingress:
  - hostname: dev.epsx.io
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s

  - hostname: dev-admin.epsx.io
    service: http://localhost:3001
    originRequest:
      connectTimeout: 30s

  - hostname: dev-api.epsx.io
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s

  # wave49(slice-1, slice-6): dev-pay.epsx.io → dev pay BFF.
  # Routes through port-bridge 4749 (host) → NodePort 30106
  # (colima) → epsx-pay-svc in the `epsx-dev` namespace.
  # Distinguished from the staging route by the 4749 port
  # (vs 4747 for staging); DNS records are created with
  # `infrastructure/scripts/dns-create-pay.sh dev-pay.epsx.io`.
  - hostname: dev-pay.epsx.io
    service: http://localhost:4749
    originRequest:
      connectTimeout: 30s

  # wave49(slice-6): staging-pay.epsx.io → staging pay BFF.
  # Routes through port-bridge 4747 (host) → NodePort 30082
  # (colima) → epsx-pay-svc in the `epsx-staging` namespace.
  # Operators create the DNS record with
  # `infrastructure/scripts/dns-create-pay.sh staging-pay.epsx.io`.
  - hostname: staging-pay.epsx.io
    service: http://localhost:4747
    originRequest:
      connectTimeout: 30s

  - service: http_status:404

loglevel: info
protocol: quic
no-autoupdate: true
