# ============================================================================
# Cloudflare Tunnel Configuration - EPSX Production
# ============================================================================
# Routes non-frontend production hostnames through the EPSX production tunnel.

tunnel: 6bee9b58-eede-4b4c-815c-94c0ee38fe58
credentials-file: /etc/cloudflared/6bee9b58-eede-4b4c-815c-94c0ee38fe58.json

ingress:
  - hostname: api.epsx.io
    service: http://localhost:30080
    originRequest:
      connectTimeout: 30s

  # wave49(slice-1): pay.epsx.io → pay BFF (3002).
  # Routes via the `com.epsx.pay-port-bridge` LaunchAgent
  # on the host (4747 → 30082 → epsx-pay-svc:8103).
  # The BFF then internally dials the service in-cluster
  # via `API_URL=http://epsx-pay-svc:8103`.
  - hostname: pay.epsx.io
    service: http://localhost:4747
    originRequest:
      connectTimeout: 30s

  - hostname: minio.epsx.io
    service: http://localhost:9100
    originRequest:
      connectTimeout: 30s

  - service: http_status:404

loglevel: info
protocol: quic
no-autoupdate: true
