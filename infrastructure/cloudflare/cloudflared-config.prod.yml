# ============================================================================
# Cloudflare Tunnel Configuration - EPSX Production
# ============================================================================
# Routes epsx.io / admin.epsx.io / api.epsx.io
# to Colima K8s NodePort services on localhost.

tunnel: 6bee9b58-eede-4b4c-815c-94c0ee38fe58
credentials-file: /etc/cloudflared/6bee9b58-eede-4b4c-815c-94c0ee38fe58.json

ingress:
  - hostname: epsx.io
    service: http://localhost:30000
    originRequest:
      connectTimeout: 30s

  - hostname: admin.epsx.io
    service: http://localhost:30001
    originRequest:
      connectTimeout: 30s

  - hostname: api.epsx.io
    service: http://localhost:30080
    originRequest:
      connectTimeout: 30s

  - hostname: minio.epsx.io
    service: http://localhost:9100
    originRequest:
      connectTimeout: 30s

  - service: http_status:404

loglevel: info
protocol: quic
no-autoupdate: true
