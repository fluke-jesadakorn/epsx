# ============================================================================
# Cloudflare Tunnel Configuration - EPSX Production
# ============================================================================
# Tunnel ID: 6bee9b58-eede-4b4c-815c-94c0ee38fe58
# Routes: all environments + gitlab + registry + storage
# Credentials JSON must exist at: ~/.cloudflared/6bee9b58-eede-4b4c-815c-94c0ee38fe58.json
# This file is mounted into the cloudflared container from the repo path.

tunnel: 6bee9b58-eede-4b4c-815c-94c0ee38fe58
credentials-file: /etc/cloudflared/6bee9b58-eede-4b4c-815c-94c0ee38fe58.json

ingress:
  # Production environment
  - hostname: epsx.io
    service: http://epsx-prod-frontend:3000
    originRequest:
      connectTimeout: 30s

  - hostname: admin.epsx.io
    service: http://epsx-prod-admin:3000
    originRequest:
      connectTimeout: 30s

  - hostname: api.epsx.io
    service: http://epsx-prod-backend:8080
    originRequest:
      connectTimeout: 30s

  # GitLab CE - CI/CD platform
  - hostname: gitlab.jesadakorn.com
    service: http://epsx-gitlab:80
    originRequest:
      connectTimeout: 60s

  # GitLab Container Registry
  - hostname: registry.jesadakorn.com
    service: http://epsx-gitlab:5050
    originRequest:
      connectTimeout: 60s

  # Review Apps - Traefik routes to per-MR containers
  - hostname: "*.review.epsx.io"
    service: http://epsx-traefik:80
    originRequest:
      connectTimeout: 30s

  # Dev environment (routes to host machine where `bun dev` runs)
  - hostname: dev.epsx.io
    service: http://host.docker.internal:3000
    originRequest:
      connectTimeout: 30s
  - hostname: dev-admin.epsx.io
    service: http://host.docker.internal:3001
    originRequest:
      connectTimeout: 30s
  - hostname: dev-api.epsx.io
    service: http://host.docker.internal:8080
    originRequest:
      connectTimeout: 30s

  # Staging environment
  - hostname: staging.epsx.io
    service: http://epsx-staging-frontend:3000
    originRequest:
      connectTimeout: 30s
  - hostname: staging-admin.epsx.io
    service: http://epsx-staging-admin:3000
    originRequest:
      connectTimeout: 30s
  - hostname: staging-api.epsx.io
    service: http://epsx-staging-backend:8080
    originRequest:
      connectTimeout: 30s

  # MinIO Console - storage management UI
  - hostname: storage.epsx.io
    service: http://epsx-prod-minio:9001
    originRequest:
      connectTimeout: 30s

  # MinIO S3 API - CDN / public bucket access
  - hostname: cdn.epsx.io
    service: http://epsx-prod-minio:9000
    originRequest:
      connectTimeout: 30s

  # Catch-all rule (required by Cloudflare Tunnel)
  - service: http_status:404

loglevel: info
protocol: http2
no-autoupdate: true
