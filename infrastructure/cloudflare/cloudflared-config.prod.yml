# ============================================================================
# Cloudflare Tunnel Configuration - EPSX Production
# ============================================================================
# Routes epsx.io / admin.epsx.io / api.epsx.io
# to Docker containers on the internal network.

tunnel: 6bee9b58-eede-4b4c-815c-94c0ee38fe58
credentials-file: /etc/cloudflared/6bee9b58-eede-4b4c-815c-94c0ee38fe58.json

ingress:
  - hostname: epsx.io
    service: http://frontend:3000
    originRequest:
      connectTimeout: 30s

  - hostname: admin.epsx.io
    service: http://admin-frontend:3000
    originRequest:
      connectTimeout: 30s

  - hostname: api.epsx.io
    service: http://backend:8080
    originRequest:
      connectTimeout: 30s

  - hostname: minio.epsx.io
    service: http://minio:9000
    originRequest:
      connectTimeout: 30s

  - service: http_status:404

loglevel: info
protocol: quic
no-autoupdate: true
