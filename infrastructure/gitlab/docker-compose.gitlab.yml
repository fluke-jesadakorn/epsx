# EPSX GitLab CE - Self-Hosted CI/CD Platform
# Mac Mini (arm64, 48GB RAM) — Docker Compose deployment
# Usage: docker compose -f docker-compose.gitlab.yml --env-file .env.gitlab up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: epsx-gitlab
    restart: unless-stopped
    hostname: ${GITLAB_HOSTNAME}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        # External URLs
        external_url 'https://${GITLAB_HOSTNAME}'
        registry_external_url 'https://${REGISTRY_HOSTNAME}'

        # Registry — nginx on 5050 proxies to registry on 5000
        registry['enable'] = true
        registry['registry_http_addr'] = '0.0.0.0:5000'
        registry_nginx['listen_port'] = 5050
        registry_nginx['listen_https'] = false
        # Use localhost for JWT auth so CI runner doesn't need Cloudflare tunnel
        registry['token_realm'] = 'http://127.0.0.1:8929'

        # NGINX (behind Cloudflare Tunnel — no TLS termination)
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['proxy_set_headers'] = {
          "X-Forwarded-Proto" => "https",
          "X-Forwarded-Ssl" => "on"
        }
        letsencrypt['enable'] = false

        # Puma (app server) — tuned for 8GB limit
        puma['worker_processes'] = 2
        puma['min_threads'] = 1
        puma['max_threads'] = 4

        # Sidekiq — background jobs
        sidekiq['max_concurrency'] = 10
        sidekiq['min_concurrency'] = 2

        # Disable monitoring stack (saves ~2GB RAM)
        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false
        node_exporter['enable'] = false
        redis_exporter['enable'] = false
        postgres_exporter['enable'] = false
        gitlab_exporter['enable'] = false

        # Disable unused services
        gitlab_kas['enable'] = false
        gitlab_pages['enable'] = false
        sentinel['enable'] = false
        mattermost['enable'] = false

        # Disable SSH (using HTTPS only through tunnel)
        gitlab_sshd['enable'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = 0

        # Internal PostgreSQL tuning
        postgresql['shared_buffers'] = '512MB'
        postgresql['max_worker_processes'] = 4

        # Internal Redis tuning
        redis['maxmemory'] = '256mb'
        redis['maxmemory_policy'] = 'allkeys-lru'

        # Gitaly (git storage)
        gitaly['configuration'] = {
          concurrency: [{ rpc: '/gitaly.SmartHTTPService/PostReceivePack', max_per_repo: 3 }],
        }

        # Container registry garbage collection
        registry['gc'] = { disabled: false }

        # Backup
        gitlab_rails['backup_path'] = '/var/opt/gitlab/backups'
        gitlab_rails['backup_keep_time'] = 604800

        # Timezone
        gitlab_rails['time_zone'] = 'Asia/Bangkok'
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    ports:
      - "127.0.0.1:${GITLAB_HTTP_PORT:-8929}:80"
      - "127.0.0.1:${GITLAB_REGISTRY_PORT:-5050}:5050"
    networks:
      epsx_gitlab:
        aliases:
          - gitlab
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/-/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "6"
        reservations:
          memory: 4G
          cpus: "2"
    logging: *default-logging

  runner:
    image: gitlab/gitlab-runner:latest
    container_name: epsx-gitlab-runner
    restart: unless-stopped
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - epsx_gitlab
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.25"
    logging: *default-logging

  traefik:
    image: traefik:v3.3
    container_name: epsx-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=epsx_review_network"
      - "--entrypoints.web.address=:80"
      - "--log.level=WARN"
      - "--accesslog=false"
    ports:
      - "127.0.0.1:${TRAEFIK_PORT:-8930}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - epsx_review
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
          cpus: "0.1"
    logging: *default-logging

networks:
  epsx_gitlab:
    external: true
    name: epsx_gitlab_network
  epsx_review:
    external: true
    name: epsx_review_network

volumes:
  gitlab_config:
    name: epsx_gitlab_config
  gitlab_logs:
    name: epsx_gitlab_logs
  gitlab_data:
    name: epsx_gitlab_data
  runner_config:
    name: epsx_gitlab_runner_config
