# Cloud Build configuration for Frontend (Turborepo-aware)
steps:
# Step 1: Build using Turborepo from root context
- name: 'node:22-alpine'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      apk add --no-cache libc6-compat
      npm install -g pnpm@10.14.0
      pnpm install --frozen-lockfile
      pnpm turbo run build:frontend

# Step 2: Build Docker image with monorepo context
- name: 'gcr.io/cloud-builders/docker'
  env: ['DOCKER_BUILDKIT=1']
  args: 
    - 'build'
    - '-f'
    - 'apps/frontend/Dockerfile'
    - '-t'
    - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/frontend:$BUILD_ID'
    - '-t'
    - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/frontend:latest'
    - '--build-arg'
    - 'APP_URL=${_APP_URL}'
    - '--build-arg'
    - 'NEXTAUTH_SECRET=${_NEXTAUTH_SECRET}'
    - '--build-arg'
    - 'BACKEND_URL=${_BACKEND_URL}'
    - '--build-arg'
    - 'NEXT_PUBLIC_BACKEND_URL=${_NEXT_PUBLIC_BACKEND_URL}'
    - '--build-arg'
    - 'OIDC_CLIENT_ID=${_OIDC_CLIENT_ID}'
    - '--build-arg'
    - 'OIDC_CLIENT_SECRET=${_OIDC_CLIENT_SECRET}'
    - '--build-arg'
    - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
    - '--build-arg'
    - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
    - '--build-arg'
    - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
    - '--build-arg'
    - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
    - '--build-arg'
    - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
    - '--build-arg'
    - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
    - '--build-arg'
    - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}'
    - '--build-arg'
    - 'ADMIN_FRONTEND_URL=${_ADMIN_FRONTEND_URL}'
    - '--build-arg'
    - 'FRONTEND_URL=${_FRONTEND_URL}'
    - '.'  # Build from project root (monorepo context)

# Step 3: Push images
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/frontend:$BUILD_ID']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/frontend:latest']

substitutions:
  _REGION: 'us-central1'
  _REPOSITORY: 'epsx'

options:
  machineType: 'E2_HIGHCPU_8'
  
timeout: '1800s'