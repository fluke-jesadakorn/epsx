# Cloud Build configuration for Admin Frontend (Turborepo-aware)
steps:
# Step 1: Build using Turborepo from root context
- name: 'node:22-alpine'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      apk add --no-cache libc6-compat
      npm install -g pnpm@10.14.0
      pnpm install --frozen-lockfile
      pnpm turbo run build:admin

# Step 2: Build Docker image with monorepo context
- name: 'gcr.io/cloud-builders/docker'
  args: 
    - 'build'
    - '-f'
    - 'apps/admin-frontend/Dockerfile'
    - '-t'
    - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/admin:$BUILD_ID'
    - '-t'
    - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/admin:latest'
    - '--build-arg'
    - 'ADMIN_URL=${_ADMIN_URL}'
    - '--build-arg'
    - 'NEXTAUTH_SECRET=${_NEXTAUTH_SECRET}'
    - '--build-arg'
    - 'BACKEND_URL=${_BACKEND_URL}'
    - '--build-arg'
    - 'NEXT_PUBLIC_BACKEND_URL=${_NEXT_PUBLIC_BACKEND_URL}'
    - '--build-arg'
    - 'NEXT_PUBLIC_ADMIN_URL=${_NEXT_PUBLIC_ADMIN_URL}'
    - '--build-arg'
    - 'NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}'
    - '--build-arg'
    - 'OIDC_CLIENT_ID=${_OIDC_CLIENT_ID}'
    - '--build-arg'
    - 'OIDC_CLIENT_SECRET=${_OIDC_CLIENT_SECRET}'
    - '.'  # Build from project root (monorepo context)

# Step 3: Push images
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/admin:$BUILD_ID']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/admin:latest']

substitutions:
  _REGION: 'us-central1'
  _REPOSITORY: 'epsx'

options:
  machineType: 'E2_HIGHCPU_8'
  
timeout: '1800s'