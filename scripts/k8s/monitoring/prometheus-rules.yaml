apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: epsx-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/name: epsx
    app.kubernetes.io/component: monitoring
spec:
  groups:
  - name: epsx.rules
    rules:
    # Backend alerts
    - alert: BackendDown
      expr: up{job="backend-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Backend service is down"
        description: "Backend service has been down for more than 1 minute"

    - alert: BackendHighCPU
      expr: rate(container_cpu_usage_seconds_total{pod=~"backend-.*"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend high CPU usage"
        description: "Backend CPU usage is above 80% for more than 5 minutes"

    - alert: BackendHighMemory
      expr: container_memory_usage_bytes{pod=~"backend-.*"} / container_spec_memory_limit_bytes > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend high memory usage"
        description: "Backend memory usage is above 85% for more than 5 minutes"

    - alert: BackendSlowRequests
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="backend-service"}[5m])) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend slow requests"
        description: "95th percentile of request duration is above 1 second"

    # Frontend alerts
    - alert: FrontendDown
      expr: up{job="frontend-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Frontend service is down"
        description: "Frontend service has been down for more than 1 minute"

    - alert: FrontendHighCPU
      expr: rate(container_cpu_usage_seconds_total{pod=~"frontend-.*"}[5m]) > 0.7
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend high CPU usage"
        description: "Frontend CPU usage is above 70% for more than 5 minutes"

    # Database alerts
    - alert: PostgreSQLDown
      expr: up{job="postgres-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "PostgreSQL is down"
        description: "PostgreSQL database has been down for more than 1 minute"

    - alert: PostgreSQLHighConnections
      expr: pg_stat_activity_count > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL high connection count"
        description: "PostgreSQL has more than 80 active connections"

    - alert: PostgreSQLSlowQueries
      expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "PostgreSQL slow queries"
        description: "PostgreSQL average query time is above 500ms"

    # Redis alerts
    - alert: RedisDown
      expr: up{job="redis-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Redis is down"
        description: "Redis cache has been down for more than 1 minute"

    - alert: RedisHighMemory
      expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Redis high memory usage"
        description: "Redis memory usage is above 90%"

    # SSL certificate alerts
    - alert: SSLCertificateExpiring
      expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "SSL certificate expiring soon"
        description: "SSL certificate for {{ $labels.instance }} will expire in less than 7 days"

    - alert: SSLCertificateExpired
      expr: probe_ssl_earliest_cert_expiry - time() < 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "SSL certificate expired"
        description: "SSL certificate for {{ $labels.instance }} has expired"

  - name: epsx.business.rules
    rules:
    # Business metrics
    - alert: HighErrorRate
      expr: rate(http_requests_total{job="backend-service",status=~"5.."}[5m]) / rate(http_requests_total{job="backend-service"}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High error rate"
        description: "Backend error rate is above 5% for more than 5 minutes"

    - alert: High4xxRate
      expr: rate(http_requests_total{job="backend-service",status=~"4.."}[5m]) / rate(http_requests_total{job="backend-service"}[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High 4xx error rate"
        description: "Backend 4xx error rate is above 10% for more than 5 minutes"

    - alert: LowRequestRate
      expr: rate(http_requests_total{job="backend-service"}[5m]) < 0.1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Low request rate"
        description: "Backend request rate is below 0.1 req/sec for more than 10 minutes"