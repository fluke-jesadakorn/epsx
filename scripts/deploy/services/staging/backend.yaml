# EPSX Backend - Staging Environment
# Deploy: gcloud run services replace deploy/services/staging/backend.yaml --region=us-central1 --project=epsx-staging

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: backend
  labels:
    service: epsx-backend
    environment: staging
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      labels:
        service: epsx-backend
        environment: staging
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 40
      timeoutSeconds: 600
      containers:
      - name: backend
        image: us-central1-docker.pkg.dev/epsx-staging/epsx/backend:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
        startupProbe:
          tcpSocket:
            port: 8080
          timeoutSeconds: 10
          periodSeconds: 15
          failureThreshold: 8
        env:
        - name: ENV
          value: "${ENV}"
        - name: RUST_ENV
          value: "${ENV}"
        - name: NODE_ENV
          value: "${ENV}"
        - name: BACKEND_URL
          value: "${BACKEND_URL}"
        - name: FRONTEND_URL
          value: "${FRONTEND_URL}"
        - name: ADMIN_FRONTEND_URL
          value: "${ADMIN_FRONTEND_URL}"
        - name: NEXT_PUBLIC_OAUTH_CLIENT_ID
          value: "${OIDC_CLIENT_ID}"
        - name: DATABASE_URL
          value: "${DATABASE_URL}"
        - name: NEXTAUTH_SECRET
          value: "${NEXTAUTH_SECRET}"
        - name: OIDC_CLIENT_ID
          value: "${OIDC_CLIENT_ID}"
        - name: OIDC_CLIENT_SECRET
          value: "${OIDC_CLIENT_SECRET}"
        - name: OIDC_ADMIN_CLIENT_ID
          value: "${OIDC_ADMIN_CLIENT_ID}"
        - name: OIDC_ADMIN_CLIENT_SECRET
          value: "${OIDC_ADMIN_CLIENT_SECRET}"
        - name: FIREBASE_PROJECT_ID
