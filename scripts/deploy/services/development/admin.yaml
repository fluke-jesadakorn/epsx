# EPSX Admin Frontend - Development Environment
# Deploy: gcloud run services replace deploy/services/development/admin.yaml --region=us-central1 --project=epsx-development

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: admin
  labels:
    service: epsx-admin
    environment: development
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      labels:
        service: epsx-admin
        environment: development
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 1000
      timeoutSeconds: 300
      containers:
      - name: admin
        image: us-central1-docker.pkg.dev/epsx-development/epsx/admin:latest
        ports:
        - name: http1
          containerPort: 3000
        resources:
          limits:
            cpu: "0.5"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /
            port: 3000
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        env:
        - name: NODE_ENV
          value: "${NODE_ENV}"
        - name: BACKEND_URL
          value: "${BACKEND_URL}"
        - name: NEXT_PUBLIC_BACKEND_URL
          value: "${BACKEND_URL}"
        - name: NEXT_PUBLIC_APP_URL
          value: "${NEXT_PUBLIC_ADMIN_URL}"
        - name: NEXT_PUBLIC_ADMIN_URL
          value: "${NEXT_PUBLIC_ADMIN_URL}"
        - name: NEXT_PUBLIC_OAUTH_CLIENT_ID
          value: "epsx-admin"
  traffic:
  - percent: 100
    revisionName: admin-manual