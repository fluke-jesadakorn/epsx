# EPSX Backend - Development Environment
# Deploy: gcloud run services replace deploy/services/development/backend.yaml --region=us-central1 --project=epsx-development

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: backend
  labels:
    service: epsx-backend
    environment: development
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      labels:
        service: epsx-backend
        environment: development
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 20
      timeoutSeconds: 300
      containers:
      - name: backend
        image: us-central1-docker.pkg.dev/epsx-development/epsx/backend:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
        startupProbe:
          tcpSocket:
            port: 8080
          timeoutSeconds: 10
          periodSeconds: 15
          failureThreshold: 8
        env:
        - name: ENV
          value: "${ENV}"
        - name: RUST_ENV
          value: "${ENV}"
        - name: NODE_ENV
          value: "${ENV}"
        - name: BACKEND_URL
          value: "${BACKEND_URL}"
        - name: FRONTEND_URL
          value: "${FRONTEND_URL}"
        - name: ADMIN_FRONTEND_URL
          value: "${ADMIN_FRONTEND_URL}"
        - name: NEXT_PUBLIC_OAUTH_CLIENT_ID
          value: "epsx-frontend"
        - name: DATABASE_URL
          value: "postgres://dev-user:dev-password@dev-db:5432/epsx_dev?sslmode=require"
        - name: NEXTAUTH_SECRET
          value: "dev-epsx-jwt-secret-2024-secure-32-chars-minimum"
        - name: OIDC_CLIENT_ID
          value: "epsx-frontend"
        - name: OIDC_CLIENT_SECRET
          value: "dev-oidc-client-secret-replace-this"
        - name: OIDC_ADMIN_CLIENT_ID
          value: "epsx-admin"
        - name: OIDC_ADMIN_CLIENT_SECRET
          value: "dev-oidc-admin-secret-replace-this"
        - name: DATABASE_ACQUIRE_TIMEOUT
          value: "30"
        - name: DATABASE_MAX_CONNECTIONS
          value: "2"
        - name: DATABASE_IDLE_TIMEOUT
          value: "180"
        - name: SKIP_DB_TEST
          value: "false"
        - name: RUST_LOG
          value: "debug"
  traffic:
  - percent: 100
    revisionName: backend-manual