# EPSX Frontend - Production Environment
# Deploy: gcloud run services replace deploy/services/production/frontend.yaml --region=us-central1 --project=epsx-469400

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: frontend
  labels:
    service: epsx-frontend
    environment: production
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      labels:
        service: epsx-frontend
        environment: production
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 1000
      timeoutSeconds: 300
      containers:
      - name: frontend
        image: us-central1-docker.pkg.dev/epsx-469400/epsx/frontend:latest
        ports:
        - name: http1
          containerPort: 3000
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /
            port: 3000
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 6
        env:
        - name: NODE_ENV
          value: "${NODE_ENV}"
        - name: BACKEND_URL
          value: "${BACKEND_URL}"
        - name: NEXT_PUBLIC_BACKEND_URL
          value: "${NEXT_PUBLIC_BACKEND_URL}"
        - name: NEXT_PUBLIC_APP_URL
          value: "${NEXT_PUBLIC_APP_URL}"
        - name: NEXT_PUBLIC_ADMIN_URL
          value: "${NEXT_PUBLIC_ADMIN_URL}"
        - name: NEXT_PUBLIC_OAUTH_CLIENT_ID
          value: "${NEXT_PUBLIC_OAUTH_CLIENT_ID}"
        - name: NEXT_PUBLIC_FIREBASE_API_KEY
          value: "${NEXT_PUBLIC_FIREBASE_API_KEY}"
        - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
          value: "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
        - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
          value: "${NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
        - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
          value: "${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
        - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          value: "${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
        - name: NEXT_PUBLIC_FIREBASE_APP_ID
          value: "${NEXT_PUBLIC_FIREBASE_APP_ID}"
        - name: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          value: "${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}"
  traffic:
  - percent: 100
    revisionName: frontend-manual