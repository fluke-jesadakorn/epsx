# EPSX Backend - Production Environment
# Deploy: gcloud run services replace deploy/services/production/backend.yaml --region=us-central1 --project=epsx-469400

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: backend
  labels:
    service: epsx-backend
    environment: production
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      labels:
        service: epsx-backend
        environment: production
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 900
      containers:
      - name: backend
        image: us-central1-docker.pkg.dev/epsx-469400/epsx/backend:latest
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
        startupProbe:
          tcpSocket:
            port: 8080
          timeoutSeconds: 10
          periodSeconds: 15
          failureThreshold: 8
        env:
        - name: ENV
          value: "${ENV}"
        - name: RUST_ENV
          value: "${RUST_ENV}"
        - name: NODE_ENV
          value: "${NODE_ENV}"
        - name: BACKEND_URL
          value: "${BACKEND_URL}"
        - name: FRONTEND_URL
          value: "${FRONTEND_URL}"
        - name: ADMIN_FRONTEND_URL
          value: "${ADMIN_FRONTEND_URL}"
        - name: NEXT_PUBLIC_OAUTH_CLIENT_ID
          value: "${NEXT_PUBLIC_OAUTH_CLIENT_ID}"
        - name: DATABASE_URL
          value: "${DATABASE_URL}"
        - name: NEXTAUTH_SECRET
          value: "${NEXTAUTH_SECRET}"
        - name: OIDC_CLIENT_ID
          value: "${OIDC_CLIENT_ID}"
        - name: OIDC_CLIENT_SECRET
          value: "${OIDC_CLIENT_SECRET}"
        - name: OIDC_ADMIN_CLIENT_ID
          value: "${OIDC_ADMIN_CLIENT_ID}"
        - name: OIDC_ADMIN_CLIENT_SECRET
          value: "${OIDC_ADMIN_CLIENT_SECRET}"
        - name: DATABASE_CONNECTION_TIMEOUT
          value: "${DATABASE_CONNECTION_TIMEOUT}"
        - name: DATABASE_ACQUIRE_TIMEOUT
          value: "${DATABASE_ACQUIRE_TIMEOUT}"
        - name: DATABASE_MAX_CONNECTIONS
          value: "${DATABASE_MAX_CONNECTIONS}"
        - name: DATABASE_IDLE_TIMEOUT
          value: "${DATABASE_IDLE_TIMEOUT}"
        - name: SKIP_DB_TEST
          value: "${SKIP_DB_TEST}"
  traffic:
  - percent: 100
    revisionName: backend-manual