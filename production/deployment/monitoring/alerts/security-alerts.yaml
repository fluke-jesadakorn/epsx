# EPSX Production Security Alert Policies
# Critical security monitoring and alerting configuration

displayName: "EPSX Security Alerts"
documentation:
  content: "Critical security alerts for EPSX trading platform production environment"
  mimeType: "text/markdown"

policies:
  # High-Priority Security Alerts
  - displayName: "Critical Security Threat Detected"
    documentation:
      content: |
        **CRITICAL SECURITY ALERT**
        
        High-severity security threat detected in the EPSX platform.
        
        **Immediate Actions Required:**
        1. Review security dashboard for threat details
        2. Check recent access logs and audit trails
        3. Verify IP blocking and rate limiting status
        4. Contact security team if automated response insufficient
        
        **Escalation:** Page security team immediately
      mimeType: "text/markdown"
    conditions:
      - displayName: "High threat detection rate"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/security/threats_detected" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 50
          duration: "120s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_RATE"
              crossSeriesReducer: "REDUCE_SUM"
    alertStrategy:
      autoClose: "86400s"  # 24 hours
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-pager"
      - "projects/epsx-production/notificationChannels/security-slack"

  - displayName: "Brute Force Attack Detected"
    documentation:
      content: |
        **SECURITY ALERT: Brute Force Attack**
        
        Multiple failed authentication attempts detected.
        
        **Actions:**
        1. Verify IP blocking is active
        2. Check for account lockouts
        3. Review authentication logs
        4. Monitor for privilege escalation attempts
      mimeType: "text/markdown"
    conditions:
      - displayName: "High failed authentication rate"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/security/brute_force_attempts" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 20
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_RATE"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-email"
      - "projects/epsx-production/notificationChannels/security-slack"

  - displayName: "Unauthorized Admin Access Attempt"
    documentation:
      content: |
        **CRITICAL: Unauthorized Admin Access**
        
        Attempt to access admin functionality without proper authorization.
        
        **Immediate Actions:**
        1. Review admin access logs
        2. Verify admin account security
        3. Check for privilege escalation
        4. Audit recent permission changes
      mimeType: "text/markdown"
    conditions:
      - displayName: "Unauthorized admin access"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/security/unauthorized_admin_access" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 1
          duration: "60s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_SUM"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-pager"
      - "projects/epsx-production/notificationChannels/admin-team"

  - displayName: "Suspicious User Activity"
    documentation:
      content: |
        **SECURITY ALERT: Suspicious Activity**
        
        Unusual user activity patterns detected.
        
        **Actions:**
        1. Review user activity logs
        2. Check for compromised accounts
        3. Verify location-based access patterns
        4. Monitor for data exfiltration attempts
      mimeType: "text/markdown"
    conditions:
      - displayName: "High suspicious activity score"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/security/suspicious_activity_score" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 8.0
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-email"

  # Data Security Alerts
  - displayName: "Data Encryption Failure"
    documentation:
      content: |
        **CRITICAL: Data Encryption Failure**
        
        Data encryption process has failed.
        
        **Immediate Actions:**
        1. Check encryption service status
        2. Verify key management system
        3. Audit data access during failure period
        4. Escalate to security team immediately
      mimeType: "text/markdown"
    conditions:
      - displayName: "Encryption failure detected"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/security/encryption_failures" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 0
          duration: "60s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_SUM"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-pager"
      - "projects/epsx-production/notificationChannels/data-team"

  - displayName: "Audit Log Tampering Attempt"
    documentation:
      content: |
        **CRITICAL: Audit Log Tampering**
        
        Attempt to modify or delete audit logs detected.
        
        **Immediate Actions:**
        1. Secure audit log systems
        2. Review access controls
        3. Check for insider threat indicators
        4. Escalate to security lead
      mimeType: "text/markdown"
    conditions:
      - displayName: "Audit log modification attempt"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/security/audit_tampering" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 0
          duration: "60s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_SUM"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-pager"

  # Permission System Alerts
  - displayName: "Permission System Failure"
    documentation:
      content: |
        **CRITICAL: Permission System Down**
        
        Permission validation system is not responding.
        
        **Immediate Actions:**
        1. Check permission service health
        2. Verify database connectivity
        3. Review cache system status
        4. Implement emergency access controls
      mimeType: "text/markdown"
    conditions:
      - displayName: "Permission service health check failed"
        conditionAbsent:
          filter: 'metric.type="custom.googleapis.com/epsx/permissions/health_check" resource.type="global"'
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-pager"
      - "projects/epsx-production/notificationChannels/engineering-team"

  - displayName: "High Permission Denial Rate"
    documentation:
      content: |
        **SECURITY ALERT: High Permission Denials**
        
        Unusually high rate of permission denials detected.
        
        **Actions:**
        1. Review recent permission changes
        2. Check for configuration errors
        3. Verify user role assignments
        4. Monitor for privilege escalation attempts
      mimeType: "text/markdown"
    conditions:
      - displayName: "High permission denial rate"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/permissions/denials_per_second" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 50
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_RATE"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-email"

  # Session Security Alerts
  - displayName: "Session Hijacking Detected"
    documentation:
      content: |
        **SECURITY ALERT: Session Hijacking**
        
        Potential session hijacking attempt detected.
        
        **Actions:**
        1. Terminate suspicious sessions
        2. Review session validation logs
        3. Check for IP/location anomalies
        4. Force re-authentication if needed
      mimeType: "text/markdown"
    conditions:
      - displayName: "Session hijacking indicators"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/sessions/hijacking_attempts" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 1
          duration: "60s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_SUM"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-email"
      - "projects/epsx-production/notificationChannels/security-slack"

  - displayName: "Excessive Session Creation"
    documentation:
      content: |
        **SECURITY ALERT: Session Abuse**
        
        Unusually high rate of session creation from single source.
        
        **Actions:**
        1. Review session creation patterns
        2. Check for automated attacks
        3. Implement rate limiting if needed
        4. Monitor resource consumption
      mimeType: "text/markdown"
    conditions:
      - displayName: "High session creation rate"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/sessions/creation_rate" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 100
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_RATE"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-email"


# Notification Channels Configuration
notificationChannels:
  - type: "email"
    displayName: "Security Team Email"
    labels:
      email_address: "security@epsx.io"
    
  - type: "slack"
    displayName: "Security Slack Channel"
    labels:
      channel_name: "#security-alerts"
      url: "${SECURITY_SLACK_WEBHOOK_URL}"
    
  - type: "pagerduty"
    displayName: "Security Pager"
    labels:
      service_key: "${SECURITY_PAGERDUTY_KEY}"
    
  - type: "email"
    displayName: "Admin Team"
    labels:
      email_address: "admin@epsx.io"
    
    
  - type: "email"
    displayName: "Engineering Team"
    labels:
      email_address: "engineering@epsx.io"
    
  - type: "email"
    displayName: "Data Team"
    labels:
      email_address: "data@epsx.io"
    
  - type: "email"
    displayName: "Legal Team"
    labels:
      email_address: "legal@epsx.io"