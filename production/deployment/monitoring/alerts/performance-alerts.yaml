# EPSX Production Performance Alert Policies
# Performance monitoring and SLA alerting configuration

displayName: "EPSX Performance Alerts"
documentation:
  content: "Performance and SLA monitoring alerts for EPSX trading platform"
  mimeType: "text/markdown"

policies:
  # Critical Performance Alerts
  - displayName: "API Response Time SLA Breach"
    documentation:
      content: |
        **PERFORMANCE ALERT: SLA Breach**
        
        API response times exceed SLA thresholds.
        
        **SLA Targets:**
        - P95 < 100ms (Warning)
        - P95 < 500ms (Critical)
        
        **Actions:**
        1. Check service health and resource utilization
        2. Review database performance metrics
        3. Verify cache hit rates
        4. Scale services if needed
      mimeType: "text/markdown"
    conditions:
      - displayName: "High API latency (P95)"
        conditionThreshold:
          filter: 'metric.type="run.googleapis.com/request_latencies" resource.type="cloud_run_revision"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 500  # 500ms
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_DELTA"
              crossSeriesReducer: "REDUCE_PERCENTILE_95"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/performance-pager"
      - "projects/epsx-production/notificationChannels/engineering-team"

  - displayName: "API Response Time Warning"
    documentation:
      content: |
        **PERFORMANCE WARNING: Elevated Response Times**
        
        API response times approaching SLA limits.
        
        **Actions:**
        1. Monitor performance trends
        2. Check for traffic spikes
        3. Review resource utilization
        4. Prepare for scaling if needed
      mimeType: "text/markdown"
    conditions:
      - displayName: "Elevated API latency (P95)"
        conditionThreshold:
          filter: 'metric.type="run.googleapis.com/request_latencies" resource.type="cloud_run_revision"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 100  # 100ms
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_DELTA"
              crossSeriesReducer: "REDUCE_PERCENTILE_95"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/performance-email"

  # Database Performance Alerts
  - displayName: "Database Query Performance Degradation"
    documentation:
      content: |
        **DATABASE ALERT: Query Performance**
        
        Database query times exceed performance targets.
        
        **Targets:**
        - Average query time < 10ms
        - P95 query time < 50ms
        
        **Actions:**
        1. Check database resource utilization
        2. Review slow query logs
        3. Verify connection pool status
        4. Check for blocking queries
      mimeType: "text/markdown"
    conditions:
      - displayName: "High database query time"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/database/query_time" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 50  # 50ms
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_PERCENTILE_95"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/database-team"
      - "projects/epsx-production/notificationChannels/performance-slack"

  - displayName: "Database Connection Pool Exhaustion"
    documentation:
      content: |
        **DATABASE ALERT: Connection Pool**
        
        Database connection pool utilization is high.
        
        **Actions:**
        1. Check active connection count
        2. Review connection leaks
        3. Monitor query queue length
        4. Consider pool size adjustment
      mimeType: "text/markdown"
    conditions:
      - displayName: "High connection pool utilization"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/database/connection_pool_utilization" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 0.8  # 80%
          duration: "180s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/database-team"

  # Cache Performance Alerts
  - displayName: "Cache Hit Rate Degradation"
    documentation:
      content: |
        **CACHE ALERT: Low Hit Rate**
        
        Cache hit rate below optimal levels.
        
        **Target:** Hit rate > 95%
        
        **Actions:**
        1. Check cache memory utilization
        2. Review cache eviction patterns
        3. Verify cache key strategies
        4. Monitor cache warming processes
      mimeType: "text/markdown"
    conditions:
      - displayName: "Low cache hit rate"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/cache/hit_rate" resource.type="global"'
          comparison: "COMPARISON_LESS_THAN"
          thresholdValue: 0.9  # 90%
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/performance-email"

  - displayName: "Cache Service Unavailable"
    documentation:
      content: |
        **CRITICAL: Cache Service Down**
        
        Redis cache service is not responding.
        
        **Actions:**
        1. Check cache service health
        2. Verify network connectivity
        3. Review cache cluster status
        4. Implement fallback mechanisms
      mimeType: "text/markdown"
    conditions:
      - displayName: "Cache service health check failed"
        conditionAbsent:
          filter: 'metric.type="custom.googleapis.com/epsx/cache/health_check" resource.type="global"'
          duration: "180s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/performance-pager"
      - "projects/epsx-production/notificationChannels/infrastructure-team"

  # Application Performance Alerts
  - displayName: "High Error Rate"
    documentation:
      content: |
        **APPLICATION ALERT: High Error Rate**
        
        Application error rate exceeds acceptable levels.
        
        **Thresholds:**
        - Warning: > 1%
        - Critical: > 5%
        
        **Actions:**
        1. Review application logs
        2. Check for recent deployments
        3. Monitor error patterns
        4. Implement error remediation
      mimeType: "text/markdown"
    conditions:
      - displayName: "High 5xx error rate"
        conditionThreshold:
          filter: 'metric.type="run.googleapis.com/request_count" resource.type="cloud_run_revision" metric.label.response_code_class="5xx"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 5  # 5% error rate
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_RATE"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/application-pager"
      - "projects/epsx-production/notificationChannels/engineering-team"

  - displayName: "High Memory Utilization"
    documentation:
      content: |
        **RESOURCE ALERT: High Memory Usage**
        
        Service memory utilization is high.
        
        **Thresholds:**
        - Warning: > 80%
        - Critical: > 90%
        
        **Actions:**
        1. Check for memory leaks
        2. Review garbage collection metrics
        3. Monitor request patterns
        4. Consider scaling or optimization
      mimeType: "text/markdown"
    conditions:
      - displayName: "High memory utilization"
        conditionThreshold:
          filter: 'metric.type="run.googleapis.com/container/memory/utilizations" resource.type="cloud_run_revision"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 0.9  # 90%
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/performance-email"

  - displayName: "High CPU Utilization"
    documentation:
      content: |
        **RESOURCE ALERT: High CPU Usage**
        
        Service CPU utilization is high.
        
        **Actions:**
        1. Check for CPU-intensive operations
        2. Review request patterns
        3. Monitor for infinite loops
        4. Consider scaling or optimization
      mimeType: "text/markdown"
    conditions:
      - displayName: "High CPU utilization"
        conditionThreshold:
          filter: 'metric.type="run.googleapis.com/container/cpu/utilizations" resource.type="cloud_run_revision"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 0.8  # 80%
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/performance-email"

  # Security Performance Alerts
  - displayName: "Permission Check Latency"
    documentation:
      content: |
        **SECURITY PERFORMANCE: Slow Permission Checks**
        
        Permission validation latency exceeds targets.
        
        **Target:** < 10ms average
        
        **Actions:**
        1. Check permission cache performance
        2. Review database query optimization
        3. Monitor permission service health
        4. Verify cache warming strategies
      mimeType: "text/markdown"
    conditions:
      - displayName: "High permission check latency"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/permissions/check_latency" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 10  # 10ms
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-performance"

  - displayName: "Session Validation Performance"
    documentation:
      content: |
        **SESSION PERFORMANCE: Slow Validation**
        
        Session validation taking longer than expected.
        
        **Target:** < 5ms average
        
        **Actions:**
        1. Check session cache performance
        2. Review JWT validation efficiency
        3. Monitor token rotation impact
        4. Verify cache strategies
      mimeType: "text/markdown"
    conditions:
      - displayName: "High session validation latency"
        conditionThreshold:
          filter: 'metric.type="custom.googleapis.com/epsx/sessions/validation_latency" resource.type="global"'
          comparison: "COMPARISON_GREATER_THAN"
          thresholdValue: 5  # 5ms
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_MEAN"
              crossSeriesReducer: "REDUCE_MEAN"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/security-performance"

  # Availability Alerts
  - displayName: "Service Unavailability"
    documentation:
      content: |
        **CRITICAL: Service Unavailable**
        
        Service is not responding to health checks.
        
        **SLA Target:** 99.9% uptime
        
        **Actions:**
        1. Check service deployment status
        2. Review container health
        3. Verify load balancer configuration
        4. Implement emergency procedures
      mimeType: "text/markdown"
    conditions:
      - displayName: "Service health check failure"
        conditionAbsent:
          filter: 'metric.type="run.googleapis.com/request_count" resource.type="cloud_run_revision"'
          duration: "300s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_RATE"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/availability-pager"
      - "projects/epsx-production/notificationChannels/engineering-team"

  - displayName: "Low Request Volume"
    documentation:
      content: |
        **MONITORING: Unusual Low Traffic**
        
        Request volume significantly below normal levels.
        
        **Actions:**
        1. Verify service accessibility
        2. Check for routing issues
        3. Review upstream dependencies
        4. Confirm no scheduled maintenance
      mimeType: "text/markdown"
    conditions:
      - displayName: "Unusually low request volume"
        conditionThreshold:
          filter: 'metric.type="run.googleapis.com/request_count" resource.type="cloud_run_revision"'
          comparison: "COMPARISON_LESS_THAN"
          thresholdValue: 10  # Requests per minute
          duration: "600s"
          aggregations:
            - alignmentPeriod: "60s"
              perSeriesAligner: "ALIGN_RATE"
              crossSeriesReducer: "REDUCE_SUM"
    combiner: "OR"
    enabled: true
    notificationChannels:
      - "projects/epsx-production/notificationChannels/monitoring-email"

# Notification Channels for Performance Alerts
notificationChannels:
  - type: "pagerduty"
    displayName: "Performance Pager"
    labels:
      service_key: "${PERFORMANCE_PAGERDUTY_KEY}"
    
  - type: "pagerduty"
    displayName: "Application Pager"
    labels:
      service_key: "${APPLICATION_PAGERDUTY_KEY}"
    
  - type: "pagerduty"
    displayName: "Availability Pager"
    labels:
      service_key: "${AVAILABILITY_PAGERDUTY_KEY}"
    
  - type: "slack"
    displayName: "Performance Slack"
    labels:
      channel_name: "#performance-alerts"
      url: "${PERFORMANCE_SLACK_WEBHOOK}"
    
  - type: "email"
    displayName: "Performance Email"
    labels:
      email_address: "performance@epsx.io"
    
  - type: "email"
    displayName: "Engineering Team"
    labels:
      email_address: "engineering@epsx.io"
    
  - type: "email"
    displayName: "Database Team"
    labels:
      email_address: "database@epsx.io"
    
  - type: "email"
    displayName: "Infrastructure Team"
    labels:
      email_address: "infrastructure@epsx.io"
    
  - type: "email"
    displayName: "Security Performance"
    labels:
      email_address: "security-performance@epsx.io"
    
  - type: "email"
    displayName: "Monitoring Email"
    labels:
      email_address: "monitoring@epsx.io"