apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: epsx
  labels:
    app.kubernetes.io/name: epsx
    app.kubernetes.io/component: redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard  # Lower tier for cache
  resources:
    requests:
      storage: 10Gi