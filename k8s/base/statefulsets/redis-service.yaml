apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: epsx
  labels:
    app.kubernetes.io/name: epsx
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app.kubernetes.io/name: epsx
    app.kubernetes.io/component: redis