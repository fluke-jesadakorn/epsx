apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: epsx
data:
  RUST_LOG: "info"
  DATABASE_ACQUIRE_TIMEOUT: "90"
  DATABASE_MAX_CONNECTIONS: "20"
  SKIP_DB_TEST: "true"
  CORS_ALLOWED_ORIGINS: "https://epsx.io,https://admin.epsx.io"
  OIDC_CLIENT_ID: "epsx-frontend"
  OIDC_ADMIN_CLIENT_ID: "epsx-admin"
  REDIS_URL: "redis://redis-service:6379"
  NEXT_PUBLIC_BLOCKCHAIN_NETWORK: "mainnet"
  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: "epsx-web3-frontend"