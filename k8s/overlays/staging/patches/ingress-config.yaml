apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: epsx-ingress
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "75"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://staging.epsx.io,https://admin-staging.epsx.io"
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  tls:
  - hosts:
    - staging.epsx.io
    - api-staging.epsx.io
    - admin-staging.epsx.io
    secretName: epsx-staging-tls
  rules:
  - host: staging.epsx.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
  - host: api-staging.epsx.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
  - host: admin-staging.epsx.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-frontend-service
            port:
              number: 3000