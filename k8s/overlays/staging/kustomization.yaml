apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: epsx-staging

bases:
  - ../../base

namespace: epsx-staging

patchesStrategicMerge:
  - patches/backend-replicas.yaml
  - patches/frontend-replicas.yaml
  - patches/ingress-config.yaml

configMapGenerator:
  - name: epsx-env
    envs:
      - ../../../environments/staging.env

secretGenerator:
  - name: epsx-secrets
    envs:
      - ../../../environments/.secrets.staging

images:
  - name: epsx-backend
    newName: epsx-backend
    newTag: staging
  - name: epsx-frontend
    newName: epsx-frontend
    newTag: staging
  - name: epsx-admin-frontend
    newName: epsx-admin-frontend
    newTag: staging

replicas:
  - name: backend
    count: 2
  - name: frontend
    count: 2
  - name: admin-frontend
    count: 1