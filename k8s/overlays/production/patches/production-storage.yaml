apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: epsx
spec:
  resources:
    requests:
      storage: 100Gi  # Increased for production
  storageClassName: fast-ssd
  accessModes:
    - ReadWriteOnce
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: epsx
spec:
  resources:
    requests:
      storage: 20Gi  # Increased for production
  storageClassName: fast-ssd
  accessModes:
    - ReadWriteOnce