apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: epsx-ingress
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "50"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000,http://localhost:3001"
    cert-manager.io/cluster-issuer: letsencrypt-staging  # Use staging for development
spec:
  tls:
  - hosts:
    - dev.epsx.io
    - api-dev.epsx.io
    - admin-dev.epsx.io
    secretName: epsx-dev-tls
  rules:
  - host: dev.epsx.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
  - host: api-dev.epsx.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
  - host: admin-dev.epsx.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-frontend-service
            port:
              number: 3000