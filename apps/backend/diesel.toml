# Diesel Configuration for EPSX Backend
# Documentation: https://diesel.rs/guides/configuring-diesel-cli.html

[print_schema]
# Output schema.rs to src/schema.rs
file = "src/schemas/primary.rs"

# Don't wrap in schema module - tables at root level
# schema = "public"

# Import types from diesel (always include this)
import_types = ["diesel::sql_types::*"]

# Exclude migration tables from schema generation
filter = { except_tables = ["_sqlx_migrations", "__diesel_schema_migrations", "schema_migrations"] }

# Use Rust naming conventions (snake_case table names -> snake_case)
with_docs = true

[migrations_directory]
# Location of Diesel migrations (using dedicated Diesel directory)
dir = "diesel_migrations/"
