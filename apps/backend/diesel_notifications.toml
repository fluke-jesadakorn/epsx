# Diesel Configuration for Notifications Database
# Usage: diesel migration run --config diesel_notifications.toml

[print_schema]
file = "src/schemas/notifications.rs"
import_types = ["diesel::sql_types::*"]
filter = { except_tables = ["_sqlx_migrations", "__diesel_schema_migrations", "schema_migrations"] }
with_docs = true

[migrations_directory]
dir = "migrations/notifications/"
