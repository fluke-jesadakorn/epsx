# Prometheus alerting rules for Casbin authorization system

groups:
  - name: casbin_authorization
    rules:
      # High error rate alert
      - alert: CasbinHighErrorRate
        expr: (rate(casbin_errors_total[5m]) / rate(casbin_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Casbin error rate detected"
          description: "Casbin error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # Circuit breaker open
      - alert: CasbinCircuitBreakerOpen
        expr: casbin_circuit_breaker_state == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Casbin circuit breaker is open"
          description: "The Casbin circuit breaker has opened, indicating service degradation"

      # Low cache hit ratio
      - alert: CasbinLowCacheHitRatio
        expr: (casbin_cache_hits / (casbin_cache_hits + casbin_cache_misses)) < 0.7
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low Casbin cache hit ratio"
          description: "Cache hit ratio is {{ $value | humanizePercentage }}, below 70% threshold"

      # High response time
      - alert: CasbinHighResponseTime
        expr: histogram_quantile(0.95, rate(casbin_request_duration_seconds_bucket[5m])) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High Casbin response time"
          description: "95th percentile response time is {{ $value }}s"

      # Database connection issues
      - alert: CasbinDatabaseConnectivity
        expr: casbin_database_errors_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Casbin database connectivity issues"
          description: "Database errors detected: {{ $value }} errors in the last minute"

      # Policy count anomaly
      - alert: CasbinPolicyCountAnomaly
        expr: abs(casbin_total_policies - casbin_expected_policies) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Unexpected change in policy count"
          description: "Current policy count ({{ $value }}) differs significantly from expected"

      # Memory usage high
      - alert: CasbinHighMemoryUsage
        expr: casbin_memory_usage_bytes > 500 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Casbin memory usage"
          description: "Memory usage is {{ $value | humanizeBytes }}"

      # Service unavailable
      - alert: CasbinServiceUnavailable
        expr: up{job="epsx-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Casbin service is unavailable"
          description: "The EPSX backend service with Casbin is down"