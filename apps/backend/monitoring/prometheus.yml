# Prometheus configuration for EPSX Casbin monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Rules and alerts
rule_files:
  - "casbin_rules.yml"
  - "system_rules.yml"

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:
  # EPSX Backend metrics
  - job_name: 'epsx-backend'
    static_configs:
      - targets: ['epsx-backend:8080']
    metrics_path: '/api/v1/health/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Health check endpoints
  - job_name: 'epsx-health'
    static_configs:
      - targets: ['epsx-backend:8080']
    metrics_path: '/api/v1/health/health-check'
    scrape_interval: 60s

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    
  # System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']