[workspace]
members = ["."]
resolver = "2"

[package]
name = "backend"
version = "0.1.0"
edition = "2021"

[profile.dev]
opt-level = 1
split-debuginfo = "unpacked"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[dependencies]
axum = { version = "0.8.1", features = ["http2", "macros"] }
oauth2 = { version = "4.2.3", features = ["reqwest"], default-features = false }
tokio = { version = "1.44.1", features = ["full", "signal"] }
tower-http = { version = "0.6.2", features = ["cors", "trace", "request-id"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
mongodb = { version = "3.2.2" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
jsonwebtoken = "9.2"
async-trait = "0.1"
dotenv = "0.15"
thiserror = "2.0.12"
chrono = { version = "0.4", features = ["serde"] }
http = "1.3.1"
reqwest = { version = "0.11.10", features = ["json", "rustls-tls"] }
tower = { version = "0.5.2", features = ["util"] }
base64 = "0.22.1"
anyhow = "1.0"
uuid = "1.16.0"
