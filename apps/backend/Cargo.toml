[package]
name = "epsx"
version = "0.1.0"
edition = "2021"
default-run = "epsx"
license = "MIT OR Apache-2.0"
description = "EPSX trading platform backend with clean architecture"
authors = ["EPSX Team"]
repository = "https://github.com/your-org/epsx"
keywords = ["trading", "finance", "api", "backend"]
categories = ["web-programming"]

[[bin]]
name = "epsx"
path = "src/main.rs"

[[bin]]
name = "migrate"
path = "src/bin/migrate.rs"
required-features = ["cli-tools"]

[[bin]]
name = "promote_admin"
path = "src/bin/promote_admin.rs"
required-features = ["cli-tools"]

[[bin]]
name = "assign_iam"
path = "src/bin/assign_iam.rs"
required-features = ["cli-tools"]


# Feature flags for selective compilation and optimization
[features]
default = ["database", "cache", "auth", "websockets", "templates", "api-docs", "tls-rustls", "http-client"]

# Core server features are always enabled through required dependencies

# WebSocket support
websockets = ["dep:tokio-tungstenite", "dep:futures-util"]

# Database support
database = ["dep:sqlx"]
postgres = ["database", "sqlx/postgres"]

# Caching layer
cache = ["dep:redis"]

# Authentication and security
auth = ["firebase", "jwt", "crypto"]
firebase = ["dep:google-cloud-auth", "dep:rsa", "dep:x509-parser"]
jwt = ["dep:jsonwebtoken", "dep:hmac", "dep:sha2"]
crypto = ["dep:argon2", "dep:aes-gcm", "dep:ring"]

# HTTP client support
http-client = ["dep:reqwest"]

# TLS implementation choice (mutually exclusive, only affects optional deps)
tls-rustls = ["reqwest?/rustls-tls", "sqlx?/runtime-tokio-rustls"]
tls-native = ["tokio-tungstenite?/native-tls", "reqwest?/native-tls"]

# API and documentation
api-docs = ["dep:utoipa"]
templates = ["dep:askama", "dep:askama_axum"]

# Development and CLI tools
cli-tools = ["dep:clap"]

# Production optimizations
production = ["database", "cache", "auth", "tls-rustls", "http-client"]
minimal = ["database", "jwt", "tls-rustls", "http-client"]

[dependencies]
# Core server dependencies (always required)
axum = { version = "0.7", features = ["ws", "macros"] }
axum-extra = "0.9"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
dotenv = "0.15"
futures = "0.3"
hex = "0.4"
http = "1.0"
hyper = "1.1"
lazy_static = "1.4"
base64 = "0.22"
rust_decimal = { version = "1.33", features = ["serde-with-str"] }
rust_decimal_macros = "1.33"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
tower-service = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio-retry = "0.3"
url = "2.5"
urlencoding = "2.1"
uuid = { version = "1.7", features = ["v4", "v5", "serde"] }
regex = "1.10"
ipnetwork = "0.20"
once_cell = "1.19"
rand = "0.8"

# Optional WebSocket support
futures-util = { version = "0.3", optional = true }
tokio-tungstenite = { version = "0.21", features = ["native-tls"], optional = true }

# Optional authentication and security
hmac = { version = "0.12", optional = true }
jsonwebtoken = { version = "9.2", optional = true }
ring = { version = "0.17", optional = true }
sha2 = { version = "0.10", optional = true }
argon2 = { version = "0.5", optional = true }
aes-gcm = { version = "0.10", optional = true }

# Optional Firebase authentication
google-cloud-auth = { version = "0.13", features = ["default"], optional = true }
rsa = { version = "0.9", optional = true }
x509-parser = { version = "0.16", optional = true }

# Optional HTTP client with TLS choice
reqwest = { version = "0.11", features = ["json"], optional = true, default-features = false }

# Optional CLI tools
clap = { version = "4.4", features = ["derive"], optional = true }

# Optional API documentation
utoipa = { version = "4.2", optional = true }

# Input validation
validator = { version = "0.18", features = ["derive"] }

# Optional template engine
askama = { version = "0.12", optional = true }
askama_axum = { version = "0.4", optional = true }

# Optional Redis cache
redis = { version = "0.23", features = ["tokio-comp", "connection-manager"], optional = true }

# Optional database dependencies  
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "rust_decimal", "migrate"], optional = true }


[dev-dependencies]
mockall = "0.12"
uuid = { version = "1.7", features = ["v4", "serde"] }
axum-test = "15.0"

# Clean Architecture Test Configuration
# Tests are organized by architectural layers for optimal caching

# Domain Layer Tests (pure business logic, fastest)
[[test]]
name = "domain_tests"
path = "tests/domain/mod.rs"

# Application Layer Tests (use cases with mocked dependencies)
[[test]]
name = "application_tests"  
path = "tests/application/mod.rs"

# Infrastructure Layer Tests (external dependencies)
[[test]]
name = "infrastructure_tests"
path = "tests/infrastructure/mod.rs"

# Presentation Layer Tests (HTTP handlers and middleware)
[[test]]
name = "presentation_tests"
path = "tests/presentation/mod.rs"

# Profile configurations for binary size optimization
[profile.dev]
# Development build (faster compilation, larger binary)
opt-level = 0
debug = true
split-debuginfo = "unpacked"
overflow-checks = true
lto = false
panic = "unwind"
incremental = true
codegen-units = 256

[profile.release]
# Production build (balanced optimization)
opt-level = 3
debug = false
strip = "symbols"
lto = "thin"
panic = "abort"
codegen-units = 1
overflow-checks = false

[profile.release-small]
# Optimized for minimal binary size
inherits = "release"
opt-level = "z"          # Optimize for size
lto = "fat"             # Full link-time optimization
panic = "abort"         # Remove panic unwinding code
strip = "symbols"       # Remove debug symbols
codegen-units = 1       # Single compilation unit

[profile.release-fast]
# Optimized for maximum performance
inherits = "release"
opt-level = 3
lto = "thin"
panic = "abort"
codegen-units = 1

[profile.bench]
# Benchmarking profile
opt-level = 3
debug = false
rpath = false
lto = true
debug-assertions = false
codegen-units = 1
panic = "abort"

