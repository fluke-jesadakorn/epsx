[workspace]
members = ["."]
resolver = "2"

[package]
name = "backend"
version = "0.1.0"
edition = "2021"

[profile.dev]
opt-level = 1
split-debuginfo = "unpacked"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[dependencies]
axum = "0.8.1"
tokio = { version = "1.0", features = ["full", "signal"] }
tower-http = { version = "0.6.2", features = ["cors", "trace", "request-id"] }
mongodb = { version = "3.2.2" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
jsonwebtoken = "9.2"
dotenv = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2.0.12"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
http = "1.2.0"
reqwest = { version = "0.12.12", features = ["json"] }
