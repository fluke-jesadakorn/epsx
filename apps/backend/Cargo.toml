[package]
name = "epsx"
version = "0.1.0"
edition = "2021"
default-run = "epsx"

[[bin]]
name = "epsx"
path = "src/main.rs"

[[bin]]
name = "migrate"
path = "src/bin/migrate.rs"

[[bin]]
name = "promote_admin"
path = "src/bin/promote_admin.rs"

[[bin]]
name = "assign_iam"
path = "src/bin/assign_iam.rs"

[[bin]]
name = "test_websocket_extraction"
path = "src/bin/test_websocket_extraction.rs"

[[bin]]
name = "test_50_symbols"
path = "src/bin/test_50_symbols.rs"

[[bin]]
name = "test_key_symbols"
path = "src/bin/test_key_symbols.rs"


[dependencies]
axum = { version = "0.7", features = ["ws", "macros"] }
axum-extra = "0.9"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
dotenv = "0.15"
futures = "0.3"
futures-util = "0.3"
hex = "0.4"
hmac = "0.12"
http = "1.0"
hyper = "1.1"
jsonwebtoken = "9.2"
lazy_static = "1.4"
reqwest = { version = "0.11", features = ["json"] }
ring = "0.17"
base64 = "0.22"
rust_decimal = { version = "1.33", features = ["serde-with-str"] }
rust_decimal_macros = "1.33"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-tungstenite = { version = "0.21", features = ["native-tls"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
tower-service = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio-retry = "0.3"
url = "2.5"
utoipa = "4.2"
uuid = { version = "1.7", features = ["v4", "v5", "serde"] }
regex = "1.10"
ipnetwork = "0.20"
clap = { version = "4.4", features = ["derive"] }
once_cell = "1.19"
rand = "0.8"
argon2 = "0.5"
aes-gcm = "0.10"

# Input validation
validator = { version = "0.18", features = ["derive"] }

# Redis cache
redis = { version = "0.23", features = ["tokio-comp", "connection-manager"] }

# Database dependencies  
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "rust_decimal", "migrate"] }

# Job scheduling
tokio-cron-scheduler = "0.10"

# Casbin authorization
casbin = "2.8"
sqlx-adapter = { version = "1.7.0", default-features = false, features = ["postgres", "runtime-tokio-native-tls"] }

[dev-dependencies]
mockall = "0.12"

# Test configuration
[[test]]
name = "unit_tests"
path = "tests/unit_tests.rs"

[[test]]
name = "integration_tests"
path = "tests/integration_tests.rs"

[[test]]
name = "api_tests"
path = "tests/api_tests.rs"
