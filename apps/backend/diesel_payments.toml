# Diesel Configuration for Payments Database
# Usage: diesel migration run --config diesel_payments.toml

[print_schema]
file = "src/schemas/payments.rs"
import_types = ["diesel::sql_types::*"]
filter = { except_tables = ["_sqlx_migrations", "__diesel_schema_migrations", "schema_migrations"] }
with_docs = true

[migrations_directory]
dir = "diesel_migrations_payments/"
