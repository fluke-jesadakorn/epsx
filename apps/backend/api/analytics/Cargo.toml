[package]
name = "analytics"
version = "0.1.0"
edition = "2021"

[dependencies]
vercel_runtime = "2.1.0"
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
http = "1.0"