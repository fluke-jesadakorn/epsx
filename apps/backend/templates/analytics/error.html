<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❌ EPSX Error</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="theme.js" defer></script>
</head>
<body class="metro-theme" style="background:#1F1F1F;">
  <div class="centered-screen">
    <div class="container-500 stack-6">
      <!-- Header -->
      <div class="inline-center stack-4">
        <div class="metro-logo metro-live-tile" style="background:#D83B01;">
          <span class="icon">❌</span>
        </div>
        <div class="tile-row">
          <div class="metro-tile small inline-center tile-sm" style="background:#D83B01;">🔴</div>
          <div class="metro-tile small inline-center tile-sm bg-pancake">⚠️</div>
          <div class="metro-tile small inline-center tile-sm" style="background:#DAA520;">🔧</div>
        </div>
      </div>

      <!-- Alert -->
      <div class="metro-card red">
        <div class="flex items-center gap-4">
          <div class="badge badge-orange">⚠️</div>
          <div style="flex:1;">
            <div style="font-size:14px; opacity:0.9; margin-bottom:5px;">{{ error_message }}</div>
            <div class="status-bar mt-2"><div class="fill" style="width:100%; background:#D83B01;"></div></div>
          </div>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden inline-center">
        <div class="metro-spinner" style="margin: 0 auto; background:#D83B01;"></div>
      </div>

      <!-- Actions -->
      <div class="metro-card red stack-4">
        <div class="inline-center">
          <div class="badge badge-purple">🚨 {{ error_details }}</div>
        </div>
        <div class="grid-2">
          <button onclick="window.history.back()" class="metro-button danger" style="background:#FF8C42;">🔄</button>
          <button onclick="window.location.href='/'" class="metro-button secondary" style="background:#0078D4;">🏠</button>
        </div>
      </div>

      <!-- Diagnostics -->
      <div class="grid-2">
        <div class="metro-security-badge" style="background:#D83B01; justify-content:center;">🔧 ⚡</div>
        <div class="metro-security-badge" style="background:#FF8C42; justify-content:center;">📡 🛠️</div>
      </div>

      <!-- Support -->
      <div class="inline-center">
        <div class="panel dark" style="border-left-color:#0078D4;">
          <div class="grid-3 inline-center">
            <div style="font-size:20px;">🆘</div>
            <div style="font-size:20px;">📧</div>
            <div style="font-size:20px;">🔍</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
