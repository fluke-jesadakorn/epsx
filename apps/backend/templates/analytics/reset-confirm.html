<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔑 EPSX Confirm</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="theme.js" defer></script>
</head>
<body class="metro-theme">
  <div class="centered-screen">
    <div class="container-500 stack-6">
      <!-- Header -->
      <div class="inline-center stack-4">
        <div class="metro-logo metro-live-tile" style="background:#107C10;">
          <span class="icon">🔑</span>
        </div>
        <div class="tile-row-4">
          <div class="metro-tile small inline-center tile-sm" style="background:#107C10;">🔐</div>
          <div class="metro-tile small inline-center tile-sm" style="background:#0078D4;">🛡️</div>
          <div class="metro-tile small inline-center tile-sm" style="background:#5C2D91;">✅</div>
          <div class="metro-tile small inline-center tile-sm bg-pancake">🔑</div>
        </div>
      </div>

      <!-- Error -->
      {% if !error.is_empty() %}
      <div class="metro-toast error">
        ❌
        {% if error == "invalid_code" %}
        🔑 ❌
        {% else if error == "weak_password" %}
        🔐 ⚠️
        {% else if error == "reset_failed" %}
        🔄 ❌
        {% else if error == "service_unavailable" %}
        🔧 ⏱️
        {% else %}
        {{ error }}
        {% endif %}
      </div>
      {% endif %}

      <!-- Loading -->
      <div id="loading" class="hidden inline-center">
        <div class="metro-spinner" style="margin: 0 auto; background:#107C10;"></div>
      </div>

      <!-- Card -->
      <div class="metro-card green">
        <form method="POST" action="/oauth/reset-password/confirm" id="confirm-form" class="stack-4">
          <input type="hidden" name="oobCode" value="{{ oob_code }}" />

          <!-- New Password -->
          <div class="stack-2">
            <div class="flex items-center gap-2">
              <div class="metro-tile small inline-center tile-compact" style="background:#107C10;">🔐</div>
            </div>
            <input id="newPassword" name="newPassword" type="password" required minlength="8" class="metro-input" placeholder="🔐">
            <div class="stack-2">
              <div id="strength-bar" class="progress-bar"><div class="fill" style="width:0%;"></div></div>
              <div id="strength-text" style="font-size: 12px; color: #323130;">🔐</div>
            </div>
          </div>

          <!-- Confirm -->
          <div class="stack-2">
            <div class="flex items-center gap-2">
              <div class="metro-tile small inline-center tile-compact" style="background:#107C10;">✅</div>
            </div>
            <input id="confirmPassword" name="confirmPassword" type="password" required class="metro-input" placeholder="✅">
            <div id="password-match" style="font-size: 12px;"></div>
          </div>

          <!-- Submit -->
          <button type="submit" id="confirm-button" class="metro-button success" style="width:100%; background:#107C10; opacity:0.5;" disabled>
            🔑
          </button>
        </form>
      </div>

      <!-- Requirements -->
      <div>
        <div class="panel dark">
          <div class="tile-row-4 inline-center">
            <div id="req-length" style="opacity: 0.5;">8️⃣</div>
            <div id="req-case" style="opacity: 0.5;">🔤</div>
            <div id="req-number" style="opacity: 0.5;">🔢</div>
            <div id="req-special" style="opacity: 0.5;">🔣</div>
          </div>
        </div>
      </div>

      <!-- Security Badges -->
      <div class="grid-2">
        <div class="metro-security-badge" style="background:#107C10; justify-content:center;">🔒 🔐</div>
        <div class="metro-security-badge" style="background:#0078D4; justify-content:center;">🛡️ ✅</div>
      </div>

      <!-- Back -->
      <div class="inline-center">
        <div class="panel dark">
          <button onclick="window.location.href='/oauth/reset-password'" class="metro-button secondary btn-compact" style="background:#5C2D91;">
            🔄
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
