<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🆕 EPSX Join</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="theme.js" defer></script>
</head>
<body class="metro-theme">
  <div class="centered-screen">
    <div class="container-500 stack-6">
      <!-- Header -->
      <div class="inline-center stack-4">
        <div class="metro-logo metro-live-tile" style="background: #107C10;">
          <span class="icon">🆕</span>
        </div>
        <div class="tile-row-4">
          <div class="metro-tile small bg-pancake inline-center tile-sm">🏠</div>
          <div class="metro-tile small bg-pancake inline-center tile-sm">🤝</div>
          <div class="metro-tile small bg-pancake-accent inline-center tile-sm">🌟</div>
          <div class="metro-tile small bg-pancake inline-center tile-sm">🥞</div>
        </div>
      </div>

      <!-- Success -->
      <div id="success-message" class="metro-toast success hidden">
        🎉 Welcome to the Family!
      </div>

      <!-- Error -->
      {% if !error.is_empty() %}
      <div class="metro-toast error">
        ❌ {{ error }}
      </div>
      {% endif %}

      <!-- Loading -->
      <div id="loading" class="hidden inline-center">
        <div class="metro-spinner" style="margin: 0 auto; background: #107C10;"></div>
      </div>

      <!-- Card -->
      <div class="metro-card green">
        <form method="POST" action="/api/auth/register" id="register-form" class="stack-4">
          <!-- Name -->
          <div class="stack-2">
            <div class="flex items-center gap-2">
              <div class="metro-tile small inline-center tile-compact" style="background:#107C10;">👤</div>
            </div>
            <input id="name" name="name" type="text" required class="metro-input" placeholder="👤" data-autofocus>
          </div>

          <!-- Email -->
          <div class="stack-2">
            <div class="flex items-center gap-2">
              <div class="metro-tile small inline-center tile-compact" style="background:#107C10;">📧</div>
            </div>
            <input id="email" name="email" type="email" autocomplete="email" required class="metro-input" placeholder="📧">
          </div>

          <!-- Password -->
          <div class="stack-2">
            <div class="flex items-center gap-2">
              <div class="metro-tile small inline-center tile-compact" style="background:#107C10;">🔐</div>
              <button type="button" class="metro-button secondary btn-compact btn-icon"
                data-toggle="password" data-target="#password" aria-label="Toggle password visibility" style="background:#FF8C42;">👁️</button>
            </div>
            <input id="password" name="password" type="password" autocomplete="new-password" required class="metro-input" placeholder="🔐">
          </div>

          <!-- Confirm -->
          <div class="stack-2">
            <div class="flex items-center gap-2">
              <div class="metro-tile small inline-center tile-compact" style="background:#107C10;">✅</div>
            </div>
            <input id="confirm-password" name="confirm_password" type="password" required class="metro-input" placeholder="✅">
          </div>

          <!-- Submit -->
          <button type="submit" id="register-button" class="metro-button success" style="width: 100%; background:#107C10;">
            🆕
          </button>
        </form>
      </div>

      <!-- Welcome Grid -->
      <div class="grid-2">
        <div class="metro-security-badge" style="background:#FF8C42; justify-content:center;">🏠 🤝</div>
        <div class="metro-security-badge" style="background:#FFE135; justify-content:center;">🌟 ✨</div>
      </div>
    </div>
  </div>
</body>
</html>
