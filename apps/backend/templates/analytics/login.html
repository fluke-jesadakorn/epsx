<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPSX Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #0066cc;
        --primary-dark: #004499;
        --secondary: #6366f1;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-800: #1f2937;
        --gray-900: #111827;
        --gradient-primary: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: var(--gray-900);
      }

      .container {
        width: 100%;
        max-width: 400px;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 40px 32px;
        box-shadow: var(--shadow-xl);
        border: 1px solid var(--gray-200);
      }

      .header {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo {
        width: 64px;
        height: 64px;
        background: var(--gradient-primary);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: white;
        margin: 0 auto 16px;
        font-weight: 600;
      }

      .title {
        font-size: 24px;
        font-weight: 600;
        color: var(--gray-900);
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 16px;
        color: var(--gray-600);
        font-weight: 400;
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .label {
        font-size: 14px;
        font-weight: 500;
        color: var(--gray-700);
      }

      .input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--gray-300);
        border-radius: 8px;
        font-size: 16px;
        background: white;
        transition: all 0.2s ease;
      }

      .input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgb(0 102 204 / 0.1);
      }

      .input:hover:not(:focus) {
        border-color: var(--gray-400);
      }

      .input::placeholder {
        color: var(--gray-400);
      }

      .password-group {
        position: relative;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--gray-500);
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        transition: color 0.2s ease;
      }

      .password-toggle:hover {
        color: var(--gray-700);
      }

      .button {
        width: 100%;
        padding: 12px 24px;
        background: var(--gradient-primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: var(--shadow-lg);
      }

      .button:active:not(:disabled) {
        transform: translateY(0);
      }

      .button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: var(--error);
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
      }

      .loading {
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        padding: 24px;
        border-radius: 8px;
        text-align: center;
        color: var(--gray-600);
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid var(--gray-300);
        border-top: 2px solid var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 12px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .security-badge {
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        color: var(--gray-600);
        padding: 12px 16px;
        border-radius: 8px;
        text-align: center;
        font-size: 12px;
        font-weight: 500;
        margin-top: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .hidden {
        display: none;
      }

      .stack > * + * {
        margin-top: 20px;
      }

      /* Mobile responsiveness */
      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .card {
          padding: 32px 24px;
        }

        .title {
          font-size: 20px;
        }

        .input {
          font-size: 16px; /* Prevent zoom on iOS */
        }
      }

      /* High contrast mode support */
      @media (prefers-contrast: high) {
        :root {
          --gray-300: #999999;
          --gray-400: #666666;
          --gray-500: #333333;
        }
      }

      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="stack">
        <!-- Header -->
        <div class="card">
          <div class="header">
            <div class="logo">E</div>
            <h1 class="title">EPSX Analytics</h1>
            <p class="subtitle">Professional trading analytics platform</p>
          </div>

          <!-- Error Display -->
          {% if !error.is_empty() %}
          <div class="error">{{ error }}</div>
          {% endif %}

          <!-- Loading State -->
          <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Signing you in...</p>
          </div>

          <!-- Login Form -->
          <form method="POST" action="/oauth/authorize" id="login-form" class="form">
            <!-- Hidden OAuth Fields -->
            <input type="hidden" name="client_id" value="{{ client_id }}" />
            <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}" />
            <input type="hidden" name="state" value="{{ state }}" />
            <input type="hidden" name="scope" value="{{ scope }}" />
            <input type="hidden" name="response_type" value="code" />
            {% if code_challenge.is_some() %}
            <input type="hidden" name="code_challenge" value="{{ code_challenge.as_ref().unwrap() }}" />
            {% endif %}
            {% if code_challenge_method.is_some() %}
            <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method.as_ref().unwrap() }}" />
            {% endif %}

            <!-- Email Field -->
            <div class="form-group">
              <label for="email" class="label">Email Address</label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
                class="input"
                placeholder="Enter your email"
                autofocus
              />
            </div>

            <!-- Password Field -->
            <div class="form-group">
              <label for="password" class="label">Password</label>
              <div class="password-group">
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  required
                  class="input"
                  placeholder="Enter your password"
                />
                <button
                  type="button"
                  class="password-toggle"
                  data-toggle="password"
                  aria-label="Toggle password visibility"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Login Button -->
            <button type="submit" id="login-button" class="button">
              <span>Sign In</span>
            </button>
          </form>
        </div>

        <!-- Security Badge -->
        <div class="security-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>Secured by EPSX</span>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Password toggle functionality
        const passwordToggle = document.querySelector('[data-toggle="password"]');
        const passwordInput = document.querySelector('#password');
        
        if (passwordToggle && passwordInput) {
          passwordToggle.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            
            // Update icon
            const svg = this.querySelector('svg');
            if (type === 'text') {
              svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
              svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
          });
        }

        // Form submission handling
        const form = document.getElementById('login-form');
        const loginButton = document.getElementById('login-button');
        const loadingElement = document.getElementById('loading');

        if (form) {
          form.addEventListener('submit', function(e) {
            // Show loading state
            if (loginButton) {
              loginButton.innerHTML = '<div class="spinner" style="width: 16px; height: 16px; margin: 0 8px 0 0;"></div>Signing in...';
              loginButton.disabled = true;
            }
            
            if (loadingElement) {
              loadingElement.classList.remove('hidden');
            }
            
            // Reset after timeout if no redirect
            setTimeout(function() {
              if (loginButton) {
                loginButton.innerHTML = 'Sign In';
                loginButton.disabled = false;
              }
              if (loadingElement) {
                loadingElement.classList.add('hidden');
              }
            }, 15000);
          });
        }

        // Enhanced keyboard navigation
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
            e.preventDefault();
            const inputs = Array.from(document.querySelectorAll('input[type="email"], input[type="password"]'));
            const currentIndex = inputs.indexOf(e.target);
            
            if (currentIndex < inputs.length - 1) {
              inputs[currentIndex + 1].focus();
            } else {
              form.submit();
            }
          }
        });

        console.log('EPSX Analytics login page initialized');
      });
    </script>
  </body>
</html>
