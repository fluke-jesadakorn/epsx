<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✅ EPSX Success</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="theme.js" defer></script>
</head>
<body class="metro-theme">
  <div class="centered-screen">
    <div class="container-500 stack-6">
      <!-- Header -->
      <div class="inline-center stack-4">
        <div class="metro-logo metro-live-tile" style="background:#107C10;">
          <span class="icon">✅</span>
        </div>
        <div class="tile-row-4">
          <div class="metro-tile small inline-center tile-sm" style="background:#107C10;">🟢</div>
          <div class="metro-tile small inline-center tile-sm bg-pancake">🎉</div>
          <div class="metro-tile small inline-center tile-sm bg-pancake-accent">⭐</div>
          <div class="metro-tile small inline-center tile-sm bg-pancake">🥞</div>
        </div>
      </div>

      <!-- Status -->
      <div class="metro-card green">
        <div class="flex items-center gap-4">
          <div class="badge badge-green">🎯</div>
          <div style="flex:1;">
            <div style="font-size: 14px; color:#107C10;">{{ success_message }}</div>
            <div class="status-bar mt-2"><div class="fill" style="width:100%; background:#107C10;"></div></div>
          </div>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden inline-center">
        <div class="metro-spinner" style="margin: 0 auto; background:#107C10;"></div>
      </div>

      <!-- Actions -->
      <div class="metro-card green stack-4">
        <div class="inline-center">
          <div class="badge badge-green">🎉 {{ success_details }}</div>
        </div>
        <div class="grid-2">
          <button onclick="window.location.href='/dashboard'" class="metro-button success" style="background:#107C10;">🚀</button>
          <button onclick="window.location.href='/'" class="metro-button secondary" style="background:#FF8C42;">🏠</button>
        </div>
      </div>

      <!-- Badges -->
      <div class="grid-2">
        <div class="metro-security-badge" style="background:#107C10; justify-content:center;">🏆 ⭐</div>
        <div class="metro-security-badge" style="background:#FFE135; justify-content:center;">🎖️ ✨</div>
      </div>

      <!-- Celebration -->
      <div id="celebration-tiles" class="tile-row">
        <div class="metro-tile small inline-center tile-compact bg-pancake">🎊</div>
        <div class="metro-tile small inline-center tile-compact" style="background:#107C10;">🥳</div>
        <div class="metro-tile small inline-center tile-compact bg-pancake-accent">🌟</div>
      </div>
    </div>
  </div>
</body>
</html>
