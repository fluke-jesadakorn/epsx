<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Error - EPSX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full space-y-8">
        <!-- Error Icon -->
        <div class="text-center">
            <div class="mx-auto h-16 w-16 flex items-center justify-center rounded-full bg-red-100">
                <i class="fas fa-exclamation-triangle text-red-600 text-2xl"></i>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                Authentication Error
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                {{ error_message }}
            </p>
        </div>

        <!-- Error Details -->
        <div class="bg-red-50 border border-red-200 rounded-md p-4">
            <div class="flex">
                <div class="flex-shrink-0">
                    <i class="fas fa-info-circle text-red-400"></i>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">
                        What happened?
                    </h3>
                    <div class="mt-2 text-sm text-red-700">
                        <p>{{ error_details }}</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="space-y-3">
            <button
                onclick="history.back()"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
            >
                <i class="fas fa-arrow-left mr-2"></i>
                Try Again
            </button>
            
            <a
                href="/"
                class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
            >
                <i class="fas fa-home mr-2"></i>
                Return Home
            </a>
        </div>

        <!-- Support -->
        <div class="text-center">
            <p class="text-xs text-gray-500">
                If you continue to experience issues, please contact support
            </p>
        </div>
    </div>
</body>
</html>
