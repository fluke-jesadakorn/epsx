# EPSX Development Stack with Traefik & Domain Routing
# Primary development setup with HTTPS domains and hot reload

services:
  # Traefik Reverse Proxy with SSL
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--log.level=DEBUG"
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/certs:/certs:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - epsx-network
    restart: unless-stopped

  # Frontend Service - epsx.io
  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/frontend:/app:cached
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      - PORT=3000
      - NODE_ENV=development
      - NEXTAUTH_URL=https://epsx.io
      - BACKEND_URL=https://api.epsx.io
      - NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      - NEXT_PUBLIC_APP_URL=https://epsx.io
      - API_URL=https://api.epsx.io
      - NEXT_PUBLIC_API_URL=https://api.epsx.io
      - NEXT_PUBLIC_OAUTH_CLIENT_ID=epsx-frontend
      - NODE_TLS_REJECT_UNAUTHORIZED=0  # Accept self-signed certificates in development
    networks:
      - epsx-network
    extra_hosts:
      - "epsx.io:172.24.0.4"
      - "admin.epsx.io:172.24.0.4" 
      - "api.epsx.io:172.24.0.4"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`epsx.io`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.frontend-http.rule=Host(`epsx.io`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=frontend-redirect"
      - "traefik.http.middlewares.frontend-redirect.redirectscheme.scheme=https"
    depends_on:
      - traefik
      - backend
    # healthcheck:
      #   test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      #   interval: 30s
      #   timeout: 10s
      #   retries: 3
    restart: unless-stopped

  # Admin Frontend Service - admin.epsx.io
  admin:
    build:
      context: apps/admin-frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/admin-frontend:/app:cached
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next
    environment:
      - PORT=3000
      - NODE_ENV=development
      - NEXTAUTH_URL=https://admin.epsx.io
      - BACKEND_URL=https://api.epsx.io
      - NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      - NEXT_PUBLIC_ADMIN_URL=https://admin.epsx.io
      - NEXT_PUBLIC_APP_URL=https://admin.epsx.io
      - NEXT_PUBLIC_API_URL=https://api.epsx.io
      - NEXT_PUBLIC_OAUTH_CLIENT_ID=epsx-admin-frontend
      - NODE_TLS_REJECT_UNAUTHORIZED=0  # Accept self-signed certificates in development
    networks:
      - epsx-network
    extra_hosts:
      - "epsx.io:172.24.0.4"
      - "admin.epsx.io:172.24.0.4" 
      - "api.epsx.io:172.24.0.4"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.epsx.io`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.admin-http.rule=Host(`admin.epsx.io`)"
      - "traefik.http.routers.admin-http.entrypoints=web"
      - "traefik.http.routers.admin-http.middlewares=admin-redirect"
      - "traefik.http.middlewares.admin-redirect.redirectscheme.scheme=https"
    depends_on:
      - traefik
      - backend
    # healthcheck:
      #   test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      #   interval: 30s
      #   timeout: 10s
      #   retries: 3
    restart: unless-stopped

  # Backend Service - api.epsx.io
  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/backend:/app:cached
      - rust_target_cache:/app/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - BIND_ADDRESS=0.0.0.0
      - DATABASE_URL=postgresql://postgres:password@db:5432/epsx
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=https://epsx.io
      - ADMIN_FRONTEND_URL=https://admin.epsx.io
      - OIDC_ISSUER=https://api.epsx.io
      - RUST_ENV=development
      - NODE_ENV=development
      - ENV=development
      - RUST_LOG=info
    networks:
      - epsx-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.epsx.io`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.backend-http.rule=Host(`api.epsx.io`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=backend-redirect"
      - "traefik.http.middlewares.backend-redirect.redirectscheme.scheme=https"
    depends_on:
      - traefik
      - db
      - redis
    # healthcheck:
      #   test: ["CMD", "/app/epsx", "--health-check || exit 1"]
      #   interval: 30s
      #   timeout: 10s
      #   retries: 3
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=epsx
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - epsx-network
    ports:
      - "5432:5432"  # Exposed for local development tools
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - epsx-network
    ports:
      - "6379:6379"  # Exposed for local development tools
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  admin_node_modules:
  frontend_next_cache:
  admin_next_cache:
  rust_target_cache:
  cargo_registry:
  cargo_git:

networks:
  epsx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16