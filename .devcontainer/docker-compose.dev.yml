services:
  # Traefik Reverse Proxy for Real Domains with HTTPS
  traefik:
    image: traefik:v3.0
    platform: linux/arm64
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--log.level=INFO"
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "8090:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../docker/traefik/certs:/certs:ro
      - ../docker/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - epsx-dev
    restart: unless-stopped

  # Development Workspace
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
    platform: linux/arm64
    volumes:
      - ..:/workspace:cached
      - vscode-server:/home/vscode/.vscode-server
      - workspace_node_modules:/workspace/node_modules
      - pnpm_cache:/home/vscode/.local/share/pnpm
      - turbo_cache:/workspace/.turbo
    networks:
      - epsx-dev
    command: sleep infinity
    user: vscode

  # Frontend Service - epsx.io
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      target: development
    platform: linux/arm64
    volumes:
      - ../apps/frontend:/app:cached
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    environment:
      - PORT=3000
      - NODE_ENV=development
      - APP_URL=https://epsx.io
      - BACKEND_URL=https://api.epsx.io
      - NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      - API_URL=https://api.epsx.io
      - NEXT_PUBLIC_API_URL=https://api.epsx.io
    networks:
      - epsx-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`epsx.io`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.frontend-http.rule=Host(`epsx.io`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=frontend-redirect"
      - "traefik.http.middlewares.frontend-redirect.redirectscheme.scheme=https"
    depends_on:
      - traefik
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Admin Frontend Service - admin.epsx.io
  admin:
    build:
      context: ../apps/admin-frontend
      dockerfile: Dockerfile
      target: development
    platform: linux/arm64
    volumes:
      - ../apps/admin-frontend:/app:cached
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next
    environment:
      - PORT=3000
      - NODE_ENV=development
      - ADMIN_URL=https://admin.epsx.io
      - BACKEND_URL=https://api.epsx.io
      - NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      - NEXT_PUBLIC_ADMIN_URL=https://admin.epsx.io
    networks:
      - epsx-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.epsx.io`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.admin-http.rule=Host(`admin.epsx.io`)"
      - "traefik.http.routers.admin-http.entrypoints=web"
      - "traefik.http.routers.admin-http.middlewares=admin-redirect"
      - "traefik.http.middlewares.admin-redirect.redirectscheme.scheme=https"
    depends_on:
      - traefik
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Backend Service - api.epsx.io
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
      target: development
    platform: linux/arm64
    volumes:
      - ../apps/backend:/app:cached
      - rust_target_cache:/app/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - BIND_ADDRESS=0.0.0.0
      - DATABASE_URL=postgresql://postgres:password@db:5432/epsx
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=https://epsx.io
      - ADMIN_FRONTEND_URL=https://admin.epsx.io
      - OIDC_ISSUER=https://api.epsx.io
      - RUST_ENV=development
      - NODE_ENV=development
      - ENV=development
      - RUST_LOG=info
    networks:
      - epsx-dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.epsx.io`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.backend-http.rule=Host(`api.epsx.io`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=backend-redirect"
      - "traefik.http.middlewares.backend-redirect.redirectscheme.scheme=https"
    depends_on:
      - traefik
      - db
      - redis
    healthcheck:
      test: ["CMD", "/app/epsx", "--health-check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Database
  db:
    image: postgres:15-alpine
    platform: linux/arm64
    environment:
      - POSTGRES_DB=epsx
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - epsx-dev
    ports:
      - "5433:5432"

  # Redis Cache
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    volumes:
      - redis_data:/data
    networks:
      - epsx-dev
    ports:
      - "6381:6379"  # Mapped to different port for devcontainer
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  vscode-server:
  workspace_node_modules:
  frontend_node_modules:
  admin_node_modules:
  frontend_next_cache:
  admin_next_cache:
  pnpm_cache:
  turbo_cache:
  rust_target_cache:
  cargo_registry:
  cargo_git:

networks:
  epsx-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16