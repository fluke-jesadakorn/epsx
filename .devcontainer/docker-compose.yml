services:
  # Frontend Development Container (Node.js 22-alpine - same as production)
  frontend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.frontend-dev
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: epsx-dev-frontend
    volumes:
      - ..:/workspace:cached
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - admin_node_modules:/workspace/apps/admin-frontend/node_modules
      - root_node_modules:/workspace/node_modules
    working_dir: /workspace
    ports:
      - "3000:3000"
      - "3001:3001"
    networks:
      - epsx-dev
    environment:
      # Development environment
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      
      # Production Domain URLs for dev container
      BACKEND_URL: https://api.epsx.io
      FRONTEND_URL: https://epsx.io
      ADMIN_FRONTEND_URL: https://admin.epsx.io
      
      # Client-accessible URLs
      NEXT_PUBLIC_BACKEND_URL: https://api.epsx.io
      NEXT_PUBLIC_APP_URL: https://epsx.io
      NEXT_PUBLIC_ADMIN_URL: https://admin.epsx.io
      NEXT_PUBLIC_OAUTH_CLIENT_ID: epsx-frontend
      NEXT_PUBLIC_FIREBASE_API_KEY: your-dev-api-key
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: your-dev-project-id
      
      # Development secrets (override in .env.local)
      NEXTAUTH_SECRET: devcontainer-secret-32-chars-minimum
      OIDC_CLIENT_ID: epsx-frontend
      OIDC_CLIENT_SECRET: devcontainer-client-secret-32-chars
      OIDC_ADMIN_CLIENT_ID: epsx-admin
      OIDC_ADMIN_CLIENT_SECRET: devcontainer-admin-secret-32-chars
      
      # Infrastructure URLs (container networking)
      DATABASE_URL: postgresql://epsx_user:epsx_password@database:5432/epsx_db
      REDIS_URL: redis://redis:6379
      
      # Firebase (set your real values in .env.local)
      FIREBASE_PROJECT_ID: your-dev-firebase-project-id
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\\nYOUR_DEV_PRIVATE_KEY_HERE\\n-----END PRIVATE KEY-----"
      FIREBASE_CLIENT_EMAIL: your-dev-service-account@project.iam.gserviceaccount.com
    command: sleep infinity
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Backend Development Container (Rust 1.85-slim - same as production)
  backend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.backend-dev
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: epsx-dev-backend
    volumes:
      - ..:/workspace:cached
      - cargo_registry:/usr/local/cargo/registry
      - cargo_target:/workspace/apps/backend/target
    working_dir: /workspace/apps/backend
    ports:
      - "8080:8080"
    networks:
      - epsx-dev
    environment:
      # Development environment
      RUST_ENV: development
      ENV: development
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      
      # Database connection
      DATABASE_URL: postgresql://epsx_user:epsx_password@database:5432/epsx_db
      DATABASE_MAX_CONNECTIONS: 5
      DATABASE_MIN_CONNECTIONS: 1
      DATABASE_ACQUIRE_TIMEOUT: 30
      DATABASE_IDLE_TIMEOUT: 300
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Development secrets
      OIDC_CLIENT_SECRET: devcontainer-client-secret-32-chars
      OIDC_ADMIN_CLIENT_SECRET: devcontainer-admin-secret-32-chars
      
      # Firebase (set your real values in .env.local)
      FIREBASE_PROJECT_ID: your-dev-firebase-project-id
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\\nYOUR_DEV_PRIVATE_KEY_HERE\\n-----END PRIVATE KEY-----"
      FIREBASE_CLIENT_EMAIL: your-dev-service-account@project.iam.gserviceaccount.com
      
      # Server configuration
      HOST: 0.0.0.0
      PORT: 8080
    command: sleep infinity
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Main VS Code Development Container
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: epsx-devcontainer-main
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker-host.sock
    command: sleep infinity
    networks:
      - epsx-dev
    environment:
      # Development environment
      NODE_ENV: development
      RUST_ENV: development
      ENV: development
      DOMAIN_DEVELOPMENT: "true"
    depends_on:
      - frontend
      - backend

  # Reverse Proxy for Production Domains
  proxy:
    image: caddy:2.8-alpine
    container_name: epsx-devcontainer-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - epsx-dev
    depends_on:
      - frontend
      - backend

  # PostgreSQL Database (same as production support)
  database:
    image: postgres:16-alpine
    container_name: epsx-devcontainer-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: epsx_db
      POSTGRES_USER: epsx_user
      POSTGRES_PASSWORD: epsx_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - epsx-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epsx_user -d epsx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (same as production support)
  redis:
    image: redis:7.2-alpine
    container_name: epsx-devcontainer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - epsx-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # Database and cache volumes
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  
  # Development optimization volumes
  frontend_node_modules:
  admin_node_modules:
  root_node_modules:
  cargo_registry:
  cargo_target:

networks:
  epsx-dev:
    driver: bridge