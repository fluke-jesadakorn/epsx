# EPSX CI/CD Pipeline — GitLab CE Self-Hosted
# Mac Mini runner (arm64), Docker executor, bind-mounted Docker socket
#
# Branches:
#   development → auto-deploy to dev.epsx.io
#   staging     → auto-deploy to staging.epsx.io + E2E smoke tests
#   main        → manual deploy to epsx.io
#   MR          → lint + test + review app

stages:
  - infra
  - prepare
  - lint
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  BUN_INSTALL: .bun
  CARGO_HOME: /tmp/.cargo
  DOCKER_BUILDKIT: "1"
  GIT_CLEAN_FLAGS: -ffdx
  # Use local registry directly to avoid Cloudflare tunnel dependency
  CI_REGISTRY: "127.0.0.1:5050"
  CI_REGISTRY_IMAGE: "127.0.0.1:5050/jesadakorn/epsx"

# ---------------------------------------------------------------------------
# Templates
# ---------------------------------------------------------------------------

.node-cache: &node-cache
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
    policy: pull-push

.cargo-cache: &cargo-cache
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - apps/backend/target/
      - /tmp/.cargo/registry/
      - /tmp/.cargo/git/
    policy: pull-push

.docker-login: &docker-login
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.rules-lint-test: &rules-lint-test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(development|staging|main)$/

.rules-deploy-branches: &rules-deploy-branches
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(development|staging|main)$/

# ---------------------------------------------------------------------------
# Infra — deploy infrastructure components (GitLab, Cloudflared)
# Manual jobs that can be triggered without SSH access to the Mac Mini.
# ---------------------------------------------------------------------------

infra:gitlab:
  stage: infra
  image: docker:27
  script:
    - cd infrastructure/gitlab
    - |
      # Ensure all required Docker networks exist
      for net in epsx_gitlab_network epsx_review_network epsx_dev_network epsx_staging_network epsx_prod_network; do
        docker network create "$net" 2>/dev/null && echo "Created $net" || echo "$net already exists"
      done
    - docker compose -f docker-compose.gitlab.yml --env-file /Users/fluke/epsx-runner/envs/.env.gitlab up -d --force-recreate gitlab runner traefik
    - |
      echo "Waiting for GitLab to be healthy..."
      for i in $(seq 1 20); do
        status=$(docker inspect --format='{{.State.Health.Status}}' epsx-gitlab 2>/dev/null || echo "unknown")
        echo "  [$i] epsx-gitlab: $status"
        if [ "$status" = "healthy" ]; then echo "GitLab is healthy!"; break; fi
        if [ "$i" -eq 20 ]; then echo "WARNING: GitLab health check timed out (may still be starting)"; fi
        sleep 30
      done
  timeout: 15 minutes
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|development)$/
      when: manual
      allow_failure: true

infra:cloudflared:
  stage: infra
  image: docker:27
  script:
    - |
      # Restart cloudflared to pick up latest config from repo
      # Config is mounted from: infrastructure/cloudflare/cloudflared-config.prod.yml
      docker restart epsx-prod-cloudflared
      sleep 10
      status=$(docker inspect --format='{{.State.Status}}' epsx-prod-cloudflared 2>/dev/null || echo "not_found")
      echo "epsx-prod-cloudflared: $status"
      if [ "$status" != "running" ]; then
        # Container not running — start it fresh via prod compose
        cd infrastructure/docker
        docker compose --env-file /Users/fluke/epsx-runner/envs/.env.prod -f docker-compose.prod.yml up -d cloudflared
      fi
      docker inspect --format='{{.State.Status}}' epsx-prod-cloudflared
  timeout: 5 minutes
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|development)$/
      when: manual
      allow_failure: true

# ---------------------------------------------------------------------------
# Prepare — single bun install, shared via artifacts
# ---------------------------------------------------------------------------

prepare:deps:
  stage: prepare
  image: oven/bun:1.2.17
  script:
    - |
      for i in 1 2 3 4 5; do
        bun install --frozen-lockfile && break
        echo "bun install attempt $i failed, retrying..."
        rm -rf node_modules/ .bun/install/cache/
        sleep $i
      done
  cache:
    - key: node-${CI_COMMIT_REF_SLUG}
      paths:
        - node_modules/
        - .bun/install/cache/
      policy: pull-push
    - key: node-development
      paths:
        - node_modules/
      policy: pull
  timeout: 25 minutes
  <<: *rules-lint-test

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------

lint:eslint:
  stage: lint
  image: oven/bun:1.2.17
  needs: ["prepare:deps"]
  cache:
    - key: node-${CI_COMMIT_REF_SLUG}
      paths: [node_modules/]
      policy: pull
    - key: turbo-${CI_COMMIT_REF_SLUG}
      paths: [.turbo/]
      policy: pull-push
  script:
    - bunx turbo run lint --filter=!@epsx/backend --filter=!epsx-bsc-contracts --concurrency=1
  timeout: 30 minutes
  <<: *rules-lint-test

lint:typecheck:
  stage: lint
  image: oven/bun:1.2.17
  needs: ["prepare:deps"]
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
    policy: pull
  script:
    - bun type-check
  timeout: 20 minutes
  <<: *rules-lint-test

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------

test:frontend:
  stage: test
  image: oven/bun:1.2.17
  needs: ["prepare:deps"]
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
    policy: pull
  variables:
    JEST_JUNIT_OUTPUT_DIR: test-results
    JEST_JUNIT_OUTPUT_NAME: junit.xml
  script:
    - >
      bunx jest --ci --passWithNoTests
      --coverage --coverageDirectory=coverage
      --coverageReporters text cobertura json-summary
      --reporters default jest-junit
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: test-results/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 30 days
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  timeout: 15 minutes
  <<: *rules-lint-test

test:backend:
  stage: test
  image: rust:slim-bookworm
  needs: []  # DAG: starts immediately, no wait for prepare/lint
  <<: *cargo-cache
  before_script:
    - apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev libpq-dev
  script:
    - cd apps/backend
    - cargo test --release
  timeout: 20 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/backend/**/*
    - if: $CI_COMMIT_BRANCH =~ /^(development|staging|main)$/
      changes:
        - apps/backend/**/*

# ---------------------------------------------------------------------------
# Build — Docker images pushed to internal registry
# ---------------------------------------------------------------------------
# BuildKit inline cache for layer reuse between runs.
# Images tagged: <env>-<sha> + <env>-latest
# Always build all images (Docker cache keeps it fast; needed for deploy artifacts).

build:frontend:
  stage: build
  image: docker:27
  needs: ["lint:eslint", "lint:typecheck", "test:frontend"]
  <<: *docker-login
  script:
    - docker pull $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-latest || true
    - >
      docker build
      --cache-from $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      --build-arg http_proxy=http://192.168.65.7:3128
      --build-arg https_proxy=http://192.168.65.7:3128
      --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=$WALLETCONNECT_PROJECT_ID
      --build-arg NEXT_PUBLIC_APP_URL=$DEPLOY_FRONTEND_URL
      --build-arg NEXT_PUBLIC_BACKEND_URL=$DEPLOY_API_URL
      --build-arg NEXT_PUBLIC_ADMIN_URL=$DEPLOY_ADMIN_URL
      --build-arg NEXT_PUBLIC_BLOCKCHAIN_NETWORK=$DEPLOY_BLOCKCHAIN_NETWORK
      --build-arg NEXT_PUBLIC_CHAIN_ID=$DEPLOY_CHAIN_ID
      --build-arg NEXT_PUBLIC_OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      --build-arg NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET=${PAYMENT_ESCROW_MAINNET:-}
      --build-arg NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET=${PAYMENT_RECEIVER_MAINNET:-}
      --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      -f apps/frontend/Dockerfile
      -t $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG
      -t $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-latest
      .
    - docker push $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-latest
    - |
      echo "image: $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG" > build-manifest.txt
      echo "commit: $CI_COMMIT_SHA" >> build-manifest.txt
      echo "branch: $CI_COMMIT_BRANCH" >> build-manifest.txt
      echo "built_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build-manifest.txt
      echo "FRONTEND_IMAGE=$CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    paths: [build-manifest.txt]
    expire_in: 90 days
  timeout: 30 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "development"
      variables:
        ENV_TAG: dev
        DEPLOY_FRONTEND_URL: https://dev.epsx.io
        DEPLOY_API_URL: https://dev-api.epsx.io
        DEPLOY_ADMIN_URL: https://dev-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "staging"
      variables:
        ENV_TAG: staging
        DEPLOY_FRONTEND_URL: https://staging.epsx.io
        DEPLOY_API_URL: https://staging-api.epsx.io
        DEPLOY_ADMIN_URL: https://staging-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENV_TAG: prod
        DEPLOY_FRONTEND_URL: https://epsx.io
        DEPLOY_API_URL: https://api.epsx.io
        DEPLOY_ADMIN_URL: https://admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: mainnet
        DEPLOY_CHAIN_ID: "56"

build:admin:
  stage: build
  image: docker:27
  needs: ["lint:eslint", "lint:typecheck"]
  <<: *docker-login
  script:
    - docker pull $CI_REGISTRY_IMAGE/admin:$ENV_TAG-latest || true
    - >
      docker build
      --cache-from $CI_REGISTRY_IMAGE/admin:$ENV_TAG-latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      --build-arg http_proxy=http://192.168.65.7:3128
      --build-arg https_proxy=http://192.168.65.7:3128
      --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=$WALLETCONNECT_PROJECT_ID
      --build-arg NEXT_PUBLIC_APP_URL=$DEPLOY_ADMIN_URL
      --build-arg NEXT_PUBLIC_BACKEND_URL=$DEPLOY_API_URL
      --build-arg NEXT_PUBLIC_ADMIN_URL=$DEPLOY_ADMIN_URL
      --build-arg NEXT_PUBLIC_BLOCKCHAIN_NETWORK=$DEPLOY_BLOCKCHAIN_NETWORK
      --build-arg NEXT_PUBLIC_CHAIN_ID=$DEPLOY_CHAIN_ID
      --build-arg NEXT_PUBLIC_OAUTH_CLIENT_ID=epsx-admin
      --build-arg NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET=${PAYMENT_ESCROW_MAINNET:-}
      --build-arg NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET=${PAYMENT_RECEIVER_MAINNET:-}
      --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      -f apps/admin-frontend/Dockerfile
      -t $CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG
      -t $CI_REGISTRY_IMAGE/admin:$ENV_TAG-latest
      .
    - docker push $CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE/admin:$ENV_TAG-latest
    - |
      echo "image: $CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG" > build-manifest.txt
      echo "commit: $CI_COMMIT_SHA" >> build-manifest.txt
      echo "branch: $CI_COMMIT_BRANCH" >> build-manifest.txt
      echo "built_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build-manifest.txt
      echo "ADMIN_IMAGE=$CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    paths: [build-manifest.txt]
    expire_in: 90 days
  timeout: 30 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "development"
      variables:
        ENV_TAG: dev
        DEPLOY_API_URL: https://dev-api.epsx.io
        DEPLOY_ADMIN_URL: https://dev-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "staging"
      variables:
        ENV_TAG: staging
        DEPLOY_API_URL: https://staging-api.epsx.io
        DEPLOY_ADMIN_URL: https://staging-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENV_TAG: prod
        DEPLOY_API_URL: https://api.epsx.io
        DEPLOY_ADMIN_URL: https://admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: mainnet
        DEPLOY_CHAIN_ID: "56"

build:backend:
  stage: build
  image: docker:27
  needs:
    - job: test:backend
      optional: true  # backend test may be skipped (no changes)
  <<: *docker-login
  script:
    - docker pull $CI_REGISTRY_IMAGE/backend:$ENV_TAG-latest || true
    - >
      docker build
      --cache-from $CI_REGISTRY_IMAGE/backend:$ENV_TAG-latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      -f apps/backend/Dockerfile
      -t $CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG
      -t $CI_REGISTRY_IMAGE/backend:$ENV_TAG-latest
      .
    - docker push $CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE/backend:$ENV_TAG-latest
    - |
      echo "image: $CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG" > build-manifest.txt
      echo "commit: $CI_COMMIT_SHA" >> build-manifest.txt
      echo "branch: $CI_COMMIT_BRANCH" >> build-manifest.txt
      echo "built_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build-manifest.txt
      echo "BACKEND_IMAGE=$CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    paths: [build-manifest.txt]
    expire_in: 90 days
  timeout: 30 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "development"
      variables:
        ENV_TAG: dev
    - if: $CI_COMMIT_BRANCH == "staging"
      variables:
        ENV_TAG: staging
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENV_TAG: prod

# ---------------------------------------------------------------------------
# Deploy
# ---------------------------------------------------------------------------
# Shell runner (tags: k8s, arm64, epsx) with kubectl + kubeconfig.
# Image vars come from build job dotenv artifacts.

deploy:dev:
  stage: deploy
  image: docker:27
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend
      artifacts: true
    - job: build:admin
      artifacts: true
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $BACKEND_IMAGE
    - docker pull $FRONTEND_IMAGE
    - docker pull $ADMIN_IMAGE
    - docker tag $BACKEND_IMAGE epsx-backend:dev
    - docker tag $FRONTEND_IMAGE epsx-frontend:dev
    - docker tag $ADMIN_IMAGE epsx-admin-frontend:dev
    - cd infrastructure/docker
    - |
      # Remove containers that may have conflicting names from old project label
      for c in epsx-dev-postgres epsx-dev-redis epsx-dev-minio epsx-dev-pgbouncer epsx-dev-backend epsx-dev-frontend epsx-dev-admin; do
        docker rm -f "$c" 2>/dev/null || true
      done
    - docker compose --env-file /Users/fluke/epsx-runner/envs/.env.dev -f docker-compose.dev.yml up -d postgres redis minio
    - docker compose --env-file /Users/fluke/epsx-runner/envs/.env.dev -f docker-compose.dev.yml up -d --force-recreate backend frontend admin-frontend
    - |
      echo "Verifying containers are running..."
      for c in epsx-dev-backend epsx-dev-frontend epsx-dev-admin; do
        status=$(docker inspect --format='{{.State.Status}}' "$c" 2>/dev/null || echo "not_found")
        health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$c" 2>/dev/null || echo "unknown")
        echo "  $c: status=$status health=$health"
        if [ "$status" != "running" ]; then echo "ERROR: $c not running"; exit 1; fi
      done
    - |
      # Restart cloudflared so it reconnects to the new dev containers
      docker restart epsx-prod-cloudflared
      sleep 5
      echo "  epsx-prod-cloudflared: $(docker inspect --format='{{.State.Status}}' epsx-prod-cloudflared 2>/dev/null)"
      echo "Deploy successful!"
  environment:
    name: development
    url: https://dev.epsx.io
  timeout: 20 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "development"
      when: on_success

deploy:staging:
  stage: deploy
  image: docker:27
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend
      artifacts: true
    - job: build:admin
      artifacts: true
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $BACKEND_IMAGE
    - docker pull $FRONTEND_IMAGE
    - docker pull $ADMIN_IMAGE
    - docker tag $BACKEND_IMAGE epsx-backend:staging
    - docker tag $FRONTEND_IMAGE epsx-frontend:staging
    - docker tag $ADMIN_IMAGE epsx-admin-frontend:staging
    - cd infrastructure/docker
    - docker compose --env-file /Users/fluke/epsx-runner/envs/.env.staging -f docker-compose.staging.yml up -d postgres redis minio pgbouncer
    - docker compose --env-file /Users/fluke/epsx-runner/envs/.env.staging -f docker-compose.staging.yml up -d --force-recreate backend frontend admin-frontend
    - |
      echo "Verifying staging containers..."
      for c in epsx-staging-backend epsx-staging-frontend epsx-staging-admin; do
        status=$(docker inspect --format='{{.State.Status}}' "$c" 2>/dev/null || echo "not_found")
        health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$c" 2>/dev/null || echo "unknown")
        echo "  $c: status=$status health=$health"
        if [ "$status" != "running" ]; then echo "ERROR: $c not running"; exit 1; fi
      done
    - |
      docker restart epsx-prod-cloudflared
      sleep 5
      echo "  cloudflared: $(docker inspect --format='{{.State.Status}}' epsx-prod-cloudflared 2>/dev/null)"
  environment:
    name: staging
    url: https://staging.epsx.io
  timeout: 15 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: manual

test:e2e:staging:
  stage: deploy  # runs after staging deploy
  image: mcr.microsoft.com/playwright:v1.58.0-noble
  needs: ["deploy:staging"]
  script:
    - bun install --frozen-lockfile
    - TEST_ENV=staging bunx playwright test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days
  timeout: 15 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"

deploy:prod:
  stage: deploy
  image: docker:27
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend
      artifacts: true
    - job: build:admin
      artifacts: true
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $BACKEND_IMAGE
    - docker pull $FRONTEND_IMAGE
    - docker pull $ADMIN_IMAGE
    - docker tag $BACKEND_IMAGE epsx-backend:prod
    - docker tag $FRONTEND_IMAGE epsx-frontend:prod
    - docker tag $ADMIN_IMAGE epsx-admin-frontend:prod
    - cd infrastructure/docker
    - docker compose --env-file /Users/fluke/epsx-runner/envs/.env.prod -f docker-compose.prod.yml up -d --force-recreate backend frontend admin-frontend
    - |
      echo "Verifying prod containers..."
      for c in epsx-prod-backend epsx-prod-frontend epsx-prod-admin; do
        status=$(docker inspect --format='{{.State.Status}}' "$c" 2>/dev/null || echo "not_found")
        health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$c" 2>/dev/null || echo "unknown")
        echo "  $c: status=$status health=$health"
        if [ "$status" != "running" ]; then echo "ERROR: $c not running"; exit 1; fi
      done
    - |
      docker restart epsx-prod-cloudflared
      sleep 5
      echo "  cloudflared: $(docker inspect --format='{{.State.Status}}' epsx-prod-cloudflared 2>/dev/null)"
  environment:
    name: production
    url: https://epsx.io
  timeout: 15 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false

# ---------------------------------------------------------------------------
# Review Apps (MR only — frontend preview with prod backend)
# ---------------------------------------------------------------------------

review:deploy:
  stage: deploy
  image: docker:27
  <<: *docker-login
  script:
    - >
      docker build
      --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=$WALLETCONNECT_PROJECT_ID
      --build-arg NEXT_PUBLIC_APP_URL=https://mr-${CI_MERGE_REQUEST_IID}.review.epsx.io
      --build-arg NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      --build-arg NEXT_PUBLIC_ADMIN_URL=https://admin.epsx.io
      --build-arg NEXT_PUBLIC_BLOCKCHAIN_NETWORK=mainnet
      --build-arg NEXT_PUBLIC_CHAIN_ID=56
      --build-arg NEXT_PUBLIC_OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      --build-arg NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET=${PAYMENT_ESCROW_MAINNET:-}
      --build-arg NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET=${PAYMENT_RECEIVER_MAINNET:-}
      --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      -f apps/frontend/Dockerfile
      -t $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID}
      .
    - docker push $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID}
    - docker rm -f epsx-review-mr-${CI_MERGE_REQUEST_IID} || true
    - >
      docker run -d
      --name epsx-review-mr-${CI_MERGE_REQUEST_IID}
      --network epsx_review_network
      --memory 512m
      --cpus 1
      --restart unless-stopped
      -e NODE_ENV=production
      -e BACKEND_URL=https://api.epsx.io
      -e NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      -e PORT=3000
      -e HOSTNAME=0.0.0.0
      --label "traefik.enable=true"
      --label "traefik.http.routers.mr-${CI_MERGE_REQUEST_IID}.rule=Host(\`mr-${CI_MERGE_REQUEST_IID}.review.epsx.io\`)"
      --label "traefik.http.routers.mr-${CI_MERGE_REQUEST_IID}.entrypoints=web"
      --label "traefik.http.services.mr-${CI_MERGE_REQUEST_IID}.loadbalancer.server.port=3000"
      $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID}
  environment:
    name: review/mr-${CI_MERGE_REQUEST_IID}
    url: https://mr-${CI_MERGE_REQUEST_IID}.review.epsx.io
    on_stop: review:stop
    auto_stop_in: 3 days
  timeout: 15 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/frontend/**/*
        - shared/**/*

review:stop:
  stage: deploy
  image: docker:27
  script:
    - docker rm -f epsx-review-mr-${CI_MERGE_REQUEST_IID} || true
    - docker rmi $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID} || true
  environment:
    name: review/mr-${CI_MERGE_REQUEST_IID}
    action: stop
  timeout: 5 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/frontend/**/*
        - shared/**/*
      when: manual
      allow_failure: true
