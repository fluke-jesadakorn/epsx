# EPSX CI/CD Pipeline — GitLab CE Self-Hosted
# Mac Mini runner (arm64), Docker executor, bind-mounted Docker socket
#
# Branches:
#   development → lint + test + build only
#   staging     → build + manual revision deploy (Traefik, Docker Compose)
#   main        → manual deploy to epsx.io (k8s)
#   MR          → lint + test + review app

stages:
  - infra
  - prepare
  - lint
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  BUN_INSTALL: .bun
  CARGO_HOME: /tmp/.cargo
  DOCKER_BUILDKIT: "1"
  GIT_CLEAN_FLAGS: -ffdx
  CI_REGISTRY: "registry.jesadakorn.com"
  CI_REGISTRY_IMAGE: "registry.jesadakorn.com/jesadakorn/epsx"
  BUILDX_PLATFORMS: "linux/arm64"

# ---------------------------------------------------------------------------
# Templates
# ---------------------------------------------------------------------------

.cargo-cache: &cargo-cache
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - apps/backend/target/
      - /tmp/.cargo/registry/
      - /tmp/.cargo/git/
    policy: pull-push

.docker-login: &docker-login
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.rules-lint-test: &rules-lint-test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(development|staging|main)$/

.rules-deploy-branches: &rules-deploy-branches
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(development|staging|main)$/

# ---------------------------------------------------------------------------
# Infra — deploy infrastructure components (Cloudflared)
# Manual job that can be triggered without SSH access to the Mac Mini.
# GitLab runs independently — manage via API/MCP only when explicitly needed.
# ---------------------------------------------------------------------------

infra:cloudflared:
  stage: infra
  image: docker:27
  script:
    - |
      # Restart cloudflared to pick up latest config from repo
      # Config is mounted from: infrastructure/cloudflare/cloudflared-config.prod.yml
      docker restart epsx-prod-cloudflared
      sleep 10
      status=$(docker inspect --format='{{.State.Status}}' epsx-prod-cloudflared 2>/dev/null || echo "not_found")
      echo "epsx-prod-cloudflared: $status"
      if [ "$status" != "running" ]; then
        # Container not running — start it fresh via prod compose
        cd infrastructure/docker
        docker compose --env-file /Users/fluke/epsx-runner/envs/.env.prod -f docker-compose.prod.yml up -d cloudflared
      fi
      docker inspect --format='{{.State.Status}}' epsx-prod-cloudflared
  timeout: 5 minutes
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|development)$/
      when: manual
      allow_failure: true

# ---------------------------------------------------------------------------
# Prepare — single bun install, shared via artifacts
# ---------------------------------------------------------------------------

prepare:deps:
  stage: prepare
  image: oven/bun:1.2.17
  variables:
    # Runner injects a proxy that corrupts npm tarball downloads
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    http_proxy: ""
    https_proxy: ""
  script:
    - |
      for i in 1 2 3 4 5; do
        bun install --frozen-lockfile && break
        echo "bun install attempt $i failed, retrying..."
        rm -rf node_modules/ .bun/install/cache/
        sleep $i
      done
  cache:
    - key: bun-${CI_COMMIT_REF_SLUG}
      paths: [.bun/install/cache/]
      policy: pull-push
    - key: node-${CI_COMMIT_REF_SLUG}
      paths: [node_modules/]
      policy: push
  timeout: 30 minutes
  <<: *rules-lint-test

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------

lint:eslint:
  stage: lint
  image: oven/bun:1.2.17
  needs: ["prepare:deps"]
  variables:
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    http_proxy: ""
    https_proxy: ""
  cache:
    - key: node-${CI_COMMIT_REF_SLUG}
      paths: [node_modules/]
      policy: pull
    - key: turbo-${CI_COMMIT_REF_SLUG}
      paths: [.turbo/]
      policy: pull-push
  script:
    - bunx turbo run lint --filter=!@epsx/backend --filter=!epsx-bsc-contracts --concurrency=1
  timeout: 30 minutes
  <<: *rules-lint-test

lint:typecheck:
  stage: lint
  image: oven/bun:1.2.17
  needs: ["prepare:deps"]
  variables:
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    http_proxy: ""
    https_proxy: ""
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths: [node_modules/]
    policy: pull
  script:
    - bun type-check
  timeout: 20 minutes
  <<: *rules-lint-test

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------

test:frontend:
  stage: test
  image: oven/bun:1.2.17
  needs: ["prepare:deps"]
  variables:
    HTTP_PROXY: ""
    HTTPS_PROXY: ""
    http_proxy: ""
    https_proxy: ""
    JEST_JUNIT_OUTPUT_DIR: test-results
    JEST_JUNIT_OUTPUT_NAME: junit.xml
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths: [node_modules/]
    policy: pull
  script:
    - >
      bunx jest --ci --passWithNoTests
      --coverage --coverageDirectory=coverage
      --coverageReporters text cobertura json-summary
      --reporters default jest-junit
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: test-results/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 30 days
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  timeout: 15 minutes
  <<: *rules-lint-test

test:backend:
  stage: test
  image: rust:slim-bookworm
  needs: []  # DAG: starts immediately, no wait for prepare/lint
  <<: *cargo-cache
  variables:
    CARGO_BUILD_JOBS: "1"
    CARGO_PROFILE_DEV_CODEGEN_UNITS: "16"
    CARGO_PROFILE_TEST_CODEGEN_UNITS: "16"
    DATABASE_URL: "postgres://test:test@localhost/test"
  before_script:
    - apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev libpq-dev
  script:
    - cd apps/backend
    - cargo test --jobs 1
  timeout: 40 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/backend/**/*
    - if: $CI_COMMIT_BRANCH =~ /^(development|staging|main)$/
      changes:
        - apps/backend/**/*

# ---------------------------------------------------------------------------
# Build — Docker images pushed to internal registry
# ---------------------------------------------------------------------------
# BuildKit inline cache for layer reuse between runs.
# Images tagged: <env>-<sha> + <env>-latest
# Always build all images (Docker cache keeps it fast; needed for deploy artifacts).

build:frontend:
  stage: build
  image: docker:27
  needs: ["lint:eslint", "lint:typecheck", "test:frontend"]
  <<: *docker-login
  script:
    - >
      docker build
      --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=$WALLETCONNECT_PROJECT_ID
      --build-arg NEXT_PUBLIC_APP_URL=$DEPLOY_FRONTEND_URL
      --build-arg NEXT_PUBLIC_BACKEND_URL=$DEPLOY_API_URL
      --build-arg NEXT_PUBLIC_ADMIN_URL=$DEPLOY_ADMIN_URL
      --build-arg NEXT_PUBLIC_BLOCKCHAIN_NETWORK=$DEPLOY_BLOCKCHAIN_NETWORK
      --build-arg NEXT_PUBLIC_CHAIN_ID=$DEPLOY_CHAIN_ID
      --build-arg NEXT_PUBLIC_OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      --build-arg NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET=${PAYMENT_ESCROW_MAINNET:-}
      --build-arg NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET=${PAYMENT_RECEIVER_MAINNET:-}
      --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      -f apps/frontend/Dockerfile
      -t $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG
      -t $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-latest
      .
    - docker push $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-latest
    - |
      if [ "$CI_COMMIT_BRANCH" = "staging" ]; then
        docker tag $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG $CI_REGISTRY_IMAGE/frontend:staging-rev-$CI_PIPELINE_IID
        docker push $CI_REGISTRY_IMAGE/frontend:staging-rev-$CI_PIPELINE_IID
        echo "FRONTEND_REV_IMAGE=$CI_REGISTRY_IMAGE/frontend:staging-rev-$CI_PIPELINE_IID" >> deploy.env
        echo "REVISION=staging-rev-$CI_PIPELINE_IID" >> deploy.env
      fi
    - |
      echo "image: $CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG" > build-manifest.txt
      echo "commit: $CI_COMMIT_SHA" >> build-manifest.txt
      echo "branch: $CI_COMMIT_BRANCH" >> build-manifest.txt
      echo "built_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build-manifest.txt
      echo "FRONTEND_IMAGE=$CI_REGISTRY_IMAGE/frontend:$ENV_TAG-$IMAGE_TAG" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    paths: [build-manifest.txt]
    expire_in: 90 days
  timeout: 30 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "development"
      variables:
        ENV_TAG: dev
        DEPLOY_FRONTEND_URL: https://dev.epsx.io
        DEPLOY_API_URL: https://dev-api.epsx.io
        DEPLOY_ADMIN_URL: https://dev-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "staging"
      variables:
        ENV_TAG: staging
        DEPLOY_FRONTEND_URL: https://staging.epsx.io
        DEPLOY_API_URL: https://staging-api.epsx.io
        DEPLOY_ADMIN_URL: https://staging-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENV_TAG: prod
        DEPLOY_FRONTEND_URL: https://epsx.io
        DEPLOY_API_URL: https://api.epsx.io
        DEPLOY_ADMIN_URL: https://admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: mainnet
        DEPLOY_CHAIN_ID: "56"

build:admin:
  stage: build
  image: docker:27
  needs: ["lint:eslint", "lint:typecheck"]
  <<: *docker-login
  script:
    - >
      docker build
      --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=$WALLETCONNECT_PROJECT_ID
      --build-arg NEXT_PUBLIC_APP_URL=$DEPLOY_ADMIN_URL
      --build-arg NEXT_PUBLIC_BACKEND_URL=$DEPLOY_API_URL
      --build-arg NEXT_PUBLIC_ADMIN_URL=$DEPLOY_ADMIN_URL
      --build-arg NEXT_PUBLIC_BLOCKCHAIN_NETWORK=$DEPLOY_BLOCKCHAIN_NETWORK
      --build-arg NEXT_PUBLIC_CHAIN_ID=$DEPLOY_CHAIN_ID
      --build-arg NEXT_PUBLIC_OAUTH_CLIENT_ID=epsx-admin
      --build-arg NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET=${PAYMENT_ESCROW_MAINNET:-}
      --build-arg NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET=${PAYMENT_RECEIVER_MAINNET:-}
      --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      -f apps/admin-frontend/Dockerfile
      -t $CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG
      -t $CI_REGISTRY_IMAGE/admin:$ENV_TAG-latest
      .
    - docker push $CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE/admin:$ENV_TAG-latest
    - |
      if [ "$CI_COMMIT_BRANCH" = "staging" ]; then
        docker tag $CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG $CI_REGISTRY_IMAGE/admin:staging-rev-$CI_PIPELINE_IID
        docker push $CI_REGISTRY_IMAGE/admin:staging-rev-$CI_PIPELINE_IID
        echo "ADMIN_REV_IMAGE=$CI_REGISTRY_IMAGE/admin:staging-rev-$CI_PIPELINE_IID" >> deploy.env
        echo "REVISION=staging-rev-$CI_PIPELINE_IID" >> deploy.env
      fi
    - |
      echo "image: $CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG" > build-manifest.txt
      echo "commit: $CI_COMMIT_SHA" >> build-manifest.txt
      echo "branch: $CI_COMMIT_BRANCH" >> build-manifest.txt
      echo "built_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build-manifest.txt
      echo "ADMIN_IMAGE=$CI_REGISTRY_IMAGE/admin:$ENV_TAG-$IMAGE_TAG" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    paths: [build-manifest.txt]
    expire_in: 90 days
  timeout: 30 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "development"
      variables:
        ENV_TAG: dev
        DEPLOY_API_URL: https://dev-api.epsx.io
        DEPLOY_ADMIN_URL: https://dev-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "staging"
      variables:
        ENV_TAG: staging
        DEPLOY_API_URL: https://staging-api.epsx.io
        DEPLOY_ADMIN_URL: https://staging-admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: testnet
        DEPLOY_CHAIN_ID: "97"
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENV_TAG: prod
        DEPLOY_API_URL: https://api.epsx.io
        DEPLOY_ADMIN_URL: https://admin.epsx.io
        DEPLOY_BLOCKCHAIN_NETWORK: mainnet
        DEPLOY_CHAIN_ID: "56"

build:backend:
  stage: build
  image: docker:27
  needs:
    - job: test:backend
      optional: true  # backend test may be skipped (no changes)
  <<: *docker-login
  script:
    - docker builder prune -af 2>/dev/null || true
    - >
      docker build
      -f apps/backend/Dockerfile
      -t $CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG
      -t $CI_REGISTRY_IMAGE/backend:$ENV_TAG-latest
      .
    - docker push $CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE/backend:$ENV_TAG-latest
    - |
      if [ "$CI_COMMIT_BRANCH" = "staging" ]; then
        docker tag $CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG $CI_REGISTRY_IMAGE/backend:staging-rev-$CI_PIPELINE_IID
        docker push $CI_REGISTRY_IMAGE/backend:staging-rev-$CI_PIPELINE_IID
        echo "BACKEND_REV_IMAGE=$CI_REGISTRY_IMAGE/backend:staging-rev-$CI_PIPELINE_IID" >> deploy.env
        echo "REVISION=staging-rev-$CI_PIPELINE_IID" >> deploy.env
      fi
    - |
      echo "image: $CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG" > build-manifest.txt
      echo "commit: $CI_COMMIT_SHA" >> build-manifest.txt
      echo "branch: $CI_COMMIT_BRANCH" >> build-manifest.txt
      echo "built_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build-manifest.txt
      echo "BACKEND_IMAGE=$CI_REGISTRY_IMAGE/backend:$ENV_TAG-$IMAGE_TAG" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    paths: [build-manifest.txt]
    expire_in: 90 days
  timeout: 30 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "development"
      variables:
        ENV_TAG: dev
    - if: $CI_COMMIT_BRANCH == "staging"
      variables:
        ENV_TAG: staging
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENV_TAG: prod

# ---------------------------------------------------------------------------
# Deploy
# ---------------------------------------------------------------------------
# Shell runner (tags: k8s, arm64, epsx) with kubectl + kubeconfig.
# Image vars come from build job dotenv artifacts.


deploy:staging:revision:
  stage: deploy
  image: docker:27
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend
      artifacts: true
    - job: build:admin
      artifacts: true
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $FRONTEND_REV_IMAGE
    - docker pull $ADMIN_REV_IMAGE
    - docker pull $BACKEND_REV_IMAGE
    - docker tag $FRONTEND_REV_IMAGE epsx-frontend:$REVISION
    - docker tag $ADMIN_REV_IMAGE    epsx-admin-frontend:$REVISION
    - docker tag $BACKEND_REV_IMAGE  epsx-backend:$REVISION
    # Validate staging env vars before deploy
    - set -a && source /Users/fluke/epsx-runner/envs/.env.staging && set +a
    - bash infrastructure/scripts/validate-env.sh staging
    # Start infra (postgres, redis, minio, traefik) if not already running
    - cd infrastructure/docker && docker compose --env-file /Users/fluke/epsx-runner/envs/.env.staging -f docker-compose.staging.yml up -d postgres redis minio traefik && cd $CI_PROJECT_DIR
    # Remove any existing containers for this revision before starting fresh
    - |
      for c in epsx-staging-frontend-$REVISION epsx-staging-admin-$REVISION epsx-staging-backend-$REVISION; do
        docker rm -f "$c" || true
      done
    # Start frontend revision container
    - >
      docker run -d
      --name epsx-staging-frontend-$REVISION
      --network epsx_staging_network
      --restart unless-stopped
      --memory 512m --cpus 1
      -e NODE_ENV=production
      -e PORT=3000
      -e HOSTNAME=0.0.0.0
      -e BACKEND_URL=https://staging-api.epsx.io
      -e NEXT_PUBLIC_BACKEND_URL=https://staging-api.epsx.io
      epsx-frontend:$REVISION
    # Start admin revision container
    - >
      docker run -d
      --name epsx-staging-admin-$REVISION
      --network epsx_staging_network
      --restart unless-stopped
      --memory 512m --cpus 1
      -e NODE_ENV=production
      -e PORT=3000
      -e HOSTNAME=0.0.0.0
      -e BACKEND_URL=https://staging-api.epsx.io
      -e NEXT_PUBLIC_BACKEND_URL=https://staging-api.epsx.io
      epsx-admin-frontend:$REVISION
    # Start backend revision container
    - >
      docker run -d
      --name epsx-staging-backend-$REVISION
      --network epsx_staging_network
      --restart unless-stopped
      --memory 1g --cpus 2
      --env-file /Users/fluke/epsx-runner/envs/.env.staging
      epsx-backend:$REVISION
    # Ensure staging traefik dir exists, then write traffic config
    - docker run --rm -v /Users/fluke/epsx-runner:/host alpine mkdir -p /host/traefik/staging
    - |
      docker run --rm -i \
        -v /Users/fluke/epsx-runner/traefik/staging:/cfg \
        alpine sh -c "cat > /cfg/traffic.yml" << EOF
      http:
        routers:
          staging-frontend:
            entryPoints: [web]
            rule: "Host(\`staging.epsx.io\`)"
            service: staging-frontend
          staging-admin:
            entryPoints: [web]
            rule: "Host(\`staging-admin.epsx.io\`)"
            service: staging-admin
          staging-api:
            entryPoints: [web]
            rule: "Host(\`staging-api.epsx.io\`)"
            service: staging-api
        services:
          staging-frontend:
            weighted:
              services:
                - name: staging-frontend-${REVISION}
                  weight: 100
          staging-admin:
            weighted:
              services:
                - name: staging-admin-${REVISION}
                  weight: 100
          staging-api:
            weighted:
              services:
                - name: staging-api-${REVISION}
                  weight: 100
          staging-frontend-${REVISION}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-frontend-${REVISION}:3000"
          staging-admin-${REVISION}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-admin-${REVISION}:3000"
          staging-api-${REVISION}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-backend-${REVISION}:8080"
      EOF
    # Keep last 3 staging frontend revisions; remove older (+ paired admin+backend)
    - |
      FRONTENDS=$(docker ps -a \
        --filter "name=epsx-staging-frontend-staging-rev-" \
        --format "{{.CreatedAt}}\t{{.Names}}" \
        | sort | awk '{print $NF}')
      COUNT=$(echo "$FRONTENDS" | grep -c . || true)
      if [ "$COUNT" -gt 3 ]; then
        TO_REMOVE=$(echo "$FRONTENDS" | head -n $((COUNT - 3)))
        for CNAME in $TO_REMOVE; do
          REV=$(echo "$CNAME" | sed 's/epsx-staging-frontend-//')
          echo "Removing old revision: $REV"
          docker rm -f "epsx-staging-frontend-$REV" "epsx-staging-admin-$REV" "epsx-staging-backend-$REV" || true
        done
      fi
    - |
      echo "revision: $REVISION"        > deploy-manifest.txt
      echo "commit: $CI_COMMIT_SHA"     >> deploy-manifest.txt
      echo "pipeline: $CI_PIPELINE_IID" >> deploy-manifest.txt
      echo "deployed_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy-manifest.txt
  artifacts:
    paths: [deploy-manifest.txt]
    expire_in: 90 days
  environment:
    name: staging
    url: https://staging.epsx.io
  timeout: 15 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: manual
      allow_failure: false

deploy:staging:rollback:
  stage: deploy
  image: docker:27
  variables:
    ROLLBACK_TO: ""   # set in GitLab UI when triggering (e.g. staging-rev-39)
  script:
    - '[ -z "$ROLLBACK_TO" ] && echo "ROLLBACK_TO must be set (e.g. staging-rev-42)" && exit 1'
    - |
      docker run --rm -i \
        -v /Users/fluke/epsx-runner/traefik/staging:/cfg \
        alpine sh -c "cat > /cfg/traffic.yml" << EOF
      http:
        routers:
          staging-frontend:
            entryPoints: [web]
            rule: "Host(\`staging.epsx.io\`)"
            service: staging-frontend
          staging-admin:
            entryPoints: [web]
            rule: "Host(\`staging-admin.epsx.io\`)"
            service: staging-admin
          staging-api:
            entryPoints: [web]
            rule: "Host(\`staging-api.epsx.io\`)"
            service: staging-api
        services:
          staging-frontend:
            weighted:
              services:
                - name: staging-frontend-${ROLLBACK_TO}
                  weight: 100
          staging-admin:
            weighted:
              services:
                - name: staging-admin-${ROLLBACK_TO}
                  weight: 100
          staging-api:
            weighted:
              services:
                - name: staging-api-${ROLLBACK_TO}
                  weight: 100
          staging-frontend-${ROLLBACK_TO}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-frontend-${ROLLBACK_TO}:3000"
          staging-admin-${ROLLBACK_TO}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-admin-${ROLLBACK_TO}:3000"
          staging-api-${ROLLBACK_TO}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-backend-${ROLLBACK_TO}:8080"
      EOF
  environment:
    name: staging
    url: https://staging.epsx.io
  timeout: 5 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: manual
      allow_failure: false

deploy:staging:traffic:
  stage: deploy
  image: docker:27
  variables:
    REV_A: ""       # e.g. staging-rev-42
    WEIGHT_A: "80"
    REV_B: ""       # e.g. staging-rev-43
    WEIGHT_B: "20"
  script:
    - '[ -z "$REV_A" ] && echo "REV_A must be set (e.g. staging-rev-42)" && exit 1'
    - '[ -z "$REV_B" ] && echo "REV_B must be set (e.g. staging-rev-43)" && exit 1'
    - |
      docker run --rm -i \
        -v /Users/fluke/epsx-runner/traefik/staging:/cfg \
        alpine sh -c "cat > /cfg/traffic.yml" << EOF
      http:
        routers:
          staging-frontend:
            entryPoints: [web]
            rule: "Host(\`staging.epsx.io\`)"
            service: staging-frontend
          staging-admin:
            entryPoints: [web]
            rule: "Host(\`staging-admin.epsx.io\`)"
            service: staging-admin
          staging-api:
            entryPoints: [web]
            rule: "Host(\`staging-api.epsx.io\`)"
            service: staging-api
        services:
          staging-frontend:
            weighted:
              services:
                - name: staging-frontend-${REV_A}
                  weight: ${WEIGHT_A}
                - name: staging-frontend-${REV_B}
                  weight: ${WEIGHT_B}
          staging-admin:
            weighted:
              services:
                - name: staging-admin-${REV_A}
                  weight: ${WEIGHT_A}
                - name: staging-admin-${REV_B}
                  weight: ${WEIGHT_B}
          staging-api:
            weighted:
              services:
                - name: staging-api-${REV_A}
                  weight: ${WEIGHT_A}
                - name: staging-api-${REV_B}
                  weight: ${WEIGHT_B}
          staging-frontend-${REV_A}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-frontend-${REV_A}:3000"
          staging-admin-${REV_A}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-admin-${REV_A}:3000"
          staging-api-${REV_A}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-backend-${REV_A}:8080"
          staging-frontend-${REV_B}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-frontend-${REV_B}:3000"
          staging-admin-${REV_B}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-admin-${REV_B}:3000"
          staging-api-${REV_B}:
            loadBalancer:
              servers:
                - url: "http://epsx-staging-backend-${REV_B}:8080"
      EOF
  environment:
    name: staging
    url: https://staging.epsx.io
  timeout: 5 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
      when: manual
      allow_failure: false

deploy:prod:
  stage: deploy
  image: docker:27
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend
      artifacts: true
    - job: build:admin
      artifacts: true
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $BACKEND_IMAGE
    - docker pull $FRONTEND_IMAGE
    - docker pull $ADMIN_IMAGE
    - docker tag $BACKEND_IMAGE registry.jesadakorn.com/jesadakorn/epsx/backend:prod-latest
    - docker tag $FRONTEND_IMAGE registry.jesadakorn.com/jesadakorn/epsx/frontend:prod-latest
    - docker tag $ADMIN_IMAGE registry.jesadakorn.com/jesadakorn/epsx/admin:prod-latest
    - k3d image import registry.jesadakorn.com/jesadakorn/epsx/backend:prod-latest registry.jesadakorn.com/jesadakorn/epsx/frontend:prod-latest registry.jesadakorn.com/jesadakorn/epsx/admin:prod-latest -c epsx-local
    - kubectl rollout restart deployment/epsx-backend  -n epsx-prod
    - kubectl rollout restart deployment/epsx-frontend -n epsx-prod
    - kubectl rollout restart deployment/epsx-admin    -n epsx-prod
    - kubectl rollout status  deployment/epsx-backend  -n epsx-prod --timeout=120s
    - kubectl rollout status  deployment/epsx-frontend -n epsx-prod --timeout=120s
    - kubectl rollout status  deployment/epsx-admin    -n epsx-prod --timeout=120s
    - kubectl get pods -n epsx-prod
  environment:
    name: production
    url: https://epsx.io
  timeout: 15 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false

verify:prod:
  stage: deploy
  image: curlimages/curl:latest
  needs: ["deploy:prod"]
  script:
    - curl -sf https://api.epsx.io/health || exit 1
    - curl -sf -o /dev/null -w "%{http_code}" https://epsx.io | grep -q "200" || exit 1
    - curl -sf -o /dev/null -w "%{http_code}" https://admin.epsx.io | grep -qE "200|307" || exit 1
    - echo "All services healthy"
  timeout: 5 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true

# ---------------------------------------------------------------------------
# Review Apps (MR only — frontend preview with prod backend)
# ---------------------------------------------------------------------------

review:deploy:
  stage: deploy
  image: docker:27
  <<: *docker-login
  script:
    - >
      docker build
      --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=$WALLETCONNECT_PROJECT_ID
      --build-arg NEXT_PUBLIC_APP_URL=https://mr-${CI_MERGE_REQUEST_IID}.review.epsx.io
      --build-arg NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      --build-arg NEXT_PUBLIC_ADMIN_URL=https://admin.epsx.io
      --build-arg NEXT_PUBLIC_BLOCKCHAIN_NETWORK=mainnet
      --build-arg NEXT_PUBLIC_CHAIN_ID=56
      --build-arg NEXT_PUBLIC_OAUTH_CLIENT_ID=$OAUTH_CLIENT_ID
      --build-arg NEXT_PUBLIC_PAYMENT_ESCROW_MAINNET=${PAYMENT_ESCROW_MAINNET:-}
      --build-arg NEXT_PUBLIC_PAYMENT_RECEIVER_MAINNET=${PAYMENT_RECEIVER_MAINNET:-}
      --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      -f apps/frontend/Dockerfile
      -t $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID}
      .
    - docker push $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID}
    - docker rm -f epsx-review-mr-${CI_MERGE_REQUEST_IID} || true
    - >
      docker run -d
      --name epsx-review-mr-${CI_MERGE_REQUEST_IID}
      --network epsx_review_network
      --memory 512m
      --cpus 1
      --restart unless-stopped
      -e NODE_ENV=production
      -e BACKEND_URL=https://api.epsx.io
      -e NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
      -e PORT=3000
      -e HOSTNAME=0.0.0.0
      --label "traefik.enable=true"
      --label "traefik.http.routers.mr-${CI_MERGE_REQUEST_IID}.rule=Host(\`mr-${CI_MERGE_REQUEST_IID}.review.epsx.io\`)"
      --label "traefik.http.routers.mr-${CI_MERGE_REQUEST_IID}.entrypoints=web"
      --label "traefik.http.services.mr-${CI_MERGE_REQUEST_IID}.loadbalancer.server.port=3000"
      $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID}
  environment:
    name: review/mr-${CI_MERGE_REQUEST_IID}
    url: https://mr-${CI_MERGE_REQUEST_IID}.review.epsx.io
    on_stop: review:stop
    auto_stop_in: 3 days
  timeout: 15 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/frontend/**/*
        - shared/**/*

review:stop:
  stage: deploy
  image: docker:27
  script:
    - docker rm -f epsx-review-mr-${CI_MERGE_REQUEST_IID} || true
    - docker rmi $CI_REGISTRY_IMAGE/review:mr-${CI_MERGE_REQUEST_IID} || true
  environment:
    name: review/mr-${CI_MERGE_REQUEST_IID}
    action: stop
  timeout: 5 minutes
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/frontend/**/*
        - shared/**/*
      when: manual
      allow_failure: true

# ---------------------------------------------------------------------------
# K8s — GitOps deploy via GitLab Agent (pull-based)
# ---------------------------------------------------------------------------

validate:env:prod:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache bash grep coreutils
    - |
      # Install SOPS + age
      wget -qO /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.arm64
      chmod +x /usr/local/bin/sops
      apk add --no-cache age
  script:
    - export SOPS_AGE_KEY_FILE=/Users/fluke/.config/sops/age/keys.txt
    - sops -d infrastructure/docker/.env.prod.enc > /tmp/.env.prod
    - set -a && source /tmp/.env.prod && set +a
    - bash infrastructure/scripts/validate-env.sh prod
    - rm -f /tmp/.env.prod
  timeout: 5 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false

deploy:k8s:secrets:
  stage: deploy
  image: bitnami/kubectl:latest
  needs: ["validate:env:prod"]
  before_script:
    - |
      # Install SOPS + age
      apt-get update -qq && apt-get install -y -qq wget age
      wget -qO /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.arm64
      chmod +x /usr/local/bin/sops
  script:
    - |
      # Write KUBECONFIG from CI variable
      echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
      export KUBECONFIG=/tmp/kubeconfig
    - |
      # Decrypt env file
      export SOPS_AGE_KEY_FILE=/Users/fluke/.config/sops/age/keys.txt
      sops -d infrastructure/docker/.env.prod.enc > /tmp/.env.prod
      # Override env file path for create-secrets.sh
      mkdir -p /Users/fluke/epsx-runner/envs
      cp /tmp/.env.prod /Users/fluke/epsx-runner/envs/.env.prod
    - ./infrastructure/kubernetes/scripts/create-secrets.sh prod
    - rm -f /tmp/.env.prod /Users/fluke/epsx-runner/envs/.env.prod
  environment:
    name: production
    url: https://epsx.io
  timeout: 10 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false

deploy:k8s:tag:
  stage: deploy
  image: alpine/git
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend
      artifacts: true
    - job: build:admin
      artifacts: true
  before_script:
    - apk add --no-cache curl
    - |
      # Install kustomize
      curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz \
        | tar xz -C /usr/local/bin
    - git config user.email "ci@epsx.io"
    - git config user.name "GitLab CI"
  script:
    - cd infrastructure/kubernetes/overlays/prod
    - |
      kustomize edit set image \
        registry.jesadakorn.com/jesadakorn/epsx/backend:prod-$IMAGE_TAG \
        registry.jesadakorn.com/jesadakorn/epsx/frontend:prod-$IMAGE_TAG \
        registry.jesadakorn.com/jesadakorn/epsx/admin:prod-$IMAGE_TAG
    - git add kustomization.yaml
    - git diff --cached --quiet && echo "No image changes" && exit 0
    - 'git commit -m "deploy(k8s): prod $IMAGE_TAG [skip ci]"'
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:$CI_COMMIT_BRANCH
  environment:
    name: production
    url: https://epsx.io
  timeout: 10 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false

