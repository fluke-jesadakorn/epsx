version: '3.8'

services:
  frontend-dev:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: builder
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - apps/frontend/.env.development
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages:/app/packages
      - ./tsconfig.base.json:/app/tsconfig.base.json
    command: ["bun", "run", "dev"]
    networks:
      - epsx-dev

  # backend-dev service temporarily disabled
  # backend-dev:
  #   build:
  #     context: .
  #     dockerfile: apps/backend/Dockerfile
  #     target: builder
  #   ports:
  #     - "3002:3002"
  #   environment:
  #     - RUST_ENV=development
  #     - PORT=3002
  #   env_file:
  #     - apps/backend/.env.example
  #   volumes:
  #     - ./apps/backend:/app
  #   command: ["cargo", "run"]
  #   networks:
  #     - epsx-dev

  admin-dev:
    build:
      context: .
      dockerfile: apps/admin-frontend/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/admin-frontend:/app/apps/admin-frontend
      - ./packages:/app/packages
    command: ["npm", "run", "dev"]
    networks:
      - epsx-dev

networks:
  epsx-dev:
    driver: bridge

volumes:
  node_modules_frontend:
  node_modules_admin:
  cargo_cache:
