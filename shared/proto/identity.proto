// EPSX Identity service — gRPC contract (Wave 13a, Track A) +
// real-time event schema (Wave 13b, Track A).
//
// Day-1 surface: ONE RPC, `GetWalletRankingOffset`, that returns the
// plan-tier ranking offset for a given wallet address. The server
// implementation is a stub that always returns the free-plan offset
// (matching the wave-12 in-process `FreePlanWalletRankingOffsetQuery`
// in `apps/analytics/src/main.rs`). Future waves will swap the stub
// for a tier-aware implementation that reads from
// `wallet_plan_assignments` in the identity PostgreSQL schema.
//
// Wave 13b adds the `RankingOffsetChange` message — the wire
// schema for the SSE event published to subscribers when a
// wallet's ranking offset changes. The message is *also* the
// prost struct that the gRPC client / future `UpdateRankingOffset`
// RPCs will use, so the same field numbers are the single source
// of truth across the gRPC seam + the SSE pubsub stream.
//
// Why a gRPC seam (not HTTP/JSON)?
//   - The kernel-level `WalletRankingOffsetQuery` port
//     (`shared/rust/epsx-contracts/src/wallet_ranking_offset_query.rs`)
//     is the stable contract; the network transport is a swap-in
//     detail. gRPC + tonic gives a forward-compatible binary protocol
//     (protobuf field numbers are append-only; future waves can add a
//     `tier` enum or `plan_id` field without breaking the wire
//     contract) and integrates natively with the
//     `epsx-contracts::value_objects::ranking_offset::RankingOffset`
//     value object via a `From<i32>` conversion.
//
// Spec: `docs/wave8-service-boundary/ROADMAP.md` §17.1 (wave 13a
// Track A creates that section) + §17.2 (wave 13b Track A creates
// that section). Referenced from the wave-10 R6 audit
// recommendation in `audit-analytics.md` §10 Refactor #1.

syntax = "proto3";

package epsx.identity.v1;

// The Identity service — day 1 exposes one RPC. Future waves will
// add `GetActivePlan`, `SubscribeToRankingChanges`, etc. as the
// tier-aware logic moves out of the monolith.
service Identity {
  // Returns the plan-tier ranking offset for `wallet`.
  //
  // Day 1: always returns the free-plan offset (matching the
  // wave-12 in-process stub). Future waves: tier-aware — the
  // server reads from the `wallet_plan_assignments` table and
  // returns the minimum offset across the wallet's active plans
  // (with a fallback to `FREE_PLAN_RANKING_OFFSET` for unknown
  // wallets).
  //
  // The fallback contract (timeout → fall back to free-plan offset)
  // is the responsibility of the **client** (wave-13a Track B in
  // the analytics binary). This server is best-effort: a transient
  // DB read failure surfaces as an `UNAVAILABLE` gRPC status, and
  // the client decides whether to retry, fall back, or fail.
  rpc GetWalletRankingOffset(GetWalletRankingOffsetRequest)
      returns (GetWalletRankingOffsetResponse);
}

message GetWalletRankingOffsetRequest {
  // Lowercased, EIP-55-checksummed or plain-hex wallet address.
  // The server does not validate the format — it treats the
  // string as opaque. Future waves may add a `oneof wallet_format`
  // discriminator (e.g. ENS name, email-bound wallet) without
  // breaking the wire contract.
  string wallet = 1;
}

message GetWalletRankingOffsetResponse {
  // The plan-tier ranking offset. Lower numbers = higher
  // visibility (rank < N). The `FREE_PLAN_RANKING_OFFSET`
  // constant in `epsx-contracts` is the floor (currently 100).
  //
  // Wire type: `int32` to match the `RankingOffset(i32)` newtype's
  // inner type. Future waves can add a `tier` enum (FREE, PRO,
  // VIP) alongside the numeric offset without breaking
  // forward-compatibility.
  int32 offset = 1;
}

// Wave 13b: real-time ranking offset change event.
//
// The SSE stream served by
// `epsx-identity-service` (port 50052,
// `GET /v1/stream/ranking-offsets`) emits one `data:` line per
// `RankingOffsetChange` with the JSON form:
//
//   data: {"wallet":"0x...","offset":100,"changed_at_ms":1700000000000}
//
// The day-1 emitter is the `POST /v1/emit` admin hook (also on
// port 50052) — a future wave-13c+ will hook the gRPC
// `GetWalletRankingOffset` path (or a new `UpdateRankingOffset`
// gRPC) into the publish path so every offset change fans out
// automatically. The contract is intentionally simple: any
// subscriber sees every emitted event; the consumer filters by
// wallet address on its end.
//
// The `changed_at_ms` field is a Unix epoch in milliseconds
// (JavaScript `Date.now()` shape) — the spec is `int64` so a
// future 64-bit-clock domain (e.g. nanosecond precision) is
// wire-compatible.
message RankingOffsetChange {
  // The wallet whose ranking offset changed. Lowercased
  // EIP-55-checksummed or plain-hex string; the server does
  // not validate the format — it treats the string as opaque
  // (matches the `GetWalletRankingOffsetRequest.wallet` field's
  // contract).
  string wallet = 1;

  // The new offset (lower = more visible). Wire type `int32`
  // matching the `RankingOffset(i32)` newtype's inner type so
  // a future gRPC `UpdateRankingOffset` RPC can return the
  // same `RankingOffset` value object via `From<i32>`.
  int32 offset = 2;

  // Unix epoch millis at the time of the change. Set by the
  // emit handler (`emit_handler.rs`) at publish time so the
  // consumer doesn't have to trust its own clock.
  int64 changed_at_ms = 3;
}
