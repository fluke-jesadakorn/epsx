[package]
name = "epsx-identity-shared"
version.workspace = true
edition.workspace = true
description = "EPSX auth + identity shared library (wave9 Shape B extraction — track B)"
license = "MIT OR Apache-2.0"

[dependencies]
# Workspace-shared siblings
epsx-kernel = { path = "../kernel" }
epsx-crypto = { path = "../crypto" }

# Auth + crypto
serde = "1.0"
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
jsonwebtoken = "9.2"
sha2 = "0.10"
rsa = "0.9"
rand = "0.8"
tracing = "0.1"
uuid = { version = "1.7", features = ["v4", "v5", "serde"] }
hex = "0.4"
base64 = "0.22"
once_cell = "1.19"
async-stream = "0.3"
futures = "0.3"
dashmap = "6.0"
url = "2.5"
regex = "1.10"
siwe = "0.6"
ethers = "2.0"
utoipa = "5.1"
diesel = { version = "2.1", features = ["postgres", "uuid", "chrono", "numeric", "serde_json", "r2d2"] }
diesel-async = { version = "0.4", features = ["postgres", "deadpool", "async-connection-wrapper", "bb8"] }
deadpool = "0.9"
anyhow = "1.0"
validator = { version = "0.18", features = ["derive"] }
tower = "0.5"
tower-http = "0.5"
http = "1.0"
axum = "0.8"
serde_yaml = "0.9"
tokio-postgres = "0.7"

[dev-dependencies]
tokio-test = "0.4"
