[package]
name = "epsx-dioxus-ui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Dioxus 0.7 UI component library for EPSX — 1:1 mirror of the Next.js shadcn/Radix design system"

[dependencies]
dioxus = { workspace = true }
dioxus-router = { workspace = true }
epsx-templates = { path = "../templates" }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# === wave3a-wiring-track-a ===
# Test-only dep so unit tests inside `src/layout/main_layout.rs` can
# serialize a `dioxus::prelude::Element` to a string and assert on the
# rendered HTML. Already in the workspace dep tree as a transitive
# dep of the BFF crates; we only need it direct for `cargo test`.
dioxus-ssr = { workspace = true }

[features]
default = []
ssr = []
web = []
