[databases]
epsx_dev               = host=postgres port=5432 dbname=epsx_dev               pool_size=10
epsx_analytics_dev     = host=postgres port=5432 dbname=epsx_analytics_dev     pool_size=5
epsx_notifications_dev = host=postgres port=5432 dbname=epsx_notifications_dev pool_size=5
epsx_payments_dev      = host=postgres port=5432 dbname=epsx_payments_dev      pool_size=5

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = session
session_reset_query = DISCARD ALL

min_pool_size = 1
default_pool_size = 5
max_client_conn = 100
reserve_pool_size = 3
reserve_pool_timeout = 3

server_connect_timeout = 10
server_idle_timeout = 300
server_lifetime = 3600

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

admin_users = pgbouncer_admin
