auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /Users/fluke/epsx-prod/data/loki
  storage:
    filesystem:
      chunks_directory: /Users/fluke/epsx-prod/data/loki/chunks
      rules_directory: /Users/fluke/epsx-prod/data/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_length: 721h

analytics_enabled: false
