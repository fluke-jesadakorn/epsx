# ============================================================================
# Prometheus Configuration
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'gateway'

  - job_name: 'identity'
    static_configs:
      - targets: ['localhost:9091']
        labels:
          service: 'identity'

  - job_name: 'wallet'
    static_configs:
      - targets: ['localhost:9092']
        labels:
          service: 'wallet'

  - job_name: 'payment'
    static_configs:
      - targets: ['localhost:9093']
        labels:
          service: 'payment'

  - job_name: 'subscription'
    static_configs:
      - targets: ['localhost:9094']
        labels:
          service: 'subscription'

  - job_name: 'content'
    static_configs:
      - targets: ['localhost:9095']
        labels:
          service: 'content'

  - job_name: 'notification'
    static_configs:
      - targets: ['localhost:9096']
        labels:
          service: 'notification'

  - job_name: 'analytics'
    static_configs:
      - targets: ['localhost:9097']
        labels:
          service: 'analytics'

  - job_name: 'indexer'
    static_configs:
      - targets: ['localhost:9098']
        labels:
          service: 'indexer'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
