server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

compactor:
  compaction:
    block_retention: 30d

storage:
  trace:
    backend: local
    local:
      path: /Users/fluke/epsx-prod/data/tempo
    wal:
      path: /Users/fluke/epsx-prod/data/tempo/wal

metrics_generator:
  registry:
    external_labels:
      source: epsx
      cluster: mac-prod
  storage:
    path: /Users/fluke/epsx-prod/data/tempo/generator/wal
    remote_write:
      - url: http://localhost:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /Users/fluke/epsx-prod/data/tempo/generator/traces
  processor:
    service_graphs:
      dimensions:
        - service.name
        - http.method
        - http.target
    span_metrics:
      dimensions:
        - service.name
        - http.method
        - http.target
