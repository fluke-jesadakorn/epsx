apiVersion: v1
kind: Service
metadata:
  name: epsx-frontend
  namespace: epsx-prod
spec:
  type: NodePort
  selector:
    app: epsx-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: epsx-admin
  namespace: epsx-prod
spec:
  type: NodePort
  selector:
    app: epsx-admin
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
---
apiVersion: v1
kind: Service
metadata:
  name: epsx-backend
  namespace: epsx-prod
spec:
  type: NodePort
  selector:
    app: epsx-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
