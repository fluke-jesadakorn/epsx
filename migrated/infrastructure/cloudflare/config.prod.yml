# ============================================================================
# Cloudflare Tunnel - Production
# ============================================================================
# Routes traffic from Cloudflare's edge to local services on Mac

tunnel: ${TUNNEL_ID}
credentials-file: /etc/cloudflared/${TUNNEL_ID}.json

ingress:
  # Frontend - epsx.io
  - hostname: epsx.io
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s
      http2Origin: true

  # Admin - admin.epsx.io
  - hostname: admin.epsx.io
    service: http://localhost:3001
    originRequest:
      connectTimeout: 30s

  # Pay - pay.epsx.io
  - hostname: pay.epsx.io
    service: http://localhost:3002
    originRequest:
      connectTimeout: 30s

  # Preview - preview.epsx.io
  - hostname: preview.epsx.io
    service: http://localhost:3003
    originRequest:
      connectTimeout: 30s

  # API Gateway - api.epsx.io
  - hostname: api.epsx.io
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s
      http2Origin: true

  # WebSocket - ws.epsx.io
  - hostname: ws.epsx.io
    service: http://localhost:8081
    originRequest:
      connectTimeout: 30s

  # Catch-all (required)
  - service: http_status:404

loglevel: info
protocol: quic
metrics: 0.0.0.0:2000
no-autoupdate: true
