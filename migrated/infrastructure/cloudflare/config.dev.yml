# ============================================================================
# Cloudflare Tunnel - Development
# ============================================================================
# Routes dev.* hostnames to local services

ingress:
  # Frontend - dev.epsx.io
  - hostname: dev.epsx.io
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s

  # Admin - dev-admin.epsx.io
  - hostname: dev-admin.epsx.io
    service: http://localhost:3001
    originRequest:
      connectTimeout: 30s

  # Pay - dev-pay.epsx.io
  - hostname: dev-pay.epsx.io
    service: http://localhost:3002
    originRequest:
      connectTimeout: 30s

  # Preview - dev-preview.epsx.io
  - hostname: dev-preview.epsx.io
    service: http://localhost:3003
    originRequest:
      connectTimeout: 30s

  # API Gateway - dev-api.epsx.io
  - hostname: dev-api.epsx.io
    service: http://localhost:8080
    originRequest:
      connectTimeout: 30s

  # WebSocket - dev-ws.epsx.io
  - hostname: dev-ws.epsx.io
    service: http://localhost:8081
    originRequest:
      connectTimeout: 30s

  # Catch-all
  - service: http_status:404

loglevel: info
protocol: quic
no-autoupdate: true
