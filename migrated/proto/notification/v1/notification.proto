syntax = "proto3";

package epsx.notification.v1;

option rust_module = "notification_v1";

service NotificationService {
  // Channels
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);
  rpc SendPush(SendPushRequest) returns (SendPushResponse);
  rpc SendInApp(SendInAppRequest) returns (SendInAppResponse);
  rpc SendWebhook(SendWebhookRequest) returns (SendWebhookResponse);
  rpc SendWeb3Notification(SendWeb3NotificationRequest) returns (SendWeb3NotificationResponse);
  
  // Templates
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);
  
  // Preferences
  rpc GetPreferences(GetPreferencesRequest) returns (GetPreferencesResponse);
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (UpdatePreferencesResponse);
  
  // History
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
}

message SendEmailRequest {
  string to = 1;
  string template_id = 2;
  map<string, string> variables = 3;
  string from = 4;
  string reply_to = 5;
  map<string, string> headers = 6;
}

message SendEmailResponse {
  string notification_id = 1;
  bool queued = 2;
}

message SendPushRequest {
  string user_id = 1;
  string title = 2;
  string body = 3;
  map<string, string> data = 4;
  string template_id = 5;
  map<string, string> variables = 6;
}

message SendPushResponse {
  string notification_id = 1;
  bool queued = 2;
}

message SendInAppRequest {
  string user_id = 1;
  string title = 2;
  string body = 3;
  string type = 4; // info, warning, error, success
  map<string, string> data = 5;
  int64 expires_at = 6;
}

message SendInAppResponse {
  string notification_id = 1;
  bool queued = 2;
}

message SendWebhookRequest {
  string url = 1;
  string event = 2;
  string payload_json = 3;
  string secret = 4;
  int32 retry_count = 5;
}

message SendWebhookResponse {
  string notification_id = 1;
  bool queued = 2;
}

message SendWeb3NotificationRequest {
  string address = 1;
  string chain_id = 2;
  string title = 3;
  string body = 4;
  string type = 5;
  string payload_json = 6;
}

message SendWeb3NotificationResponse {
  string notification_id = 1;
  bool queued = 2;
}

message CreateTemplateRequest {
  string name = 1;
  string channel = 2; // email, push, in_app, webhook, web3
  string subject = 3;
  string body = 4; // Handlebars template
  string body_text = 5;
  map<string, string> variables = 6; // Variable descriptions
}

message CreateTemplateResponse {
  Template template = 1;
}

message GetTemplateRequest {
  string template_id = 1;
}

message GetTemplateResponse {
  Template template = 1;
}

message ListTemplatesRequest {
  string channel = 1;
}

message ListTemplatesResponse {
  repeated Template templates = 1;
}

message UpdateTemplateRequest {
  string template_id = 1;
  string subject = 2;
  string body = 3;
  string body_text = 4;
  map<string, string> variables = 5;
}

message UpdateTemplateResponse {
  Template template = 1;
}

message DeleteTemplateRequest {
  string template_id = 1;
}

message DeleteTemplateResponse {
  bool success = 1;
}

message GetPreferencesRequest {
  string user_id = 1;
}

message GetPreferencesResponse {
  Preferences preferences = 1;
}

message UpdatePreferencesRequest {
  string user_id = 1;
  map<string, ChannelPreference> channels = 2;
}

message UpdatePreferencesResponse {
  Preferences preferences = 1;
}

message GetHistoryRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string channel = 4;
  string status = 5; // sent, failed, pending
}

message GetHistoryResponse {
  repeated NotificationHistory history = 1;
  int64 total = 2;
}

message Template {
  string id = 1;
  string name = 2;
  string channel = 3;
  string subject = 4;
  string body = 5;
  string body_text = 6;
  map<string, string> variables = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message Preferences {
  string user_id = 1;
  map<string, ChannelPreference> channels = 2;
  int64 updated_at = 3;
}

message ChannelPreference {
  bool enabled = 1;
  repeated string event_types = 2; // Empty = all
}

message NotificationHistory {
  string id = 1;
  string user_id = 2;
  string channel = 3;
  string template_id = 4;
  string subject = 5;
  string status = 6; // sent, failed, pending
  string error = 7;
  int64 created_at = 8;
  int64 sent_at = 9;
}