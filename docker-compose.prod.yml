version: '3.8'

services:
  frontend-prod:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - apps/frontend/.env.production
    networks:
      - epsx-prod
    # depends_on:
    #   - backend-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # backend-prod service temporarily disabled
  # backend-prod:
  #   build:
  #     context: .
  #     dockerfile: apps/backend/Dockerfile
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - RUST_ENV=production
  #     - PORT=8080
  #   env_file:
  #     - apps/backend/.env.production
  #   networks:
  #     - epsx-prod
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  admin-prod:
    build:
      context: .
      dockerfile: apps/admin-frontend/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    networks:
      - epsx-prod
    # depends_on:
    #   - backend-prod
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - epsx-prod
    depends_on:
      - frontend-prod
      # - backend-prod
    restart: unless-stopped

networks:
  epsx-prod:
    driver: bridge

volumes:
  prod_data:
  ssl_certs:
