name: Security and Dependency Audit

on:
  push:
    branches: [main, development]
    paths:
      - 'apps/backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cargo-deny.yml'
      - 'apps/backend/deny.toml'
  pull_request:
    branches: [main, development]
    paths:
      - 'apps/backend/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'apps/backend/deny.toml'
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/backend

jobs:
  audit:
    name: Security and License Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Install cargo-deny
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-deny@0.15.1

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-deny-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-deny-

    - name: Update advisory database
      run: cargo deny fetch

    - name: Check advisories (security vulnerabilities)
      run: cargo deny check advisories
      continue-on-error: false

    - name: Check licenses
      run: cargo deny check licenses
      continue-on-error: false

    - name: Check banned dependencies
      run: cargo deny check bans
      continue-on-error: false

    - name: Check sources
      run: cargo deny check sources
      continue-on-error: false

    # Generate detailed report for PR comments
    - name: Generate security report
      if: github.event_name == 'pull_request'
      run: |
        echo "## 🔒 Security and Dependency Audit Report" > security-report.md
        echo "" >> security-report.md
        echo "### Advisory Check (Security Vulnerabilities)" >> security-report.md
        if cargo deny check advisories --format json > advisories.json 2>/dev/null; then
          echo "✅ No security vulnerabilities found" >> security-report.md
        else
          echo "❌ Security vulnerabilities detected:" >> security-report.md
          echo '```json' >> security-report.md
          cat advisories.json >> security-report.md
          echo '```' >> security-report.md
        fi
        echo "" >> security-report.md
        echo "### License Check" >> security-report.md
        if cargo deny check licenses --format json > licenses.json 2>/dev/null; then
          echo "✅ All licenses are approved" >> security-report.md
        else
          echo "❌ License issues detected:" >> security-report.md
          echo '```json' >> security-report.md
          cat licenses.json >> security-report.md
          echo '```' >> security-report.md
        fi
        echo "" >> security-report.md
        echo "### Banned Dependencies Check" >> security-report.md
        if cargo deny check bans --format json > bans.json 2>/dev/null; then
          echo "✅ No banned dependencies found" >> security-report.md
        else
          echo "❌ Banned dependencies detected:" >> security-report.md
          echo '```json' >> security-report.md
          cat bans.json >> security-report.md
          echo '```' >> security-report.md
        fi

    - name: Comment PR with security report
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = 'apps/backend/security-report.md';
          
          if (fs.existsSync(reportPath)) {
            const report = fs.readFileSync(reportPath, 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
          }

  # Slack notification for security issues (optional - requires SLACK_WEBHOOK_URL secret)
  notify:
    name: Security Notification
    needs: audit
    runs-on: ubuntu-latest
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    
    steps:
    - name: Notify security team
      if: env.SLACK_WEBHOOK_URL != ''
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "🚨 Security audit failed for EPSX backend",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚨 *Security Audit Failed*\n\n*Repository:* '"${{ github.repository }}"'\n*Branch:* '"${{ github.ref_name }}"'\n*Commit:* <'"${{ github.server_url }}"'/'"${{ github.repository }}"'/commit/'"${{ github.sha }}"'|'"${GITHUB_SHA:0:7}"'>\n*Workflow:* <'"${{ github.server_url }}"'/'"${{ github.repository }}"'/actions/runs/'"${{ github.run_id }}"'|View Details>"
                }
              }
            ]
          }' \
          $SLACK_WEBHOOK_URL

  # Upload security artifacts for analysis
  artifacts:
    name: Upload Security Artifacts
    needs: audit
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-deny
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-deny

    - name: Generate audit reports
      working-directory: apps/backend
      run: |
        mkdir -p audit-reports
        cargo deny check advisories --format json > audit-reports/advisories.json || true
        cargo deny check licenses --format json > audit-reports/licenses.json || true
        cargo deny check bans --format json > audit-reports/bans.json || true
        cargo deny check sources --format json > audit-reports/sources.json || true
        cargo deny list --format json > audit-reports/dependencies.json || true

    - name: Upload audit artifacts
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-reports-${{ github.sha }}
        path: apps/backend/audit-reports/
        retention-days: 30