name: CD

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_ADMIN: ${{ github.repository }}/admin
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          build-args: |
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=04e0a500abfa1e095bf8f64b15fa2812
            NEXT_PUBLIC_APP_URL=https://epsx.io
            NEXT_PUBLIC_BACKEND_URL=https://api.epsx.io
            NEXT_PUBLIC_ADMIN_URL=https://admin.epsx.io
            NEXT_PUBLIC_BLOCKCHAIN_NETWORK=mainnet
            NEXT_PUBLIC_CHAIN_ID=56

      - name: Build and push Admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ADMIN }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ADMIN }}:latest
          build-args: |
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=04e0a500abfa1e095bf8f64b15fa2812
            NEXT_PUBLIC_APP_URL=https://admin.epsx.io
            NEXT_PUBLIC_BACKEND_URL=https://api.api.epsx.io
            NEXT_PUBLIC_ADMIN_URL=https://admin.epsx.io
            NEXT_PUBLIC_BLOCKCHAIN_NETWORK=mainnet
            NEXT_PUBLIC_CHAIN_ID=56

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Kustomize Image Tags
        run: |
          cd infrastructure/kubernetes/overlays/prod
          kustomize edit set image registry.jesadakorn.com/jesadakorn/epsx/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          kustomize edit set image registry.jesadakorn.com/jesadakorn/epsx/admin=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ADMIN }}:${{ github.sha }}
          kustomize edit set image registry.jesadakorn.com/jesadakorn/epsx/backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}

      - name: Deploy to Kubernetes
        uses: steebchen/kubectl@v2
        with:
          config: ${{ secrets.KUBECONFIG_CONTENT }}
          command: apply -k infrastructure/kubernetes/overlays/prod

      - name: Rollout Status
        uses: steebchen/kubectl@v2
        with:
          config: ${{ secrets.KUBECONFIG_CONTENT }}
          command: rollout status deployment -n epsx-prod
