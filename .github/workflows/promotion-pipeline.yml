name: Promotion Pipeline

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - development
      - staging
      - production
  push:
    branches:
      - development
      - staging
      - production

concurrency:
  group: promotion-pipeline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  promotion-pipeline:
    name: Promotion Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            target_branch="${{ github.base_ref }}"
          else
            target_branch="${GITHUB_REF_NAME}"
          fi

          case "${target_branch}" in
            development)
              env_name="development"
              rust_env="development"
              ;;
            staging)
              env_name="staging"
              rust_env="staging"
              ;;
            production)
              env_name="production"
              rust_env="production"
              ;;
            *)
              echo "Unsupported target branch: ${target_branch}" >&2
              exit 1
              ;;
          esac

          echo "branch=${target_branch}" >> "$GITHUB_OUTPUT"
          echo "env_name=${env_name}" >> "$GITHUB_OUTPUT"
          echo "rust_env=${rust_env}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: bun install

      - name: Validate root environment
        env:
          ENV: ${{ steps.target.outputs.env_name }}
          DEPLOYMENT_ENV: ${{ steps.target.outputs.env_name }}
          NODE_ENV: production
          RUST_ENV: ${{ steps.target.outputs.rust_env }}
        run: bun run env:validate

      - name: Build frontend
        env:
          ENV: ${{ steps.target.outputs.env_name }}
          DEPLOYMENT_ENV: ${{ steps.target.outputs.env_name }}
          NODE_ENV: production
        run: cd apps/frontend && bun run build

      - name: Build admin frontend
        env:
          ENV: ${{ steps.target.outputs.env_name }}
          DEPLOYMENT_ENV: ${{ steps.target.outputs.env_name }}
          NODE_ENV: production
        run: cd apps/admin-frontend && bun run build

      - name: Check backend
        env:
          ENV: ${{ steps.target.outputs.env_name }}
          DEPLOYMENT_ENV: ${{ steps.target.outputs.env_name }}
          RUST_ENV: ${{ steps.target.outputs.rust_env }}
        run: cargo check --locked --manifest-path apps/backend/Cargo.toml

      - name: Build contracts
        run: cd apps/contracts && forge build
